name: Build & Deploy to Hostinger

# Production deploys run only when changes land on main.
# Work on `development`, then merge to main via PR to release.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual "Run workflow" from the Actions tab

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # Node 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite → dist/apps/web)
        run: npm run build

      - name: Copy PHP + server-side files to dist (before FTP deploy)
        run: |
          echo "Copying PHP files from source to dist…"
          # Copy all PHP files from apps/web/public to dist/apps/web
          find apps/web/public -maxdepth 1 -name "*.php" -exec cp {} dist/apps/web/ \;
          # Copy system-backup.php (critical for data safety)
          cp apps/web/public/system-backup.php dist/apps/web/ 2>/dev/null || true
          # Copy integration files (hubspot.json, etc.) if they exist in source
          cp apps/web/public/hubspot.json dist/apps/web/ 2>/dev/null || true
          cp apps/web/public/hubspot-lib.php dist/apps/web/ 2>/dev/null || true
          cp apps/web/public/m365-lib.php dist/apps/web/ 2>/dev/null || true
          cp apps/web/public/m365.php dist/apps/web/ 2>/dev/null || true
          cp apps/web/public/m365-config.example.php dist/apps/web/ 2>/dev/null || true
          echo "PHP files copied to dist."

      # Take a point-in-time snapshot of the live CRM record store BEFORE
      # deploying, so lead data can be restored if anything goes wrong.
      # Best-effort: requires the CRM_BACKUP_KEY secret (matches $CRON_SECRET in
      # admin-config.php). CRM data (leads/**) is excluded from deploys anyway.
      - name: Snapshot all data before deploy (best-effort)
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CRM_BACKUP_KEY }}" ]; then
            echo "Requesting pre-deploy full-system snapshot…"
            curl -fsS "https://www.imigratesolution.com/system-backup.php?action=snapshot&key=${{ secrets.CRM_BACKUP_KEY }}" && echo "" || echo "system-backup snapshot failed (non-blocking)"
            curl -fsS "https://www.imigratesolution.com/system-backup.php?action=deploy-log&phase=pre&sha=${{ github.sha }}&key=${{ secrets.CRM_BACKUP_KEY }}" >/dev/null && echo "logged pre-deploy" || true
            # legacy leads-only snapshot too (harmless redundancy)
            curl -fsS "https://www.imigratesolution.com/crm-backup.php?action=snapshot&key=${{ secrets.CRM_BACKUP_KEY }}" >/dev/null || true
          else
            echo "CRM_BACKUP_KEY not set — skipping pre-deploy snapshot (all data is excluded from deploys regardless)."
          fi

      # NON-DESTRUCTIVE verification only. We do NOT auto-restore: the FTP
      # exclude list below (leads/**, auth/**, etc.) is what actually protects
      # this data — with dangerous-clean-slate:false the mirror never touches
      # excluded dirs, so they persist across every deploy. An auto-restore that
      # misfires could overwrite live data with a stale snapshot, so it is
      # intentionally removed. This step only reports state for the deploy log.
      - name: Pre-FTP verification (report only, never restores)
        if: always()
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CRM_BACKUP_KEY }}" ]; then
            AUTH_CHECK=$(curl -fsS "https://www.imigratesolution.com/system-backup.php?action=verify-auth&key=${{ secrets.CRM_BACKUP_KEY }}" 2>/dev/null || echo '{"ok":false}')
            if echo "$AUTH_CHECK" | grep -q '"ok":true'; then
              echo "✓ auth/secrets.php present on server"
            else
              echo "ℹ️  auth/secrets.php check did not confirm (key mismatch or file absent). FTP excludes auth/** so it is not modified by this deploy regardless."
            fi
          fi

      - name: Deploy dist/apps/web to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/apps/web/
          # The FTP account is rooted AT the website's web root
          # (/home/u982334410/domains/imigratesolution.com/public_html), so deploy to
          # the FTP root directly. Any path prefix here just nests files in an unserved
          # subfolder. Do NOT add "public_html/" or "domains/.../public_html/".
          server-dir: ./
          dangerous-clean-slate: false
          # Hostinger's FTP control socket drops on the default 30s timeout during
          # larger syncs, which fails the job; the rerun then starts a FULL
          # re-upload (sync-state never persisted) and times out again — a cascade
          # that briefly 404s the whole site. A generous timeout lets the sync
          # finish in one pass and persist .ftp-deploy-sync-state.json, so the
          # NEXT deploy only uploads changed files (fast, no outage).
          timeout: 600000
          # IMPORTANT: this FTP action MIRRORS state — excluding a file that was
          # previously uploaded DELETES it from the server. So repo-shipped content
          # (content.json, blog.json, faqs.json) must NOT be excluded, or it gets
          # wiped. The CMS keeps edits durable instead by writing SERVER-ONLY
          # override files that are never in the repo (so the mirror never touches
          # them) — see cms-content.php. Only never-in-repo dirs are excluded here.
          #
          # ⚠️ INTEGRATION CREDENTIALS MUST STAY EXCLUDED — removing any of the
          # following from this list would let the FTP mirror DELETE it, which
          # DISCONNECTS the integration and forces a manual reconnect:
          #   m365-config.php          → Microsoft 365 Azure app credentials
          #   leads/**                 → M365 OAuth tokens (leads/m365-tokens.json,
          #                              incl. the refresh token that keeps M365
          #                              connected) + all CRM data
          #   hubspot.json             → HubSpot Portal ID + Form GUID
          #   auth/**                  → auth/secrets.php (HubSpot API key, CRON secret,
          #                              M365 credentials) + integrations.json + portal users
          #                              ⚠️ CRITICAL: NEVER DELETE auth/secrets.php
          #   ai-data/**               → Claude AI API key + drafts
          #   system-backups/**        → full-system backups (CRM+portal+config+
          #                              integrations) + audit log + live mirror
          # Connect each integration ONCE; these files persist across every deploy.
          exclude: |
            **/.git*
            **/.git*/**
            .htpasswd
            leads/**
            auth/**
            **/*.backup
            forms.json
            hubspot.json
            m365-config.php
            media/**
            cms-versions/**
            cms-overrides/**
            ai-data/**
            system-backups/**

      # After deploy: verify the live site responds, log the event, and take a
      # post-deploy snapshot. This step NEVER restores/overwrites data — it only
      # reports and snapshots. Data protection is handled by the FTP exclude list.
      - name: Post-deploy health check + snapshot (report only)
        if: always()
        continue-on-error: true
        run: |
          echo "=== POST-DEPLOY HEALTH CHECK ==="
          for url in "/" "/crm.html" "/portal.html"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://www.imigratesolution.com${url}" || echo "000")
            echo "  ${url} -> HTTP ${code}"
          done
          if [ -n "${{ secrets.CRM_BACKUP_KEY }}" ]; then
            curl -fsS "https://www.imigratesolution.com/system-backup.php?action=deploy-log&phase=post&sha=${{ github.sha }}&key=${{ secrets.CRM_BACKUP_KEY }}" >/dev/null && echo "  deploy logged" || true
            curl -fsS "https://www.imigratesolution.com/system-backup.php?action=snapshot&key=${{ secrets.CRM_BACKUP_KEY }}" >/dev/null && echo "  post-deploy snapshot saved" || true
          fi
          echo "=== HEALTH CHECK COMPLETE ==="
