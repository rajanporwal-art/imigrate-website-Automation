name: Build & Deploy to Hostinger

# Production deploys run only when changes land on main.
# Work on `development`, then merge to main via PR to release.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual "Run workflow" from the Actions tab

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # Node 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite → dist/apps/web)
        run: npm run build

      # Pull latest CMS overrides from the live server BEFORE building dist.
      # This ensures the repo's seed JSON files match what the CMS has published,
      # so even if the override fetch fails on the client side, the deployed base
      # files reflect the latest content. Best-effort: a failure here is harmless
      # because cms-overrides/ on the server is the authoritative source anyway.
      - name: Sync CMS overrides from production (best-effort)
        continue-on-error: true
        timeout-minutes: 2
        run: |
          if [ -n "${{ secrets.CRM_BACKUP_KEY }}" ]; then
            echo "Pulling CMS overrides from production…"
            EXPORT=$(curl -fsS --max-time 30 \
              "https://www.imigratesolution.com/cms-export.php?action=export&key=${{ secrets.CRM_BACKUP_KEY }}" \
              2>/dev/null) || { echo "CMS export not available yet (first deploy?) — skipping"; exit 0; }
            for domain in content faqs forms blog seo pages media visas; do
              DATA=$(echo "$EXPORT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          dom = d.get('domains',{}).get('$domain')
          if dom and dom.get('data'):
              print(json.dumps(dom['data'], indent=2, ensure_ascii=False))
          " 2>/dev/null)
              if [ -n "$DATA" ] && [ "$DATA" != "null" ]; then
                echo "$DATA" > "apps/web/public/${domain}.json"
                echo "  Synced: ${domain}.json"
              fi
            done
            echo "CMS sync complete."
          else
            echo "CRM_BACKUP_KEY not set — skipping CMS sync."
          fi

      - name: Copy PHP + server-side files to dist (before FTP deploy)
        run: |
          echo "Copying PHP files from source to dist…"
          # Copy all PHP files from apps/web/public to dist/apps/web
          find apps/web/public -maxdepth 1 -name "*.php" -exec cp {} dist/apps/web/ \;
          # Copy system-backup.php (critical for data safety)
          cp apps/web/public/system-backup.php dist/apps/web/ 2>/dev/null || true
          # Copy integration files (hubspot.json, etc.) if they exist in source
          cp apps/web/public/hubspot.json dist/apps/web/ 2>/dev/null || true
          cp apps/web/public/hubspot-lib.php dist/apps/web/ 2>/dev/null || true
          cp apps/web/public/m365-lib.php dist/apps/web/ 2>/dev/null || true
          cp apps/web/public/m365.php dist/apps/web/ 2>/dev/null || true
          cp apps/web/public/m365-config.example.php dist/apps/web/ 2>/dev/null || true
          # Copy .htaccess for security rules
          cp apps/web/public/.htaccess dist/apps/web/ 2>/dev/null || true
          echo "PHP files copied to dist."

      # Take a point-in-time snapshot of the live CRM record store BEFORE
      # deploying, so lead data can be restored if anything goes wrong.
      # Best-effort: requires the CRM_BACKUP_KEY secret (matches $CRON_SECRET in
      # admin-config.php). CRM data (leads/**) is excluded from deploys anyway.
      # ALL curls use --max-time so a slow/hung server-side snapshot can NEVER
      # hang the job and hold the concurrency lock (which would block the next
      # deploy). timeout-minutes is a hard ceiling on the whole step.
      - name: Snapshot all data before deploy (best-effort)
        continue-on-error: true
        timeout-minutes: 4
        run: |
          if [ -n "${{ secrets.CRM_BACKUP_KEY }}" ]; then
            echo "Requesting pre-deploy full-system snapshot…"
            curl -fsS --max-time 120 "https://www.imigratesolution.com/system-backup.php?action=snapshot&key=${{ secrets.CRM_BACKUP_KEY }}" && echo "" || echo "system-backup snapshot failed/timed out (non-blocking)"
            curl -fsS --max-time 30 "https://www.imigratesolution.com/system-backup.php?action=deploy-log&phase=pre&sha=${{ github.sha }}&key=${{ secrets.CRM_BACKUP_KEY }}" >/dev/null && echo "logged pre-deploy" || true
            # legacy leads-only snapshot too (harmless redundancy)
            curl -fsS --max-time 60 "https://www.imigratesolution.com/crm-backup.php?action=snapshot&key=${{ secrets.CRM_BACKUP_KEY }}" >/dev/null || true
          else
            echo "CRM_BACKUP_KEY not set — skipping pre-deploy snapshot (all data is excluded from deploys regardless)."
          fi

      # NON-DESTRUCTIVE verification only. We do NOT auto-restore: the FTP
      # exclude list below (leads/**, auth/**, etc.) is what actually protects
      # this data — with dangerous-clean-slate:false the mirror never touches
      # excluded dirs, so they persist across every deploy. An auto-restore that
      # misfires could overwrite live data with a stale snapshot, so it is
      # intentionally removed. This step only reports state for the deploy log.
      - name: Pre-FTP verification (report only, never restores)
        if: always()
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CRM_BACKUP_KEY }}" ]; then
            AUTH_CHECK=$(curl -fsS "https://www.imigratesolution.com/system-backup.php?action=verify-auth&key=${{ secrets.CRM_BACKUP_KEY }}" 2>/dev/null || echo '{"ok":false}')
            if echo "$AUTH_CHECK" | grep -q '"ok":true'; then
              echo "✓ auth/secrets.php present on server"
            else
              echo "ℹ️  auth/secrets.php check did not confirm (key mismatch or file absent). FTP excludes auth/** so it is not modified by this deploy regardless."
            fi
          fi

      # Hostinger's FTPS control socket intermittently drops (ETIMEDOUT on :21).
      # A single failed attempt leaves the web root partial → whole-site 404.
      # FIX: up to 3 sequential attempts. A dropped control socket fails fast, so
      # a retry reconnects and completes the publish. Attempts 1–2 are
      # continue-on-error; only a 3rd consecutive failure fails the job.
      #
      # ⚠️ CRITICAL: FTP exclude list. With dangerous-clean-slate:false, the FTP
      # mirror will NEVER delete or overwrite files/dirs that match these patterns.
      # This is the ONLY mechanism that protects server-side data from deploys.
      #
      # Protected categories (matching user's Data Persistence Requirements):
      #   leads/**          — CRM: leads, clients, cases, tasks, notes, appointments,
      #                       email templates, automations, pipelines, reports,
      #                       dashboard settings, campaigns, scoring, documents
      #   auth/**           — Credentials: HubSpot API key, passwords, cron secret
      #   cms-overrides/**  — CMS: all published content edits (content, blog, FAQs,
      #                       visas, pages, SEO, media metadata, forms)
      #   cms-versions/**   — CMS version history for rollback
      #   media/**          — Uploaded files: images, documents, attachments
      #   ai-data/**        — AI configuration and training data
      #   system-backups/** — Automated backup snapshots
      #   hubspot.json      — HubSpot integration config
      #   m365-config.php   — Microsoft 365 integration config
      #   forms.json        — Form submissions and config (server-edited)
      #   .htpasswd         — HTTP Basic Auth credentials
      #   **/*.backup       — One-step backup files
      #   email-threads.ndjson — HubSpot email sync data
      #   portal-config.json — Portal settings
      #   .ftp-deploy-sync-state.json — FTP deploy state (never delete)
      #
      # DO NOT REMOVE ANY LINE without understanding the consequences.
      - name: Deploy to Hostinger via FTP (attempt 1)
        id: ftp1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/apps/web/
          server-dir: ./
          dangerous-clean-slate: false
          timeout: 600000
          exclude: &ftp_exclude |
            **/.git*
            **/.git*/**
            .htpasswd
            .ftp-deploy-sync-state.json
            leads/**
            auth/**
            **/*.backup
            forms.json
            hubspot.json
            m365-config.php
            email-threads.ndjson
            portal-config.json
            media/**
            cms-versions/**
            cms-overrides/**
            ai-data/**
            system-backups/**

      - name: Deploy to Hostinger via FTP (attempt 2)
        id: ftp2
        if: steps.ftp1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/apps/web/
          server-dir: ./
          dangerous-clean-slate: false
          timeout: 600000
          exclude: *ftp_exclude

      - name: Deploy to Hostinger via FTP (attempt 3 - final)
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/apps/web/
          server-dir: ./
          dangerous-clean-slate: false
          timeout: 600000
          exclude: *ftp_exclude

      # After deploy: verify the live site responds, log the event, and take a
      # post-deploy snapshot. This step NEVER restores/overwrites data — it only
      # reports and snapshots. Data protection is handled by the FTP exclude list.
      - name: Post-deploy health check + snapshot (report only)
        if: always()
        continue-on-error: true
        timeout-minutes: 4
        run: |
          echo "=== POST-DEPLOY HEALTH CHECK ==="
          for url in "/" "/crm.html" "/portal.html"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://www.imigratesolution.com${url}" || echo "000")
            echo "  ${url} -> HTTP ${code}"
          done
          if [ -n "${{ secrets.CRM_BACKUP_KEY }}" ]; then
            curl -fsS --max-time 30 "https://www.imigratesolution.com/system-backup.php?action=deploy-log&phase=post&sha=${{ github.sha }}&key=${{ secrets.CRM_BACKUP_KEY }}" >/dev/null && echo "  deploy logged" || true
            curl -fsS --max-time 120 "https://www.imigratesolution.com/system-backup.php?action=snapshot&key=${{ secrets.CRM_BACKUP_KEY }}" >/dev/null && echo "  post-deploy snapshot saved" || echo "  post-deploy snapshot skipped/timed out (non-blocking)"
          fi
          echo "=== HEALTH CHECK COMPLETE ==="
