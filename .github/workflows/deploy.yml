name: Build & Deploy to Hostinger

# Production deploys run only when changes land on main.
# Work on `development`, then merge to main via PR to release.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual "Run workflow" from the Actions tab

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # Node 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite → dist/apps/web)
        run: npm run build

      - name: Deploy dist/apps/web to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/apps/web/
          # The FTP account is rooted AT the website's web root
          # (/home/u982334410/domains/imigratesolution.com/public_html), so deploy to
          # the FTP root directly. Any path prefix here just nests files in an unserved
          # subfolder. Do NOT add "public_html/" or "domains/.../public_html/".
          server-dir: ./
          dangerous-clean-slate: false
          # Content (content.json, blog.json, faqs.json) is authored in this repo
          # and SHIPS on deploy — repo is the source of truth for site content.
          # Only secrets, runtime data, and admin-only integration settings
          # (forms builder, HubSpot portal config) are preserved on the server.
          exclude: |
            **/.git*
            **/.git*/**
            .htpasswd
            admin-config.php
            leads/**
            **/*.backup
            forms.json
            hubspot.json
