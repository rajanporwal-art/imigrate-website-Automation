name: Build & Deploy to Hostinger

# Production deploys run only when changes land on main.
# Work on `development`, then merge to main via PR to release.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual "Run workflow" from the Actions tab

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # Node 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite → dist/apps/web)
        run: npm run build

      - name: Deploy dist/apps/web to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/apps/web/
          # imigratesolution.com is an ADDON domain on this Hostinger account,
          # so its web root is domains/<domain>/public_html (NOT the top-level
          # public_html, which belongs to the account's primary domain).
          server-dir: domains/imigratesolution.com/public_html/
          dangerous-clean-slate: false
          # Never overwrite server-side secrets/runtime data, and never clobber
          # content the admin panel edits live on the server. content.json IS
          # shipped (it carries the SEO/content updates); blog/faqs/forms/hubspot
          # are preserved so live admin edits are not reverted by a deploy.
          exclude: |
            **/.git*
            **/.git*/**
            .htpasswd
            admin-config.php
            leads/**
            **/*.backup
            blog.json
            faqs.json
            forms.json
            hubspot.json
