name: Build & Deploy to Hostinger

# Production deploys run only when changes land on main.
# Work on `development`, then merge to main via PR to release.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # manual "Run workflow" from the Actions tab

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc # Node 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite → dist/apps/web)
        run: npm run build

      # Take a point-in-time snapshot of the live CRM record store BEFORE
      # deploying, so lead data can be restored if anything goes wrong.
      # Best-effort: requires the CRM_BACKUP_KEY secret (matches $CRON_SECRET in
      # admin-config.php). CRM data (leads/**) is excluded from deploys anyway.
      - name: Snapshot CRM data before deploy (best-effort)
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CRM_BACKUP_KEY }}" ]; then
            echo "Requesting pre-deploy CRM snapshot…"
            curl -fsS "https://www.imigratesolution.com/crm-backup.php?action=snapshot&key=${{ secrets.CRM_BACKUP_KEY }}" && echo "" || echo "Snapshot request failed (non-blocking)"
          else
            echo "CRM_BACKUP_KEY not set — skipping pre-deploy CRM snapshot (CRM data is excluded from deploys regardless)."
          fi

      - name: Deploy dist/apps/web to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/apps/web/
          # The FTP account is rooted AT the website's web root
          # (/home/u982334410/domains/imigratesolution.com/public_html), so deploy to
          # the FTP root directly. Any path prefix here just nests files in an unserved
          # subfolder. Do NOT add "public_html/" or "domains/.../public_html/".
          server-dir: ./
          dangerous-clean-slate: false
          # IMPORTANT: this FTP action MIRRORS state — excluding a file that was
          # previously uploaded DELETES it from the server. So repo-shipped content
          # (content.json, blog.json, faqs.json) must NOT be excluded, or it gets
          # wiped. The CMS keeps edits durable instead by writing SERVER-ONLY
          # override files that are never in the repo (so the mirror never touches
          # them) — see cms-content.php. Only never-in-repo dirs are excluded here.
          exclude: |
            **/.git*
            **/.git*/**
            .htpasswd
            admin-config.php
            leads/**
            **/*.backup
            forms.json
            hubspot.json
            m365-config.php
            media/**
            cms-versions/**
            cms-overrides/**
            auth/**
            ai-data/**
