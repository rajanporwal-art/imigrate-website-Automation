
<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/jpeg" href="/images/imigrate-logo.jpg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
		<!-- Diagnostic: shows a message if React fails to mount after 5 seconds -->
		<script>
			setTimeout(function() {
				var root = document.getElementById('root');
				if (root && root.children.length === 0) {
					root.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#333"><h2>&#9888;&#65039; Page failed to load</h2><p>JavaScript may be blocked or an error occurred.</p><p>Please open browser DevTools (F12) &rarr; Console tab and share the error with support.</p></div>';
				}
			}, 5000);
		</script>
	</body>
</html>
