<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>iMigrate Admin Portal</title>
<style>
  :root{--bg:#f4f6fb;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--navy:#0b1f44;--accent:#c8a24a;--cta:#e11d2a;--ok:#1a7f37;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer}
  .btn{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600}
  .btn:hover{border-color:var(--accent)} .btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)} .btn-sm{padding:4px 9px;font-size:12px} .btn-cta{background:var(--cta);color:#fff;border-color:var(--cta)}
  input,select,textarea{font-family:inherit;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;width:100%}
  textarea{min-height:110px;resize:vertical;line-height:1.5}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:0}
  .tab{padding:8px 14px;border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;color:var(--muted);background:transparent;cursor:pointer}
  .tab.active{color:var(--navy);background:var(--panel);border-color:var(--border);margin-bottom:-1px}
  .aiout{white-space:pre-wrap;font-size:13px;line-height:1.6;background:#fbfcfe;border:1px solid var(--border);border-radius:8px;padding:14px;max-height:60vh;overflow:auto}
  .chatwrap{display:flex;flex-direction:column;height:62vh;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .chatlog{flex:1;overflow:auto;padding:14px;background:#fbfcfe}
  .msg{margin-bottom:12px;display:flex} .msg.u{justify-content:flex-end}
  .bub{max-width:80%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.55;white-space:pre-wrap}
  .msg.u .bub{background:var(--navy);color:#fff;border-bottom-right-radius:3px}
  .msg.a .bub{background:#fff;border:1px solid var(--border);border-bottom-left-radius:3px}
  .chatbar{display:flex;gap:8px;padding:10px;border-top:1px solid var(--border);background:var(--panel)}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(11,31,68,.08);color:var(--navy);margin-right:5px}
  label.fl{font-size:12px;color:var(--muted);display:block;margin:8px 0 3px}
  #gate{max-width:380px;margin:11vh auto;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:var(--shadow);text-align:center}
  #gate h1{font-size:20px;margin:0 0 4px} #gate p{color:var(--muted);font-size:13px;margin:0 0 16px}
  #app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{background:var(--navy);color:#cdd7ea;padding:14px 12px;position:sticky;top:0;height:100vh;overflow:auto}
  .sidebar .brand{display:flex;align-items:center;gap:8px;color:#fff;font-weight:800;font-size:18px;padding:6px 8px 12px}
  .sidebar .brand span{color:var(--accent)}
  .grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:#7e8aa6;margin:12px 8px 4px}
  .navgrp{margin-bottom:2px}
  .grphd{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:#dbe3f3;font-size:13px;font-weight:700;cursor:pointer;user-select:none}
  .grphd:hover{background:rgba(255,255,255,.07)}
  .grphd .gi{width:18px;text-align:center}
  .grphd .chev{margin-left:auto;transition:transform .2s ease;font-size:10px;color:#8593b3}
  .navgrp.open .grphd .chev{transform:rotate(90deg)}
  .grpbody{overflow:hidden;max-height:0;transition:max-height .26s ease}
  .navgrp.open .grpbody{max-height:760px}
  .navitem{display:flex;align-items:center;gap:9px;padding:6px 12px 6px 34px;border-radius:8px;color:#b9c4dc;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:1px}
  .navitem.active{background:rgba(200,162,74,.18);color:#fff;box-shadow:inset 3px 0 0 var(--accent)}
  .navitem:hover{background:rgba(255,255,255,.1);color:#fff}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 22px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:5}
  .topbar h2{margin:0;font-size:17px}
  .who{font-size:12px;color:var(--muted)}
  .content{padding:20px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
  .qcard{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:transform .08s,border-color .12s}
  .qcard:hover{transform:translateY(-3px);border-color:var(--accent)}
  .qcard .ic{font-size:30px} .qcard h3{margin:8px 0 3px;font-size:15px} .qcard p{margin:0;font-size:12px;color:var(--muted)}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .card h3{margin:0 0 8px;font-size:15px}
  table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:var(--muted);font-weight:600;padding:8px;border-bottom:2px solid var(--border)}td{padding:8px;border-bottom:1px solid var(--border)}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
  .badge.active{background:#dcfce7;color:#166534}.badge.inactive{background:#fee2e2;color:#b91c1c}.badge.tag{background:rgba(11,31,68,.08);color:var(--navy)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .muted{color:var(--muted)}.ok{color:var(--ok)}.err{color:var(--cta)}.right{text-align:right}
  iframe{width:100%;height:calc(100vh - 54px);border:0;display:block}
  .permgrid{overflow:auto} .permgrid td,.permgrid th{padding:5px 8px;font-size:12px;white-space:nowrap}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:40}
  .modal .box{background:var(--panel);border-radius:14px;padding:22px;max-width:460px;width:92%;max-height:88vh;overflow:auto}
  @media(max-width:820px){#app{grid-template-columns:1fr}.sidebar{position:static;height:auto}}
</style>
</head>
<body>
<div id="gate">
  <h1>iMigrate <span style="color:var(--accent)">Admin Portal</span></h1>
  <p>One login for Website CMS &amp; CRM</p>
  <input id="username" placeholder="Username or email" autocomplete="username" />
  <input id="password" type="password" placeholder="Password" autocomplete="current-password" style="margin-top:8px" onkeydown="if(event.key==='Enter')doLogin()" />
  <input id="otp" class="hidden" placeholder="6-digit authenticator code" inputmode="numeric" style="margin-top:8px" onkeydown="if(event.key==='Enter')doLogin()" />
  <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="doLogin()">Sign in</button>
  <p id="gateMsg" class="err" style="margin-top:12px;font-size:13px"></p>
</div>

<div id="app" class="hidden">
  <aside class="sidebar"><div class="brand">iMigrate <span>Portal</span></div><div id="nav"></div></aside>
  <div class="main">
    <div class="topbar"><h2 id="viewTitle">Dashboard</h2>
      <div style="display:flex;gap:10px;align-items:center">
        <span class="who" id="whoami"></span>
        <button class="btn btn-sm" onclick="openProfile()">My account</button>
        <button class="btn btn-sm" onclick="doLogout()">Logout</button>
      </div>
    </div>
    <div id="view" class="content"></div>
  </div>
</div>

<script>
const $=(id)=>document.getElementById(id);
const esc=(v)=>(v==null?'':String(v)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDT=(s)=>(s||'').slice(0,16).replace('T',' ');
let TOKEN=sessionStorage.getItem('imig_portal_token')||'',SVC='',USER={},PERMS={all:false,perms:{}},VIEW='dashboard';

const MODULE_LABELS={'dashboard':'Dashboard','dash.analytics':'Analytics','dash.notifications':'Notifications','cms.pages':'Pages','cms.blogs':'Blogs','cms.faqs':'FAQs','cms.media':'Media','cms.menus':'Menus','cms.headfoot':'Header & Footer','cms.forms':'Forms','cms.seo':'SEO','cms.settings':'CMS Settings','crm.leads':'Leads','crm.aileads':'AI Leads','crm.reports':'Reports','crm.pipeline':'Pipeline','crm.tasks':'Tasks','crm.documents':'Documents','crm.notes':'Notes','crm.activities':'Activities','mkt.dashboard':'Marketing Dashboard','mkt.aistudio':'AI Content Studio','mkt.social':'Social Media','mkt.gbp':'Google Business Profile','mkt.email':'Email Marketing','mkt.emailauto':'Email Automations','mkt.whatsapp':'WhatsApp Automations','mkt.ads':'Ads Manager','mkt.campaigns':'Campaigns','mkt.calendar':'Content Calendar','mkt.analytics':'Analytics','consult.upcoming':'Upcoming Consultations','consult.completed':'Completed Consultations','consult.calendar':'Consultation Calendar','int.anthropic':'Claude AI (Anthropic)','int.m365':'Microsoft 365','int.outlook':'Outlook','int.onedrive':'OneDrive','int.google':'Google','int.email':'Email Settings','int.api':'API Connections','int.hubspot':'HubSpot','int.mailchimp':'Mailchimp','int.activecampaign':'ActiveCampaign','int.whatsappapi':'WhatsApp API','settings.company':'Company Information','settings.users':'Users','settings.roles':'Roles','um.permissions':'Permissions','settings.apikeys':'API Keys','settings.backup':'Backups','settings.security':'Security','sys.logs':'Logs'};

/* Grouped collapsible nav: [groupIcon, groupLabel, [ [moduleKey, label, target] ]]
   target: app url (#m=…) for embedded CMS/CRM, or 'native' for a portal-rendered view. */
const NAV=[
  ['📊','Dashboard',[['dashboard','Overview','native'],['dash.analytics','Analytics','native'],['dash.notifications','Notifications','native']]],
  ['🌐','CMS',[['cms.pages','Pages','cms.html#m=pagelist'],['cms.blogs','Blogs','cms.html#m=blog'],['cms.faqs','FAQs','cms.html#m=faqs'],['cms.media','Media Library','cms.html#m=media'],['cms.forms','Forms','cms.html#m=forms'],['cms.seo','SEO','cms.html#m=seo'],['cms.menus','Menus','cms.html#m=menus'],['cms.headfoot','Header & Footer','cms.html#m=headfoot'],['cms.settings','Settings','cms.html#m=settings']]],
  ['👥','CRM',[['crm.leads','Leads','crm.html#m=leads'],['crm.aileads','AI Leads','crm.html#m=leads'],['crm.pipeline','Pipeline','crm.html#m=pipeline'],['crm.tasks','Tasks','crm.html#m=tasks'],['crm.documents','Documents','crm.html#m=leads'],['crm.notes','Notes','crm.html#m=leads'],['crm.reports','Reports','crm.html#m=reports'],['crm.activities','Activities','crm.html#m=leads']]],
  ['📢','Marketing Hub',[['mkt.dashboard','Dashboard','native'],['mkt.social','Social Media','native'],['mkt.gbp','Google Business Profile','native'],['mkt.email','Email Marketing','native'],['mkt.emailauto','Email Automations','native'],['mkt.whatsapp','WhatsApp Automations','native'],['mkt.ads','Ads Manager','native'],['mkt.campaigns','Campaigns','native'],['mkt.aistudio','✨ AI Content Studio','native'],['mkt.calendar','Content Calendar','native'],['mkt.analytics','Analytics','native']]],
  ['📅','Consultations',[['consult.upcoming','Upcoming','native'],['consult.completed','Completed','native'],['consult.calendar','Calendar','native']]],
  ['⚙️','Integrations',[['int.m365','Microsoft 365','native'],['int.outlook','Outlook','native'],['int.onedrive','OneDrive','native'],['int.google','Google','native'],['int.anthropic','Claude AI','native'],['int.hubspot','HubSpot','native'],['int.email','Email Settings','native'],['int.api','API Connections','native'],['int.mailchimp','Mailchimp','native'],['int.activecampaign','ActiveCampaign','native'],['int.whatsappapi','WhatsApp API','native']]],
  ['👤','User Management',[['settings.users','Users','native'],['settings.roles','Roles','native'],['um.permissions','Permissions','native']]],
  ['🛠️','System Settings',[['settings.company','Company Information','native'],['settings.backup','Backups','native'],['settings.security','Security','native'],['sys.logs','Logs','native']]],
];
/* Map pseudo nav keys to the real permission module that gates them (null = admin-only). */
const PERM_OF={'dash.analytics':'mkt.analytics','dash.notifications':null,'cms.headfoot':'cms.settings','mkt.dashboard':'mkt.email','mkt.campaigns':'mkt.ads','consult.upcoming':'crm.tasks','consult.completed':'crm.tasks','consult.calendar':'crm.tasks','int.outlook':'int.m365','int.onedrive':'int.m365','int.email':'int.m365','int.api':'settings.apikeys','um.permissions':'settings.roles','sys.logs':'settings.security'};
function leafVisible(mod){ if(mod==='dashboard')return true; if(PERMS.all)return true; const pk=(mod in PERM_OF)?PERM_OF[mod]:mod; if(pk===null)return false; return can(pk); }

function can(mod,act){ act=act||'view'; if(PERMS.all)return true; const a=(PERMS.perms||{})[mod]||[]; return a.includes(act); }

async function api(body){ const r=await fetch('/portal.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:TOKEN,...body})}); return r.json().catch(()=>({ok:false})); }

/* ---------- auth ---------- */
async function doLogin(){
  const m=$('gateMsg'); m.textContent='Signing in…';
  const r=await api({action:'login',username:$('username').value.trim(),password:$('password').value,otp:$('otp').value.trim()});
  if(!r.ok){ if(r.twofa){$('otp').classList.remove('hidden');$('otp').focus();} m.textContent=r.error||'Sign-in failed'; return; }
  applySession(r);
}
function applySession(r){
  TOKEN=r.token; SVC=r.svc||''; USER=r.user||{}; PERMS=r.permissions||{all:false,perms:{}};
  sessionStorage.setItem('imig_portal_token',TOKEN);
  // Single sign-on for the embedded CMS/CRM (same origin): share the service key.
  if(SVC){ sessionStorage.setItem('imig_cms_pw',SVC); sessionStorage.setItem('imig_crm_pw',SVC); }
  localStorage.setItem('imig_cms_user',USER.name||'Admin'); localStorage.setItem('imig_crm_user',USER.name||'Admin');
  localStorage.setItem('imig_cms_role', mapCmsRole(USER.role));
  $('gate').classList.add('hidden'); $('app').classList.remove('hidden');
  $('whoami').textContent=(USER.name||'')+' · '+(USER.role||'');
  buildNav(); go('dashboard');
}
function mapCmsRole(role){ if(role==='Super Admin'||role==='Website Admin')return 'Admin'; if(role==='Content Editor')return 'Content Editor'; if(role==='Marketing Manager')return 'Marketing'; return 'Content Editor'; }
async function doLogout(){ await api({action:'logout'}); sessionStorage.removeItem('imig_portal_token'); sessionStorage.removeItem('imig_cms_pw'); sessionStorage.removeItem('imig_crm_pw'); location.reload(); }
async function restore(){ if(!TOKEN)return false; const r=await api({action:'session'}); if(r.ok){ applySession({token:TOKEN,svc:r.svc,user:r.user,permissions:r.permissions}); return true; } sessionStorage.removeItem('imig_portal_token'); return false; }

/* ---------- nav / routing ---------- */
function navTargetFor(mod){ for(const g of NAV) for(const it of g[2]) if(it[0]===mod) return it[2]; return 'native'; }
let NAV_OPEN=null;
function navOpen(){ if(NAV_OPEN)return NAV_OPEN; try{NAV_OPEN=new Set(JSON.parse(localStorage.getItem('imig_nav_open')||'[0]'));}catch(e){NAV_OPEN=new Set([0]);} return NAV_OPEN; }
function toggleGrp(gi){ const s=navOpen(); s.has(gi)?s.delete(gi):s.add(gi); localStorage.setItem('imig_nav_open',JSON.stringify([...s])); buildNav(); }
function groupOfView(mod){ for(let gi=0;gi<NAV.length;gi++){ if(NAV[gi][2].some(l=>l[0]===mod))return gi; } return 0; }
function buildNav(){
  const open=navOpen(); open.add(groupOfView(VIEW));
  let h='';
  NAV.forEach(([icon,label,leaves],gi)=>{
    const vis=leaves.filter(l=>leafVisible(l[0]));
    if(!vis.length)return;
    h+=`<div class="navgrp ${open.has(gi)?'open':''}"><div class="grphd" onclick="toggleGrp(${gi})"><span class="gi">${icon}</span><span>${esc(label)}</span><span class="chev">▶</span></div><div class="grpbody">`;
    h+=vis.map(([mod,lab])=>`<div class="navitem ${VIEW===mod?'active':''}" onclick="go('${mod}')">${esc(lab)}</div>`).join('');
    h+=`</div></div>`;
  });
  $('nav').innerHTML=h;
}
function go(mod){ VIEW=mod; buildNav(); const tgt=navTargetFor(mod);
  $('viewTitle').textContent=(MODULE_LABELS[mod]||mod);
  $('view').style.padding='20px';
  if(mod==='dashboard') return renderDashboard();
  if(mod==='dash.analytics') return renderFramework('mkt.analytics');
  if(mod==='dash.notifications') return renderNotifications();
  if(mod==='mkt.dashboard') return renderMarketingDashboard();
  if(mod==='mkt.aistudio') return renderAIStudio();
  if(mod==='int.anthropic') return renderAIIntegration();
  if(mod==='int.api') return renderIntegrationsOverview();
  if(typeof CONNECTORS!=='undefined' && CONNECTORS[mod]) return renderIntegration(mod);
  if(mod==='um.permissions') return renderSettings('settings.roles');
  if(mod==='sys.logs') return renderLogs();
  if(mod.startsWith('consult.')) return renderConsultations(mod);
  if(mod.startsWith('settings.')) return renderSettings(mod);
  if(mod.startsWith('mkt.')||mod.startsWith('int.')) return renderFramework(mod);
  if(tgt!=='native'){ $('view').innerHTML=`<iframe src="/${esc(tgt)}" title="${esc(MODULE_LABELS[mod]||mod)}"></iframe>`; $('view').style.padding='0'; return; }
}

/* ---------- dashboard ---------- */
function renderDashboard(){
  $('view').style.padding='20px';
  const CARDS=[['cms.pages','🌐','Website CMS','Pages, blogs, SEO, media','cms.pages'],['crm.leads','📇','CRM','Leads, pipeline, reports','crm.leads'],['mkt.aistudio','✨','AI Studio','Generate content, ads & SEO with Claude','mkt.aistudio'],['mkt.email','📣','Marketing Hub','Campaigns & automations','mkt.email'],['crm.reports','🤖','AI Reports','Assessment reports','crm.reports'],['mkt.email','✉️','Email Marketing','Campaigns & templates','mkt.email'],['mkt.social','📱','Social Media','Posts & scheduling','mkt.social'],['mkt.analytics','📈','Analytics','Traffic & conversions','mkt.analytics'],['int.m365','🔌','Integrations','M365, HubSpot, more','int.m365'],['settings.company','⚙️','Settings','Users, roles, security','settings.company']];
  const cards=CARDS.filter(c=>can(c[0])).map(c=>`<div class="qcard" onclick="go('${c[4]}')"><div class="ic">${c[1]}</div><h3>${esc(c[2])}</h3><p>${esc(c[3])}</p></div>`).join('');
  $('view').innerHTML=`<p class="muted" style="margin-top:0">Welcome, <strong>${esc(USER.name||'')}</strong> — signed in as <strong>${esc(USER.role||'')}</strong>.</p><div class="cards">${cards}</div>
   <div class="card" style="margin-top:18px"><h3>Two systems, one portal</h3><p class="muted" style="font-size:13px;line-height:1.6">The Website CMS and the CRM run as independent applications with separate data stores and deployment protection — website updates never touch CRM data, and vice-versa. This portal is the shared, role-secured front door.</p></div>`;
}

/* ---------- settings modules ---------- */
function renderSettings(mod){
  $('view').style.padding='20px';
  if(mod==='settings.users')return rUsers();
  if(mod==='settings.roles')return rRoles();
  if(mod==='settings.security')return rSecurity();
  if(mod==='settings.company')return rCompany();
  if(mod==='settings.backup')return rBackup();
  if(mod==='settings.apikeys')return rApiKeys();
}

/* Users */
let ROLE_NAMES=[];
async function rUsers(){
  if(!can('settings.users')){ $('view').innerHTML='<div class="card">You do not have access to user management.</div>'; return; }
  const r=await api({action:'users.list'}); const users=r.users||[];
  const rr=await api({action:'roles.list'}); ROLE_NAMES=Object.keys(rr.roles||{});
  $('view').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h3>Users</h3><button class="btn btn-primary btn-sm" onclick="userModal()">+ Add user</button></div>
    <table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Last login</th><th>Status</th><th>2FA</th><th class="right"></th></tr></thead><tbody>
    ${users.map(u=>`<tr><td><strong>${esc(u.name||'')}</strong></td><td class="muted">${esc(u.email||'')}</td><td><span class="badge tag">${esc(u.role||'')}</span></td><td class="muted">${u.lastLogin?esc(fmtDT(u.lastLogin)):'—'}</td><td><span class="badge ${u.status==='active'?'active':'inactive'}">${esc(u.status||'active')}</span></td><td>${u.twofaEnabled?'🔐':'—'}</td><td class="right"><button class="btn btn-sm" onclick='userModal(${JSON.stringify(u)})'>Edit</button> <button class="btn btn-sm" onclick="userDeact('${esc(u.id)}','${u.status==='active'?'inactive':'active'}')">${u.status==='active'?'Deactivate':'Activate'}</button> <button class="btn btn-sm" onclick="userDel('${esc(u.id)}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="7" class="muted" style="padding:16px">No users yet. Add your team.</td></tr>'}
    </tbody></table>
    <p class="muted" style="font-size:12px;margin-top:8px">Until you add the first user, the legacy admin password signs you in as Super Admin (bootstrap).</p></div>`;
}
function userModal(u){
  u=u||{name:'',email:'',username:'',role:'Viewer',status:'active',id:''};
  const roleOpts=ROLE_NAMES.map(rn=>`<option ${rn===u.role?'selected':''}>${esc(rn)}</option>`).join('');
  const m=document.createElement('div');m.className='modal';m.id='userM';
  m.innerHTML=`<div class="box"><h3 style="margin-top:0">${u.id?'Edit user':'Add user'}</h3>
    <label class="fl">Full name</label><input id="u_name" value="${esc(u.name||'')}">
    <div class="row"><div><label class="fl">Email</label><input id="u_email" value="${esc(u.email||'')}"></div><div><label class="fl">Username</label><input id="u_username" value="${esc(u.username||'')}" placeholder="defaults to email"></div></div>
    <label class="fl">Role</label><select id="u_role">${roleOpts}</select>
    <label class="fl">${u.id?'New password (leave blank to keep)':'Password'}</label><input id="u_pass" type="text" placeholder="min 8 chars, 1 number, 1 uppercase">

/* Roles & Permissions (custom permission builder) */
async function rRoles(){
  if(!can('settings.roles')&&!PERMS.all){ $('view').innerHTML='<div class="card">No access to roles.</div>'; return; }
  const r=await api({action:'roles.list'}); const roles=r.roles||{},MODULES=r.modules||[],ACTIONS=r.actions||[];
  window._ROLES=roles;window._MODS=MODULES;window._ACTS=ACTIONS;
  const list=Object.entries(roles).map(([name,def])=>`<tr><td><strong>${esc(name)}</strong>${def.system?' <span class="badge tag">built-in</span>':''}<div class="muted" style="font-size:12px">${esc(def.desc||'')}</div></td><td>${def.all?'<span class="badge active">All access</span>':Object.keys(def.perms||{}).length+' modules'}</td><td class="right">${def.system?'<span class="muted">view</span>':`<button class="btn btn-sm" onclick="roleEdit('${esc(name)}')">Edit</button> <button class="btn btn-sm" onclick="roleDel('${esc(name)}')">Delete</button>`}</td></tr>`).join('');
  $('view').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h3>Roles &amp; Permissions</h3><button class="btn btn-primary btn-sm" onclick="roleEdit('')">+ New custom role</button></div>
    <table><thead><tr><th>Role</th><th>Scope</th><th class="right"></th></tr></thead><tbody>${list}</tbody></table>
    <p class="muted" style="font-size:12px;margin-top:8px">Built-in roles are fixed. Create custom roles with exactly the permissions you want.</p></div>
    <div id="roleEditor"></div>`;
}
function roleEdit(name){
  const roles=window._ROLES||{},MODULES=window._MODS||[],ACTIONS=window._ACTS||[];
  const def=name?(roles[name]||{perms:{}}):{perms:{}};
  const rows=MODULES.map(mod=>`<tr><td>${esc(MODULE_LABELS[mod]||mod)} <span class="muted">${esc(mod)}</span></td>${ACTIONS.map(a=>{const on=((def.perms||{})[mod]||[]).includes(a);return `<td style="text-align:center"><input type="checkbox" style="width:auto" data-mod="${mod}" data-act="${a}" ${on?'checked':''}></td>`;}).join('')}</tr>`).join('');
  $('roleEditor').innerHTML=`<div class="card"><h3>${name?'Edit role: '+esc(name):'New custom role'}</h3>
    <div class="row"><div><label class="fl">Role name</label><input id="r_name" value="${esc(name)}" ${name?'readonly':''}></div><div><label class="fl">Description</label><input id="r_desc" value="${esc(def.desc||'')}"></div></div>
    <div class="permgrid" style="margin-top:12px"><table><thead><tr><th>Module</th>${ACTIONS.map(a=>`<th style="text-transform:capitalize">${esc(a)}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>
    <div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-primary btn-sm" onclick="roleSave()">Save role</button><button class="btn btn-sm" onclick="document.getElementById('roleEditor').innerHTML=''">Cancel</button><span id="r_msg" class="err" style="font-size:12px"></span></div></div>`;
  $('roleEditor').scrollIntoView({behavior:'smooth'});
}
async function roleSave(){
  const name=$('r_name').value.trim(); if(!name){$('r_msg').textContent='Name required';return;}
  const perms={}; document.querySelectorAll('#roleEditor input[type=checkbox]').forEach(cb=>{ if(cb.checked){const m=cb.getAttribute('data-mod');(perms[m]=perms[m]||[]).push(cb.getAttribute('data-act'));} });
  const r=await api({action:'roles.save',name,desc:$('r_desc').value,perms});
  if(r.ok){$('roleEditor').innerHTML='';rRoles();}else $('r_msg').textContent=r.error||'Save failed';
}
async function roleDel(name){ if(!confirm('Delete role '+name+'?'))return; const r=await api({action:'roles.delete',name}); if(r.ok)rRoles(); else alert(r.error||'Failed'); }

async function integrationsApi(body){ try{ const r=await fetch('/integrations.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({svc:SVC,...body})}); return await r.json(); }catch(e){ return {ok:false,error:'Request failed'}; } }
async function renderIntegration(mod){
  const d=CONNECTORS[mod]; if(!d) return renderFramework(mod);
  $('view').innerHTML=`<div class="card"><h3>${esc(d.title)}</h3><p class="muted">Loading…</p></div>`;
  const r=await integrationsApi({action:'status'});

  // connection to a scary "Not connected"; show a transient checking state + retry.
  if(!r||!r.ok){ $('view').innerHTML=`<div class="card" style="max-width:680px"><div style="font-size:30px">${d.icon}</div><h3 style="margin:6px 0">${esc(d.title)} <span class="badge tag">Checking…</span></h3><p class="muted" style="font-size:13px">Couldn't reach the integration service (this can happen briefly during a deploy). Retrying…</p><button class="btn btn-sm" onclick="renderIntegration('${mod}')">Retry now</button></div>`; setTimeout(()=>{ if(typeof VIEW==='undefined'||VIEW===mod) renderIntegration(mod); },5000); return; }
  const st=(r.connectors&&r.connectors[d.conn])||{configured:false,connected:false,fields:{}};
  const fv=st.fields||{};
  const fieldsHtml=d.fields.map(f=>{ const saved=fv[f.key]||''; const ph=(f.secret&&saved)?('Saved ('+esc(saved)+') — leave blank to keep'):esc(f.ph||''); return `<label class="fl">${esc(f.label)}</label><input id="ig_${f.key}" type="${f.secret?'password':'text'}" value="${f.secret?'':esc(saved)}" placeholder="${ph}" autocomplete="off">`; }).join('');

  // Top badge reflects the REAL state: live connection > configured-but-not-signed-in > nothing.
  const badge = st.connected ? '<span class="badge active">Connected</span>'

    : '<span class="badge tag">Not connected</span>');
  $('view').innerHTML=`<div class="card" style="max-width:680px"><div style="font-size:30px">${d.icon}</div>
    <h3 style="margin:6px 0">${esc(d.title)} ${badge}</h3>

    ${oauth}
    <p class="muted" style="font-size:12px;margin-top:12px;line-height:1.6">${esc(d.help)}</p>
    <p class="muted" style="font-size:11px">Credentials are stored server-side in the protected <code>auth/</code> folder — never returned to the browser or shipped in the website code.</p></div>`;
}
async function saveIntegration(mod){

function aiCopy(id){ const el=$(id); if(el.select)el.select(); const t=el.value!=null?el.value:el.textContent||''; if(navigator.clipboard)navigator.clipboard.writeText(t).catch(()=>{}); }
function aiDownload(id){ const el=$(id); const t=el.value!=null?el.value:el.textContent||''; const b=new Blob([t],{type:'text/markdown'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='imigrate-content-'+Date.now()+'.md'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }

/* ---- Publish an AI blog draft into the Blogs CMS (via the CMS's own API) ---- */
function aiCanBlog(){ return PERMS.all || can('cms.blogs','create'); }
async function cmsApi(body){ try{ const r=await fetch('/cms-content.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:SVC,...body})}); return await r.json(); }catch(e){ return {ok:false,error:'CMS request failed'}; } }
function aiSlugify(s){ return (s||'').toLowerCase().replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-').replace(/-+/g,'-').slice(0,80); }
function aiParseBlog(md, fallbackTitle){
  md=md||''; let title='', metaTitle='', metaDescription='';
  for(const l of md.split('\n')){ const m=l.match(/^#\s+(.+)/); if(m){ title=m[1].trim(); break; } }
  if(!title) title=(fallbackTitle||'Untitled').slice(0,120);
  let body=md;
  const seoIdx=md.search(/\n#{1,6}\s*SEO\b/i);
  if(seoIdx>=0){ const seo=md.slice(seoIdx); body=md.slice(0,seoIdx).trim();
    const mt=seo.match(/meta\s*title[^\n:]*[:\-]\s*(.+)/i); if(mt) metaTitle=mt[1].replace(/\(\s*\d+[^)]*\)/g,'').replace(/["'`*]/g,'').trim();
    const md2=seo.match(/meta\s*desc[^\n:]*[:\-]\s*(.+)/i); if(md2) metaDescription=md2[1].replace(/\(\s*\d+[^)]*\)/g,'').replace(/["'`*]/g,'').trim();
  }
  body=body.replace(/^#\s+.+(\n|$)/,'').trim();
  const plain=body.replace(/\[(.*?)\]\(.*?\)/g,'$1').replace(/[#*_`>]/g,' ').replace(/\s+/g,' ').trim();
  const excerpt=plain.slice(0,180);
  if(!metaTitle) metaTitle=title.slice(0,60);
  if(!metaDescription) metaDescription=excerpt.slice(0,155);
  return {title,metaTitle,metaDescription,content:body,excerpt};
}
async function aiToBlog(content, fallbackTitle, type){
  if(!aiCanBlog()){ alert('You do not have permission to create blog posts.'); return; }
  if(!content||!content.trim()){ alert('No content to publish yet — generate or open something first.'); return; }
  if(type && type!=='blog' && !confirm('This content was created as “'+TYPE_LABEL(type)+'”. Create a BLOG draft from it anyway?')) return;
  const cat=prompt('Blog category for this draft:', 'Immigration News'); if(cat===null) return;
  const meta=aiParseBlog(content, fallbackTitle);
  const today=new Date().toISOString().slice(0,10);
  const words=(content.match(/\S+/g)||[]).length; const readTime=Math.max(1,Math.round(words/200));
  const load=await cmsApi({action:'load',domain:'blog'});
  if(!load.ok){ alert('Could not reach the Blogs CMS: '+(load.error||'')); return; }
  const data=(load.data&&Array.isArray(load.data.posts))?load.data:{posts:[]};
  let slug=aiSlugify(meta.title)||('post-'+Date.now()), base=slug, n=2;
  while(data.posts.some(x=>x.slug===slug)){ slug=base+'-'+n; n++; }
  data.posts.unshift({ title:meta.title, slug, excerpt:meta.excerpt, author:USER.name||'iMigrate Migration Solutions', category:cat||'Immigration News', tags:[], featuredImage:'', imageAlt:meta.title, readTime, publishedDate:today, draft:true, metaTitle:meta.metaTitle, metaDescription:meta.metaDescription, content:meta.content, faqs:[] });
  const save=await cmsApi({action:'save',domain:'blog',data,editor:(USER.name||'AI Studio')});
  if(save.ok){ if(confirm('Saved to Blogs CMS as a DRAFT ✓\n\nIt stays hidden from the public site until you publish it. Open the Blogs CMS now to review & publish?')) window.open('/cms.html#m=blog','_blank'); }
  else alert('Save to Blogs CMS failed: '+(save.error||''));
}

/* ---- Save an AI email draft as a reusable CRM email template (via the CRM API) ---- */
function aiCanEmail(){ return PERMS.all || can('mkt.email','create') || can('crm.leads','create'); }
async function crmEmailApi(body){ try{ const r=await fetch('/crm-email.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:SVC,...body})}); return await r.json(); }catch(e){ return {ok:false,error:'CRM request failed'}; } }
function aiEmailParse(md, fallbackName){
  md=(md||'').replace(/\r/g,''); const lines=md.split('\n');
  let subject='';
  for(const l of lines){ const m=l.match(/subject(?:\s*line)?\s*\d*\s*[:)\-]\s*(.+)/i); if(m){ subject=m[1].replace(/[*"'`]/g,'').replace(/\(\s*\d+[^)]*\)/g,'').trim(); break; } }
  if(!subject){ const h=lines.find(l=>/^#{1,6}\s+/.test(l)); if(h)subject=h.replace(/^#{1,6}\s+/,'').replace(/[*"'`]/g,'').trim(); }
  if(!subject)subject=(fallbackName||'iMigrate email').slice(0,120);
  const skip=/^\s*(?:[-*]\s*|\d+[.)]\s*)?(subject|preview|preheader|pre-header)\b/i;
  const bodyLines=lines.filter(l=>!skip.test(l));
  const escH=(s)=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fmt=(s)=>escH(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\[(.+?)\]\((https?:[^)]+)\)/g,'<a href="$2">$1</a>');
  const blocks=bodyLines.join('\n').split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean);
  const html=blocks.map(b=>/^#{1,6}\s+/.test(b)?('<p><strong>'+fmt(b.replace(/^#{1,6}\s+/,''))+'</strong></p>'):('<p>'+fmt(b).replace(/\n/g,'<br>')+'</p>')).join('\n');
  return { subject:subject.slice(0,200), html: html||'<p></p>' };
}
async function aiToEmailTemplate(content, fallbackName){
  if(!aiCanEmail()){ alert('You do not have permission to manage email templates.'); return; }
  if(!content||!content.trim()){ alert('No content to save yet — generate or open an email first.'); return; }
  const name=prompt('Template name (shown in the CRM compose dropdown):', (fallbackName||'AI email').slice(0,60));
  if(name===null||!name.trim()) return;
  const {subject,html}=aiEmailParse(content, name);
  const r=await crmEmailApi({action:'template-save',name:name.trim(),subject,body:html,source:'ai',author:USER.name||'AI Studio'});
  if(r&&r.ok){ alert('Saved to CRM email templates ✓\n\nIt now appears in CRM → lead → Emails → Template dropdown. Use {{name}} {{occupation}} {{points}} {{visas}} for per-lead personalisation.'); }
  else alert('Save failed: '+((r&&r.error)||''));
}
