<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>iMigrate CRM</title>
<style>
  :root{
    --bg:#f4f6fb; --panel:#fff; --text:#0f172a; --muted:#64748b; --border:#e2e8f0;
    --navy:#0b1f44; --accent:#c8a24a; --cta:#e11d2a; --ok:#1a7f37; --warn:#b45309;
    --hot:#e11d2a; --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  }
  [data-theme="dark"]{
    --bg:#0b1220; --panel:#111a2e; --text:#e6edf6; --muted:#94a3b8; --border:#22304b;
    --navy:#0e2a5c; --shadow:0 1px 3px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}
  a{color:inherit}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer}
  .btn{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600}
  .btn:hover{border-color:var(--accent)}
  .btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
  .btn-cta{background:var(--cta);color:#fff;border-color:var(--cta)}
  .btn-sm{padding:4px 9px;font-size:12px}
  input,select,textarea{font-family:inherit;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;width:100%}
  /* Gate */
  #gate{max-width:380px;margin:12vh auto;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:var(--shadow);text-align:center}
  #gate h1{font-size:20px;margin:0 0 4px} #gate p{color:var(--muted);font-size:13px;margin:0 0 18px}
  /* App shell */
  #app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
  .sidebar{background:var(--navy);color:#cdd7ea;padding:16px 12px;position:sticky;top:0;height:100vh;overflow:auto}
  .sidebar .brand{display:flex;align-items:center;gap:8px;color:#fff;font-weight:800;font-size:18px;padding:6px 8px 16px}
  .sidebar .brand span{color:var(--accent)}
  .navitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:#cdd7ea;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:2px}
  .navitem.active,.navitem:hover{background:rgba(255,255,255,.1);color:#fff}
  .navitem .ic{width:18px;text-align:center}
  .main{padding:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:5}
  .topbar h2{margin:0;font-size:18px}
  .content{padding:22px}
  /* Cards / stats */
  .grid{display:grid;gap:14px}
  .stats{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
  .stat{text-align:left;cursor:pointer;transition:transform .08s,border-color .12s;width:100%;border:1px solid var(--border)}
  .stat:hover{transform:translateY(-2px);border-color:var(--accent)}
  .stat .n{font-size:28px;font-weight:800;color:var(--navy)} [data-theme="dark"] .stat .n{color:#fff}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:2px}
  .stat .hint{font-size:11px;color:var(--accent);margin-top:6px;font-weight:600}
  /* Table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--muted);font-weight:600;padding:10px;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--panel)}
  td{padding:10px;border-bottom:1px solid var(--border)}
  tbody tr.clk{cursor:pointer} tbody tr.clk:hover{background:rgba(0,0,0,.025)} [data-theme="dark"] tbody tr.clk:hover{background:rgba(255,255,255,.04)}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
  .badge.hot{background:var(--hot);color:#fff}
  .badge.cold{background:#e2e8f0;color:#475569} .badge.warm{background:#fef3c7;color:#92400e}
  .badge.hotcat{background:#fee2e2;color:#b91c1c} .badge.ready{background:#dcfce7;color:#166534}
  .badge.ai{background:#ede9fe;color:#6d28d9} .badge.std{background:#e0f2fe;color:#0369a1}
  [data-theme="dark"] .badge.ai{background:#4c1d95;color:#ede9fe} [data-theme="dark"] .badge.std{background:#0c4a6e;color:#e0f2fe}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(11,31,68,.08);color:var(--navy)} [data-theme="dark"] .pill{background:rgba(255,255,255,.1);color:#fff}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .toolbar input,.toolbar select{width:auto}
  .toolbar input[type=search]{min-width:220px}
  /* Kanban */
  .kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px}
  .kcol{min-width:230px;max-width:230px;background:var(--panel);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;max-height:72vh}
  .kcol h4{margin:0;padding:10px 12px;font-size:12.5px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
  .kbody{padding:8px;overflow:auto;flex:1;min-height:40px}
  .kcard{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px;margin-bottom:8px;font-size:12px;cursor:grab}
  .kcard.drag{opacity:.4} .kcol.over{outline:2px dashed var(--accent)}
  .kcard .nm{font-weight:700} .kcard .meta{color:var(--muted);margin-top:2px}
  /* Profile */
  .pf-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .pf-name{font-size:24px;font-weight:800;color:var(--navy)} [data-theme="dark"] .pf-name{color:#fff}
  .pf-sub{color:var(--muted);font-size:14px;margin-top:2px}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:16px}
  .tab{padding:8px 14px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer}
  .tab.active{color:var(--navy);border-bottom-color:var(--accent)} [data-theme="dark"] .tab.active{color:#fff}
  .tab .cnt{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:0 6px;margin-left:4px}
  .kv{display:flex;gap:10px;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border)} .kv:last-child{border-bottom:none}
  .kv .k{min-width:150px;color:var(--muted)}
  .sect h3{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 10px}
  .note{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;margin-bottom:8px} .note .t{color:var(--muted);font-size:11px;margin-top:4px;display:flex;gap:8px;justify-content:space-between}
  .rec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
  .rec-card{border:1px solid var(--border);border-radius:10px;padding:12px;background:var(--bg)}
  .rec-card h4{margin:0 0 8px;font-size:13px;display:flex;align-items:center;gap:6px}
  .rec-card ul{margin:0;padding-left:18px;font-size:13px;line-height:1.5}
  .rec-card.green{border-left:3px solid var(--ok)} .rec-card.red{border-left:3px solid var(--cta)}
  .rec-card.amber{border-left:3px solid var(--warn)} .rec-card.navy{border-left:3px solid var(--navy)}
  .ui-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
  .ui-item{border:1px solid var(--border);border-radius:9px;padding:10px 12px;background:var(--bg)}
  .ui-item .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  .ui-item .val{font-size:15px;font-weight:700;margin-top:3px}
  .ui-item .pts{font-size:11px;color:var(--accent);font-weight:600;margin-top:2px}
  .tl{position:relative;padding-left:18px} .tl::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border)}
  .tl-item{position:relative;padding:0 0 14px 6px;font-size:13px} .tl-item::before{content:"";position:absolute;left:-16px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .tl-item .t{color:var(--muted);font-size:11px}
  .status{font-size:13px} .ok{color:var(--ok)} .err{color:var(--cta)}
  .muted{color:var(--muted)} .right{text-align:right}
  @media(max-width:820px){#app{grid-template-columns:1fr}.sidebar{position:static;height:auto;display:flex;flex-wrap:wrap;gap:6px}.sidebar .brand{width:100%}.navitem{flex:1 0 auto}.kv .k{min-width:110px}}
</style>
</head>
<body data-theme="light">

<!-- Password gate -->
<div id="gate">
  <h1>iMigrate <span style="color:var(--accent)">CRM</span></h1>
  <p>Sign in to access the immigration CRM</p>
  <input id="pw" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()" />
  <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="unlock()">Sign in</button>
  <p id="gateMsg" class="status err" style="margin-top:12px"></p>
</div>

<!-- App -->
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="brand">iMigrate <span>CRM</span></div>
    <div class="navitem active" data-view="dashboard" onclick="go('dashboard')"><span class="ic">📊</span> Dashboard</div>
    <div class="navitem" data-view="leads" onclick="go('leads')"><span class="ic">👥</span> CRM / Leads</div>
    <div class="navitem" data-view="pipeline" onclick="go('pipeline')"><span class="ic">🗂️</span> Pipeline</div>
    <div class="navitem" data-view="reports" onclick="go('reports')"><span class="ic">📄</span> Reports</div>
    <div class="navitem" data-view="tasks" onclick="go('tasks')"><span class="ic">✅</span> Tasks &amp; Follow-Ups</div>
    <div class="navitem" data-view="settings" onclick="go('settings')"><span class="ic">⚙️</span> Settings</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h2 id="viewTitle">Dashboard</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="loadMsg" class="status muted"></span>
        <button class="btn btn-sm" onclick="loadAll()">↻ Refresh</button>
        <button class="btn btn-sm" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
        <button class="btn btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const PW = () => sessionStorage.getItem('imig_crm_pw') || '';
  const CRM_USER = () => localStorage.getItem('imig_crm_user') || 'Consultant';
  let LEADS = [], CONTACTS = [], META = {}, TASKS = [], REPORTS = [], VIEW = 'dashboard';
  let PROFILE_KEY = null, PROFILE_TAB = 'contact';

  const STAGES = ['New Lead','Contact Attempted','CV Requested','CV Received','Assessment Completed','Consultation Booked','Consultation Completed','Qualified','Agreement Sent','Payment Received','Application Preparation','Application Submitted','Visa Approved','Lost Opportunity'];

  const esc = (v) => (v==null?'':String(v)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const fmtDT = (s) => (s||'').slice(0,16).replace('T',' ');

  /* ---------- auth ---------- */
  async function unlock(){
    const pw = $('pw').value.trim(); const m=$('gateMsg');
    if(!pw){m.textContent='Enter the password.';return;}
    m.textContent='Checking…';
    try{
      const r = await fetch('/admin-verify.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
      const j = await r.json().catch(()=>({}));
      if(!r.ok||!j.ok){m.textContent=j.error||'Incorrect password.';return;}
    }catch(e){m.textContent='Could not reach the server.';return;}
    sessionStorage.setItem('imig_crm_pw',pw);
    $('gate').classList.add('hidden'); $('app').classList.remove('hidden');
    if(localStorage.getItem('imig_crm_theme')==='dark') setTheme('dark');
    await loadAll();
  }
  function logout(){ sessionStorage.removeItem('imig_crm_pw'); location.reload(); }

  /* ---------- data ---------- */
  async function api(url, body){
    const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW(),author:CRM_USER(),...body})});
    return r.json().catch(()=>({ok:false}));
  }
  async function loadAll(){
    const m=$('loadMsg'); m.textContent='Loading…';
    try{
      const [lr, mr, tr, rr] = await Promise.all([
        api('/leads-read.php',{action:'list'}),
        api('/crm-meta.php',{action:'list'}),
        api('/crm-tasks.php',{action:'list'}),
        api('/crm-reports.php',{action:'list'}),
      ]);
      LEADS = lr.leads||[]; META = mr.meta||{}; TASKS = tr.tasks||[]; REPORTS = rr.reports||[];
      buildContacts();
      m.textContent = CONTACTS.length+' contacts · '+REPORTS.length+' reports';
      render();
    }catch(e){ m.textContent='✗ Load failed (PHP enabled?)'; }
  }

  /* A submission is an AI assessment if it came from the AI eligibility flow. */
  function isAISubmission(s){
    const f=s.fields||{}; const name=(s.formName||'').toLowerCase();
    return /ai|eligibility|assessment/.test(name) || !!f.aiRecommendations || (!!f.pointsScore && !!f.anzscoCode);
  }

  function buildContacts(){
    const byEmail = {};
    LEADS.forEach(l=>{
      const f=l.fields||{}; const email=(f.email||'').toLowerCase().trim();
      const key = email || ('id:'+l.id);
      if(!byEmail[key]) byEmail[key]={ckey:key,email,submissions:[]};
      byEmail[key].submissions.push(l);
    });
    CONTACTS = Object.values(byEmail).map(c=>{
      c.submissions.sort((a,b)=>(a.timestamp||'').localeCompare(b.timestamp||''));
      const first=c.submissions[0], last=c.submissions[c.submissions.length-1];
      const fld=(k)=>{for(let i=c.submissions.length-1;i>=0;i--){const v=(c.submissions[i].fields||{})[k];if(v)return v;}return '';};
      const meta = META[c.ckey] || META[c.email] || {};
      const ov = meta.overrides || {};
      const g = (k,alt)=> (ov[k]!=null && ov[k]!=='') ? ov[k] : (fld(k)|| (alt?fld(alt):'') );
      const points=parseInt(g('pointsScore','points')||'0',10)||0;
      const visas=g('eligibleVisaSubclasses')||'';
      const visasCount=visas?visas.split(',').filter(Boolean).length:0;
      const hasCV=c.submissions.some(s=>(s.fields||{}).cvFile);
      const reports=c.submissions.filter(s=>((s.fields||{}).pointsScore)||((s.fields||{}).occupation));
      const isAI = c.submissions.some(isAISubmission);
      let score=0;
      if(reports.length) score+=10;
      if(points>=65) score+=20;
      if(visasCount>2) score+=15;
      if(/189/.test(visas)) score+=10;
      if(hasCV) score+=20;
      if(c.submissions.length>1) score+=10;
      let cat='Cold'; if(score>=60)cat='Sales Ready'; else if(score>=40)cat='Hot'; else if(score>=20)cat='Warm';
      const hot = score>=40 || (points>=65 && visasCount>2);
      const storedReports = REPORTS.filter(r=>r.ckey===c.ckey || (c.email && (r.leadEmail||'').toLowerCase()===c.email));
      return {
        ckey:c.ckey, email:c.email, name:g('fullName','name')||'(no name)', phone:g('phone'),
        whatsapp:g('whatsapp')||g('phone'), country:g('nationality')||g('citizenship')||g('residence')||g('country')||'',
        occupation:g('occupation'), anzsco:g('anzscoCode'), points, visas, visasCount,
        recommendations:g('aiRecommendations'), userInputs:g('userInputs'),
        eligibilityStatus:g('eligibilityStatus'), assessmentDate:g('assessmentDate')||(reports.length?(reports[reports.length-1].timestamp||'').slice(0,10):''),
        source:g('leadSource')||g('source')||last.formName||'', firstSource:(first.fields||{}).leadSource||(first.fields||{}).source||first.formName||'',
        firstDate:(first.timestamp||'').slice(0,10), latestDate:(last.timestamp||'').slice(0,10),
        hasCV, cvFiles:c.submissions.filter(s=>(s.fields||{}).cvFile).map(s=>({file:(s.fields||{}).cvFile,name:(s.fields||{}).cvOriginalName||(s.fields||{}).cvFile,at:s.timestamp})),
        reports, storedReports, submissions:c.submissions, score, cat, hot, isAI,
        sourceType: isAI?'AI':'Standard',
        stage: meta.stage || (reports.length?'Assessment Completed':'New Lead'),
        notes: meta.notes || [], activity: meta.activity || [], overrides: ov,
      };
    });
    CONTACTS.sort((a,b)=>(b.latestDate||'').localeCompare(a.latestDate||''));
  }

  /* ---------- nav / render ---------- */
  function go(v){ VIEW=v; PROFILE_KEY=null; document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('active',n.dataset.view===v)); render(); }
  function render(){
    const titles={dashboard:'Dashboard',leads:'CRM / Leads',pipeline:'Immigration Pipeline',reports:'AI Assessment Reports',tasks:'Tasks & Follow-Ups',settings:'Settings',profile:'Lead Profile'};
    $('viewTitle').textContent=titles[VIEW]||'';
    if(VIEW==='profile'){ renderProfile(); return; }
    ({dashboard:renderDashboard,leads:renderLeads,pipeline:renderPipeline,reports:renderReports,tasks:renderTasks,settings:renderSettings}[VIEW]||renderDashboard)();
  }

  /* ---------- dashboard (clickable widgets) ---------- */
  function renderDashboard(){
    const total=CONTACTS.length;
    const wk=Date.now()-7*864e5;
    const neu=CONTACTS.filter(c=>new Date(c.latestDate).getTime()>=wk).length;
    const hot=CONTACTS.filter(c=>c.hot).length;
    const ai=CONTACTS.filter(c=>c.isAI).length;
    const std=total-ai;
    const reports=CONTACTS.filter(c=>c.reports.length).length;
    const consultStages=['Consultation Booked','Consultation Completed','Qualified','Agreement Sent','Payment Received','Application Preparation','Application Submitted','Visa Approved'];
    const consults=CONTACTS.filter(c=>consultStages.includes(c.stage)).length;
    const approvals=CONTACTS.filter(c=>c.stage==='Visa Approved').length;
    const occ={}, vis={};
    CONTACTS.forEach(c=>{ if(c.occupation)occ[c.occupation]=(occ[c.occupation]||0)+1; (c.visas||'').split(',').map(s=>s.trim()).filter(Boolean).forEach(v=>vis[v]=(vis[v]||0)+1); });
    const top=(o)=>Object.entries(o).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const stat=(n,l,fn)=>`<button class="card stat" onclick="${fn}"><div class="n">${n}</div><div class="l">${l}</div><div class="hint">View →</div></button>`;
    $('content').innerHTML=`
      <div class="grid stats" style="margin-bottom:16px">
        ${stat(total,'Total Leads',"dashGo({})")}
        ${stat(neu,'New (7 days)',"dashGo({sort:'new'})")}
        ${stat(hot,'🔥 Hot Leads',"dashGo({cat:'Hot'})")}
        ${stat(ai,'AI Assessment Leads',"dashGo({type:'AI'})")}
        ${stat(std,'Standard Leads',"dashGo({type:'Standard'})")}
        ${stat(reports,'Reports Generated',"go('reports')")}
        ${stat(consults,'Consultations',"dashGo({stage:'Consultation Booked'})")}
        ${stat(approvals,'Visa Approvals',"dashGo({stage:'Visa Approved'})")}
      </div>
      <div class="grid" style="grid-template-columns:1fr 1fr">
        <div class="card"><h3 style="margin:0 0 10px">Top occupations</h3>${top(occ).map(([k,v])=>`<div class="kv"><span class="k" style="min-width:0;flex:1">${esc(k)}</span><span class="pill">${v}</span></div>`).join('')||'<span class="muted">No data yet</span>'}</div>
        <div class="card"><h3 style="margin:0 0 10px">Most recommended visa subclasses</h3>${top(vis).map(([k,v])=>`<div class="kv"><span class="k" style="min-width:0;flex:1">${esc(k)}</span><span class="pill">${v}</span></div>`).join('')||'<span class="muted">No data yet</span>'}</div>
      </div>`;
  }
  function dashGo(filter){ leadFilter={q:'',stage:filter.stage||'',cat:filter.cat||'',type:filter.type||'',sort:filter.sort||''}; go('leads'); }

  /* ---------- leads list ---------- */
  let leadFilter={q:'',stage:'',cat:'',type:'',sort:''};
  function renderLeads(){
    const stageOpts=['',...STAGES].map(s=>`<option value="${s}" ${s===leadFilter.stage?'selected':''}>${s||'All stages'}</option>`).join('');
    const catOpts=['','Cold','Warm','Hot','Sales Ready'].map(s=>`<option value="${s}" ${s===leadFilter.cat?'selected':''}>${s||'All scores'}</option>`).join('');
    const typeOpts=[['','All leads'],['AI','AI leads'],['Standard','Standard leads']].map(([v,l])=>`<option value="${v}" ${v===leadFilter.type?'selected':''}>${l}</option>`).join('');
    let rows=CONTACTS.filter(c=>{
      const q=leadFilter.q.toLowerCase();
      if(q && !(`${c.name} ${c.email} ${c.phone} ${c.occupation}`.toLowerCase().includes(q))) return false;
      if(leadFilter.stage && c.stage!==leadFilter.stage) return false;
      if(leadFilter.cat && c.cat!==leadFilter.cat) return false;
      if(leadFilter.type && c.sourceType!==leadFilter.type) return false;
      if(leadFilter.sort==='new'){ const wk=Date.now()-7*864e5; if(new Date(c.latestDate).getTime()<wk) return false; }
      return true;
    });
    $('content').innerHTML=`
      <div class="toolbar">
        <input type="search" id="lq" placeholder="Search name, email, phone, occupation…" value="${esc(leadFilter.q)}" oninput="leadFilter.q=this.value;renderLeads();document.getElementById('lq').focus()">
        <select onchange="leadFilter.type=this.value;renderLeads()">${typeOpts}</select>
        <select onchange="leadFilter.stage=this.value;renderLeads()">${stageOpts}</select>
        <select onchange="leadFilter.cat=this.value;renderLeads()">${catOpts}</select>
        <span class="muted">${rows.length} lead(s)</span>

  /* ---------- parsing helpers ---------- */
  function parseUserInputs(str){
    if(!str) return [];
    return str.split(/;\s*/).map(part=>{
      const m=part.match(/^(.*?):\s*(.*?)(?:\s*\(([^)]*)\))?\s*$/);
      if(!m) return null;
      return {label:(m[1]||'').trim(), choice:(m[2]||'').trim(), points:(m[3]||'').trim()};
    }).filter(x=>x&&x.label);
  }
  function parseRecs(str){ return str ? str.split(/\s*\|\s*/).map(s=>s.trim()).filter(Boolean) : []; }
  function bucketRecs(recs){
    const b={strengths:[],risks:[],improve:[],next:[]};
    recs.forEach(r=>{
      const t=r.toLowerCase();
      if(/you meet|widest range|access to|strong|eligible for the/.test(t)) b.strengths.push(r);
      else if(/below|not available|competitive|risk|gap/.test(t)) b.risks.push(r);
      else if(/obtain|book|consultation|before lodging|skills assessment/.test(t)) b.next.push(r);
      else b.improve.push(r);
    });
    return b;
  }

          ${c.phone?`<a class="btn btn-sm" href="tel:${esc(c.phone)}">📞 Call</a>`:''}
          ${c.whatsapp?`<a class="btn btn-sm" target="_blank" href="https://wa.me/${esc((c.whatsapp||'').replace(/[^0-9]/g,''))}">💬 WhatsApp</a>`:''}

  /* ---------- editable fields ---------- */
  function editFields(ckey){
    const c=findByKey(ckey); if(!c) return;
    const f=(lab,id,val)=>`<div style="margin-bottom:8px"><label class="muted" style="font-size:12px">${lab}</label><input id="ef_${id}" value="${esc(val||'')}"></div>`;
    $('tabBody').innerHTML=`<div class="card"><div class="sect"><h3>Edit lead</h3>
      <div class="ui-grid">
        ${f('Full Name','fullName',c.name==='(no name)'?'':c.name)}${f('Email','email',c.email)}${f('Mobile','phone',c.phone)}${f('WhatsApp','whatsapp',c.whatsapp)}
        ${f('Country','country',c.country)}${f('Occupation','occupation',c.occupation)}${f('ANZSCO Code','anzscoCode',c.anzsco)}${f('Points Score','pointsScore',c.points||'')}
        ${f('Visa Subclasses','eligibleVisaSubclasses',c.visas)}
      </div>
      <div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-sm btn-primary" onclick="saveFields('${esc(ckey)}')">Save changes</button><button class="btn btn-sm" onclick="setTab('contact')">Cancel</button></div>
      <p class="muted" style="font-size:12px;margin-top:8px">Edits are stored as CRM overrides (the original submission is preserved) and logged in the activity timeline.</p>
    </div></div>`;
  }
  async function saveFields(ckey){
    const ids=['fullName','email','phone','whatsapp','country','occupation','anzscoCode','pointsScore','eligibleVisaSubclasses'];
    const fields={}; ids.forEach(id=>{ const el=$('ef_'+id); if(el) fields[id]=el.value; });
    const c=findByKey(ckey);
    const r=await api('/crm-meta.php',{action:'save-fields',key:ckey,email:c?c.email:'',fields});
    if(r.ok){ META[ckey]=r.meta; buildContacts(); PROFILE_TAB='contact'; renderProfile(); }
    else alert('Could not save.');
  }

  /* ---------- stage / notes ---------- */
  async function setStage(ckey,stage){
    const c=findByKey(ckey); if(c)c.stage=stage;
    const r=await api('/crm-meta.php',{action:'set-stage',key:ckey,email:c?c.email:'',stage});
    if(r.ok){ META[ckey]=r.meta; if(c){c.activity=r.meta.activity||c.activity;} if(VIEW==='pipeline')renderPipeline(); }
  }
  async function addNote(ckey){
    const t=$('noteIn'); const note=t?t.value.trim():''; if(!note)return;
    const c=findByKey(ckey);
    const r=await api('/crm-meta.php',{action:'add-note',key:ckey,email:c?c.email:'',note});
    if(r.ok){ META[ckey]=r.meta; if(c){c.notes=r.meta.notes||[];c.activity=r.meta.activity||[];} renderProfile(); }
    else alert('Could not save note.');
  }
  async function editNote(ckey,noteId){
    const c=findByKey(ckey); const n=(c.notes||[]).find(x=>x.id===noteId); if(!n)return;
    const note=prompt('Edit note:',n.text); if(note==null)return;
    const r=await api('/crm-meta.php',{action:'edit-note',key:ckey,email:c.email,noteId,note});
    if(r.ok){ META[ckey]=r.meta; c.notes=r.meta.notes||[]; renderProfile(); }
  }
  async function delNote(ckey,noteId){
    if(!confirm('Delete this note?'))return;
    const c=findByKey(ckey);
    const r=await api('/crm-meta.php',{action:'delete-note',key:ckey,email:c.email,noteId});
    if(r.ok){ META[ckey]=r.meta; c.notes=r.meta.notes||[]; c.activity=r.meta.activity||[]; renderProfile(); }
  }
  async function dlCv(file,orig){
    const r=await fetch('/lead-file.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW(),file})});
    if(!r.ok){alert('File not available.');return;}
    const b=await r.blob();const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=orig||file;a.click();
  }

  /* ---------- tasks (profile + global) ---------- */
  async function addProfileTask(ckey,email){
    const title=$('ptTitle').value.trim(); if(!title)return;
    const body={action:'add',title,type:$('ptType').value,due:$('ptDue').value,priority:$('ptPriority').value,leadEmail:email};

  async function delTaskP(id){ const r=await api('/crm-tasks.php',{action:'delete',id}); if(r.ok){TASKS=r.tasks;renderProfile();} }

  /* ---------- reports (reconstruct + store + actions) ---------- */
  function buildReportHtml(c){

      <h2>Candidate summary</h2>
      <table>${row('Name',c.name)}${row('Occupation',c.occupation)}${row('ANZSCO Code',c.anzsco)}${row('Points Score',(c.points||'—')+' / 65 minimum')}${row('Eligible visa pathways',c.visas)}${row('Assessment date',c.assessmentDate)}${row('Preliminary status',c.eligibilityStatus)}</table>
      ${items.length?`<h2>Your inputs</h2><table>${items.map(i=>row(i.label,i.choice+(i.points?' ('+i.points+' pts)':''))).join('')}</table>`:''}

      </body></html>`;

  function openHtmlWindow(html){
    const w=window.open('','_blank');
    if(!w){ alert('Please allow pop-ups to view/print the report.'); return; }
    w.document.open(); w.document.write(html); w.document.close();
  }
  async function reportHtmlFor(c, id){
    if(id){ const r=await api('/crm-reports.php',{action:'get',id}); if(r.ok && r.report && r.report.html) return r.report.html; }
    return buildReportHtml(c);
  }
  async function viewReport(ckey,id){ const c=findByKey(ckey); openHtmlWindow(await reportHtmlFor(c,id)); }
  async function downloadPdf(ckey,id){ const c=findByKey(ckey); openHtmlWindow(await reportHtmlFor(c,id)); } /* opens print-ready; user saves as PDF */
  async function emailReport(ckey,id){
    const c=findByKey(ckey);
    if(!c.email){ alert('This lead has no email address on file.'); return; }
    if(!confirm('Email the assessment report to '+c.email+'?'))return;
    const html=await reportHtmlFor(c,id);
    const r=await fetch('/send-report.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      name:c.name,email:c.email,mobile:c.phone,subject:'Your Australia Immigration Assessment Report',
      html,points:c.points,occupation:c.occupation,visas:c.visas,website:''
    })});
    const j=await r.json().catch(()=>({}));
    await api('/crm-meta.php',{action:'log',key:ckey,email:c.email,event:'Report emailed',detail:c.email});
    alert(j.ok?'Report emailed to '+c.email:'Email could not be sent (mail() may be limited on this host).');
    loadAll();
  }
  async function regenerateReport(ckey){
    const c=findByKey(ckey);
    const html=buildReportHtml(c);
    const r=await api('/crm-reports.php',{action:'save',key:ckey,email:c.email,name:c.name,occupation:c.occupation,anzsco:c.anzsco,points:String(c.points||''),visas:c.visas,eligibilityStatus:c.eligibilityStatus,html,source:'CRM regenerate'});
    if(r.ok){ await api('/crm-meta.php',{action:'log',key:ckey,email:c.email,event:'Report regenerated',detail:'v'+r.version}); alert('Report regenerated (version '+r.version+').'); loadAll(); }
    else alert('Could not save report.');
  }

      ${reps.length?`<table><thead><tr><th>Version</th><th>Source</th><th>Points</th><th>Date</th><th>Notes</th><th class="right">Actions</th></tr></thead>
        <tbody>${reps.map(r=>`<tr><td>v${esc(r.version)} <span class="muted">${esc(r.origin||'')}</span></td><td class="muted">${esc(r.source||'')}</td><td>${esc(r.points||'—')}</td><td class="muted">${esc((r.at||'').slice(0,10))}</td><td>${(r.notes||[]).length||0}</td><td class="right">${actions(r.id)}</td></tr>`).join('')}</tbody></table>`
        :'<p class="muted">No stored report versions yet. Use “View current report” to generate one from the assessment data, or “Regenerate &amp; save version” to store a copy. New website assessments are stored automatically.</p>'}
      </div></div>`;
  }

  /* ---------- reports view (global) ---------- */
  function renderReports(){
    const reps=CONTACTS.filter(c=>c.isAI || c.reports.length || c.storedReports.length);
    $('content').innerHTML=`<div class="toolbar"><span class="muted">${reps.length} lead(s) with assessment reports · ${REPORTS.length} stored version(s)</span></div>
      <div class="card" style="padding:0;overflow:auto"><table><thead><tr><th>Lead</th><th>Type</th><th>Occupation</th><th>Points</th><th>Visa pathways</th><th>Versions</th><th>Stage</th><th class="right">Actions</th></tr></thead>
      <tbody>${reps.map(c=>`<tr>
        <td class="clk" onclick="openProfile('${esc(c.ckey)}')"><strong>${esc(c.name)}</strong> ${c.hot?'<span class="badge hot">HOT</span>':''}<div class="muted">${esc(c.email||'')}</div></td>
        <td><span class="badge ${c.isAI?'ai':'std'}">${c.sourceType}</span></td>
        <td>${esc(c.occupation||'—')}</td><td>${c.points||'—'}</td><td class="muted">${esc(c.visas||'—')}</td>
        <td>${c.storedReports.length||'—'}</td><td><span class="pill">${esc(c.stage)}</span></td>
        <td class="right"><button class="btn btn-sm" onclick="viewReport('${esc(c.ckey)}','')">View</button>
        <button class="btn btn-sm" onclick="downloadPdf('${esc(c.ckey)}','')">PDF</button>
        <button class="btn btn-sm" onclick="emailReport('${esc(c.ckey)}','')">Email</button>
        <button class="btn btn-sm" onclick="openProfile('${esc(c.ckey)}')">Open</button></td></tr>`).join('')||'<tr><td colspan="8" class="muted" style="padding:20px">No reports yet.</td></tr>'}</tbody></table></div>`;
  }

  /* ---------- pipeline (kanban) ---------- */
  let dragKey=null;
  function renderPipeline(){
    const cols=STAGES.map(stage=>{
      const cards=CONTACTS.filter(c=>c.stage===stage);
      return `<div class="kcol" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="dropCard(event,'${esc(stage)}')">
        <h4><span>${stage}</span><span class="pill">${cards.length}</span></h4>
        <div class="kbody">${cards.map(c=>`<div class="kcard" draggable="true" ondragstart="dragKey='${esc(c.ckey)}';this.classList.add('drag')" ondragend="this.classList.remove('drag')" onclick="openProfile('${esc(c.ckey)}')">
          <div class="nm">${esc(c.name)} <span class="badge ${c.isAI?'ai':'std'}" style="font-size:9px">${c.sourceType}</span></div>
          <div class="meta">${esc(c.occupation||'')} ${c.points?'· '+c.points+'pts':''}</div>
        </div>`).join('')}</div>
      </div>`;
    }).join('');
    $('content').innerHTML=`<p class="muted" style="margin-top:0">Drag cards between stages. ${CONTACTS.length} contacts.</p><div class="kanban">${cols}</div>`;
  }
  function dropCard(e,stage){ e.preventDefault(); document.querySelectorAll('.kcol').forEach(k=>k.classList.remove('over')); if(dragKey){setStage(dragKey,stage).then(()=>renderPipeline());} dragKey=null; }

  /* ---------- tasks (global) ---------- */
  function renderTasks(){
    const open=TASKS.filter(t=>t.status!=='Done'), done=TASKS.filter(t=>t.status==='Done');
    const row=(t)=>`<tr><td><input type="checkbox" ${t.status==='Done'?'checked':''} style="width:auto" onchange="toggleTask('${t.id}',this.checked)"></td>
      <td>${esc(t.title)}<div class="muted">${esc(t.type)}${t.leadEmail?' · '+esc(t.leadEmail):''}</div></td>
      <td>${esc(t.due||'—')}</td><td><span class="pill">${esc(t.priority)}</span></td>
      <td class="right"><button class="btn btn-sm" onclick="delTask('${t.id}')">Delete</button></td></tr>`;
    $('content').innerHTML=`
      <div class="card" style="margin-bottom:14px">
        <h3 style="margin:0 0 10px">New task</h3>
        <div class="toolbar">
          <input id="tTitle" placeholder="Task title…" style="flex:1;min-width:200px">
          <select id="tType"><option>Call</option><option>Follow-up</option><option>Email Follow-Up</option><option>Consultation</option><option>Document Collection</option></select>
          <input id="tDue" type="date">
          <select id="tPriority"><option>Normal</option><option>High</option><option>Low</option></select>
          <input id="tEmail" placeholder="Lead email (optional)" style="min-width:180px">
          <button class="btn btn-primary btn-sm" onclick="addTask()">Add task</button>
        </div>
      </div>
      <div class="card" style="padding:0;overflow:auto"><table><thead><tr><th></th><th>Task</th><th>Due</th><th>Priority</th><th class="right"></th></tr></thead>
      <tbody>${open.map(row).join('')||'<tr><td colspan="5" class="muted" style="padding:18px">No open tasks.</td></tr>'}${done.length?`<tr><td colspan="5" class="muted" style="padding:8px 10px">Completed</td></tr>`+done.map(row).join(''):''}</tbody></table></div>`;
  }
  async function addTask(){
    const body={action:'add',title:$('tTitle').value,type:$('tType').value,due:$('tDue').value,priority:$('tPriority').value,leadEmail:$('tEmail').value};
    if(!body.title.trim())return; const r=await api('/crm-tasks.php',body); if(r.ok){TASKS=r.tasks;renderTasks();}
  }
  async function toggleTask(id,done){ const r=await api('/crm-tasks.php',{action:'update',id,status:done?'Done':'Open'}); if(r.ok){TASKS=r.tasks; if(VIEW==='profile')renderProfile();} }
  async function delTask(id){ const r=await api('/crm-tasks.php',{action:'delete',id}); if(r.ok){TASKS=r.tasks;renderTasks();} }

  /* ---------- settings ---------- */
  function renderSettings(){
    $('content').innerHTML=`
      <div class="card" style="margin-bottom:14px"><h3 style="margin:0 0 8px">Your profile</h3>
        <div style="max-width:320px"><label class="muted" style="font-size:12px">Consultant name (recorded on notes &amp; activity)</label>
        <input id="userName" value="${esc(CRM_USER())}" onchange="localStorage.setItem('imig_crm_user',this.value)"></div>
      </div>
      <div class="card" style="margin-bottom:14px"><h3 style="margin:0 0 8px">Appearance &amp; data</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn" onclick="toggleTheme()">Toggle dark / light</button>
        <button class="btn" onclick="exportCsv()">⬇ Export all leads (CSV)</button>
        <a class="btn" href="/admin.html" target="_blank">Open Admin (website content)</a></div>
      </div>
      <div class="card" style="margin-bottom:14px"><h3 style="margin:0 0 8px">Microsoft 365 integration</h3>
        <p class="muted" style="font-size:13px;line-height:1.6">The Outlook / OneDrive / Calendar integration module is scheduled for Phase 2. It will connect via Microsoft Graph once an Azure app (Client ID + Secret) is registered. Email send, inbox sync, calendar scheduling and OneDrive backup will appear here.</p>
        <span class="badge std">Phase 2 — pending Azure app</span>
      </div>
      <div class="card"><h3 style="margin:0 0 8px">CRM data &amp; deployment</h3>
        <p class="muted" style="font-size:13px;line-height:1.6">This CRM runs as a separate application layer. All CRM data — leads, pipeline stages, notes, activity, tasks and stored reports — lives in the server's protected <code>leads/</code> store and is <strong>excluded from website deploys</strong>, so publishing website content never overwrites CRM records. Use “Export CSV” for a manual backup any time.</p>
      </div>`;
  }

  /* ---------- export / theme ---------- */
  function exportCsv(){
    const cols=['name','sourceType','email','phone','whatsapp','country','occupation','anzsco','points','visas','score','cat','stage','source','firstDate','latestDate'];
    const rows=[cols.join(',')];
    CONTACTS.forEach(c=>rows.push(cols.map(k=>{let v=c[k];v=(v==null?'':String(v)).replace(/"/g,'""');return '"'+v+'"';}).join(',')));
    const blob=new Blob(['﻿'+rows.join('\r\n')],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='imigrate-crm-leads.csv';a.click();
  }
  function setTheme(t){document.body.dataset.theme=t;localStorage.setItem('imig_crm_theme',t);$('themeBtn').textContent=t==='dark'?'☀️ Light':'🌙 Dark';}
  function toggleTheme(){setTheme(document.body.dataset.theme==='dark'?'light':'dark');}
</script>
</body>
</html>
