<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>iMigrate CRM</title>
<style>
  :root{
    --bg:#f4f6fb; --panel:#fff; --text:#0f172a; --muted:#64748b; --border:#e2e8f0;
    --navy:#0b1f44; --accent:#c8a24a; --cta:#e11d2a; --ok:#1a7f37; --warn:#b45309;
    --hot:#e11d2a; --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  }
  [data-theme="dark"]{
    --bg:#0b1220; --panel:#111a2e; --text:#e6edf6; --muted:#94a3b8; --border:#22304b;
    --navy:#0e2a5c; --shadow:0 1px 3px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}
  a{color:inherit}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer}
  .btn{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600}
  .btn:hover{border-color:var(--accent)}
  .btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
  .btn-cta{background:var(--cta);color:#fff;border-color:var(--cta)}
  .btn-sm{padding:4px 9px;font-size:12px}
  input,select,textarea{font-family:inherit;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;width:100%}
  /* Gate */
  #gate{max-width:380px;margin:12vh auto;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:var(--shadow);text-align:center}
  #gate h1{font-size:20px;margin:0 0 4px} #gate p{color:var(--muted);font-size:13px;margin:0 0 18px}
  /* App shell */
  #app{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
  .sidebar{background:var(--navy);color:#cdd7ea;padding:16px 12px;position:sticky;top:0;height:100vh;overflow:auto}
  .sidebar .brand{display:flex;align-items:center;gap:8px;color:#fff;font-weight:800;font-size:18px;padding:6px 8px 16px}
  .sidebar .brand span{color:var(--accent)}
  .navitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:#cdd7ea;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:2px}
  .navitem.active,.navitem:hover{background:rgba(255,255,255,.1);color:#fff}
  .navitem .ic{width:18px;text-align:center}
  .main{padding:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:5}
  .topbar h2{margin:0;font-size:18px}
  .content{padding:22px}
  /* Cards / stats */
  .grid{display:grid;gap:14px}
  .stats{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow)}
  .stat{text-align:left;cursor:pointer;transition:transform .08s,border-color .12s;width:100%;border:1px solid var(--border)}
  .stat:hover{transform:translateY(-2px);border-color:var(--accent)}
  .stat .n{font-size:28px;font-weight:800;color:var(--navy)} [data-theme="dark"] .stat .n{color:#fff}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:2px}
  .stat .hint{font-size:11px;color:var(--accent);margin-top:6px;font-weight:600}
  /* Table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--muted);font-weight:600;padding:10px;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--panel)}
  td{padding:10px;border-bottom:1px solid var(--border)}
  tbody tr.clk{cursor:pointer} tbody tr.clk:hover{background:rgba(0,0,0,.025)} [data-theme="dark"] tbody tr.clk:hover{background:rgba(255,255,255,.04)}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
  .badge.hot{background:var(--hot);color:#fff}
  .badge.cold{background:#e2e8f0;color:#475569} .badge.warm{background:#fef3c7;color:#92400e}
  .badge.hotcat{background:#fee2e2;color:#b91c1c} .badge.ready{background:#dcfce7;color:#166534}
  .badge.ai{background:#ede9fe;color:#6d28d9} .badge.std{background:#e0f2fe;color:#0369a1}
  [data-theme="dark"] .badge.ai{background:#4c1d95;color:#ede9fe} [data-theme="dark"] .badge.std{background:#0c4a6e;color:#e0f2fe}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(11,31,68,.08);color:var(--navy)} [data-theme="dark"] .pill{background:rgba(255,255,255,.1);color:#fff}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .toolbar input,.toolbar select{width:auto}
  .toolbar input[type=search]{min-width:220px}
  /* Kanban */
  .kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px}
  .kcol{min-width:230px;max-width:230px;background:var(--panel);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;max-height:72vh}
  .kcol h4{margin:0;padding:10px 12px;font-size:12.5px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
  .kbody{padding:8px;overflow:auto;flex:1;min-height:40px}
  .kcard{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px;margin-bottom:8px;font-size:12px;cursor:grab}
  .kcard.drag{opacity:.4} .kcol.over{outline:2px dashed var(--accent)}
  .kcard .nm{font-weight:700} .kcard .meta{color:var(--muted);margin-top:2px}
  /* Profile */
  .pf-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .pf-name{font-size:24px;font-weight:800;color:var(--navy)} [data-theme="dark"] .pf-name{color:#fff}
  .pf-sub{color:var(--muted);font-size:14px;margin-top:2px}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:16px}
  .tab{padding:8px 14px;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer}
  .tab.active{color:var(--navy);border-bottom-color:var(--accent)} [data-theme="dark"] .tab.active{color:#fff}
  .tab .cnt{font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:0 6px;margin-left:4px}
  .kv{display:flex;gap:10px;padding:5px 0;font-size:13px;border-bottom:1px solid var(--border)} .kv:last-child{border-bottom:none}
  .kv .k{min-width:150px;color:var(--muted)}
  .sect h3{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 10px}
  .note{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;margin-bottom:8px} .note .t{color:var(--muted);font-size:11px;margin-top:4px;display:flex;gap:8px;justify-content:space-between}
  .rec-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
  .rec-card{border:1px solid var(--border);border-radius:10px;padding:12px;background:var(--bg)}
  .rec-card h4{margin:0 0 8px;font-size:13px;display:flex;align-items:center;gap:6px}
  .rec-card ul{margin:0;padding-left:18px;font-size:13px;line-height:1.5}
  .rec-card.green{border-left:3px solid var(--ok)} .rec-card.red{border-left:3px solid var(--cta)}
  .rec-card.amber{border-left:3px solid var(--warn)} .rec-card.navy{border-left:3px solid var(--navy)}
  .ui-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
  .ui-item{border:1px solid var(--border);border-radius:9px;padding:10px 12px;background:var(--bg)}
  .ui-item .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  .ui-item .val{font-size:15px;font-weight:700;margin-top:3px}
  .ui-item .pts{font-size:11px;color:var(--accent);font-weight:600;margin-top:2px}
  .tl{position:relative;padding-left:18px} .tl::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border)}
  .tl-item{position:relative;padding:0 0 14px 6px;font-size:13px} .tl-item::before{content:"";position:absolute;left:-16px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .tl-item .t{color:var(--muted);font-size:11px}
  .status{font-size:13px} .ok{color:var(--ok)} .err{color:var(--cta)}
  .muted{color:var(--muted)} .right{text-align:right}
  @media(max-width:820px){#app{grid-template-columns:1fr}.sidebar{position:static;height:auto;display:flex;flex-wrap:wrap;gap:6px}.sidebar .brand{width:100%}.navitem{flex:1 0 auto}.kv .k{min-width:110px}}
</style>
</head>
<body data-theme="light">

<!-- Password gate -->
<div id="gate">
  <h1>iMigrate <span style="color:var(--accent)">CRM</span></h1>
  <p>Sign in to access the immigration CRM</p>
  <input id="pw" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()" />
  <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="unlock()">Sign in</button>
  <p id="gateMsg" class="status err" style="margin-top:12px"></p>
</div>

<!-- App -->
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="brand">iMigrate <span>CRM</span></div>
    <div class="navitem active" data-view="dashboard" onclick="go('dashboard')"><span class="ic">📊</span> Dashboard</div>
    <div class="navitem" data-view="leads" onclick="go('leads')"><span class="ic">👥</span> CRM / Leads</div>
    <div class="navitem" data-view="pipeline" onclick="go('pipeline')"><span class="ic">🗂️</span> Pipeline</div>
    <div class="navitem" data-view="reports" onclick="go('reports')"><span class="ic">📄</span> Reports</div>
    <div class="navitem" data-view="tasks" onclick="go('tasks')"><span class="ic">✅</span> Tasks &amp; Follow-Ups</div>
    <div class="navitem" data-view="clients" onclick="go('clients')"><span class="ic">🧾</span> Clients &amp; Cases</div>
    <div class="navitem" data-view="invoices" onclick="go('invoices')"><span class="ic">💳</span> Invoices &amp; Payments</div>
    <div class="navitem" data-view="automations" onclick="go('automations')"><span class="ic">⚡</span> Automations</div>
    <div class="navitem" data-view="settings" onclick="go('settings')"><span class="ic">⚙️</span> Settings</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h2 id="viewTitle">Dashboard</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="loadMsg" class="status muted"></span>
        <button class="btn btn-sm" onclick="loadAll()">↻ Refresh</button>
        <button class="btn btn-sm" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
        <button class="btn btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const PW = () => sessionStorage.getItem('imig_crm_pw') || '';
  const CRM_USER = () => localStorage.getItem('imig_crm_user') || 'Consultant';
  let LEADS = [], CONTACTS = [], META = {}, TASKS = [], REPORTS = [], VIEW = 'dashboard';
  let PROFILE_KEY = null, PROFILE_TAB = 'contact';

  const STAGES = ['New Lead','Pending Call','Pending CV / Resume','Pending Appointment','Appointment Scheduled','Pending Follow-up','Under Assessment','Future Lead','No Answer – Follow-up Sent','No Pickup – Email/WhatsApp Sent','Does Not Qualify','Signed Up','Lost Lead','Duplicate Lead','Invalid Lead / Spam'];
  // Legacy stage names stay displayable for backward compat (stored values unchanged).
  const STAGE_LABELS={};
  const stageLabel=(s)=>STAGE_LABELS[s]||s;
  // Color palette for each standardised status.
  const STAGE_COLORS={'New Lead':{bg:'#dbeafe',color:'#1d4ed8'},'Pending Call':{bg:'#fef3c7',color:'#92400e'},'Pending CV / Resume':{bg:'#fef9c3',color:'#854d0e'},'Pending Appointment':{bg:'#fde68a',color:'#b45309'},'Appointment Scheduled':{bg:'#d1fae5',color:'#065f46'},'Pending Follow-up':{bg:'#fef3c7',color:'#92400e'},'Under Assessment':{bg:'#ede9fe',color:'#5b21b6'},'Future Lead':{bg:'#e0f2fe',color:'#0369a1'},'No Answer – Follow-up Sent':{bg:'#fee2e2',color:'#b91c1c'},'No Pickup – Email/WhatsApp Sent':{bg:'#fee2e2',color:'#b91c1c'},'Does Not Qualify':{bg:'#f1f5f9',color:'#475569'},'Signed Up':{bg:'#dcfce7',color:'#166534'},'Lost Lead':{bg:'#fecaca',color:'#991b1b'},'Duplicate Lead':{bg:'#f3f4f6',color:'#6b7280'},'Invalid Lead / Spam':{bg:'#f3f4f6',color:'#6b7280'}};
  function stageBadge(s){const c=STAGE_COLORS[s]||{bg:'#e2e8f0',color:'#475569'};return `<span style="background:${c.bg};color:${c.color};padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-block">${esc(s)}</span>`;}
  // Safe migration map: legacy stage name → new standardised status.
  const STAGE_MIGRATION_MAP={'Contact Attempted':'Pending Call','CV Requested':'Pending CV / Resume','CV Received':'Pending Appointment','Assessment Completed':'Under Assessment','Lead Assessed':'Under Assessment','Consultation Booked':'Appointment Scheduled','Consultation Completed':'Pending Follow-up','Qualified':'Under Assessment','Agreement Sent':'Signed Up','Payment Received':'Signed Up','Application Preparation':'Signed Up','Application Submitted':'Signed Up','Visa Approved':'Signed Up','Lost Opportunity':'Lost Lead'};

  /* Immigration email templates. {{name}} {{occupation}} {{points}} {{visas}} are filled per lead. */
  const EMAIL_TEMPLATES = {
    'CV Request': { subject:'Please share your CV — iMigrate Migration Solutions',
      body:`<p>Hi {{name}},</p><p>Thank you for your interest in migrating with iMigrate Migration Solutions. To prepare your eligibility assessment, please reply with your most recent <strong>CV / résumé</strong> (PDF or Word).</p><p>This helps our specialists verify your occupation, skills and experience against the relevant program criteria.</p><p>Warm regards,<br>iMigrate Migration Solutions</p>` },
    'Consultation Invitation': { subject:'Book your FREE immigration consultation',
      body:`<p>Hi {{name}},</p><p>We'd love to walk you through your options for {{occupation}}. Book a <strong>free, no-obligation consultation</strong> with one of our migration specialists and we'll map out the best pathway for your profile.</p><p><a href="https://www.imigratesolution.com/assessment">Book my consultation</a></p><p>Warm regards,<br>iMigrate Migration Solutions</p>` },
    'Assessment Completed': { subject:'Your immigration assessment is ready',
      body:`<p>Hi {{name}},</p><p>Great news — we've completed your preliminary assessment. Based on your profile ({{occupation}}, {{points}} points), you may be eligible for: <strong>{{visas}}</strong>.</p><p>Let's discuss the next steps on a quick call.</p><p>Warm regards,<br>iMigrate Migration Solutions</p>` },
    'Report Delivery': { subject:'Your personalized Australia immigration report',
      body:`<p>Hi {{name}},</p><p>Please find your personalized immigration assessment report attached/linked. It summarises your points, likely visa pathways and recommended next steps.</p><p>Book a free consultation to have a specialist verify your eligibility and build your roadmap.</p><p>Warm regards,<br>iMigrate Migration Solutions</p>` },
    'Follow-Up Reminder': { subject:'Following up on your migration plans',
      body:`<p>Hi {{name}},</p><p>Just checking in on your migration plans. Do you have any questions about your eligibility or the process? We're here to help whenever you're ready.</p><p>Warm regards,<br>iMigrate Migration Solutions</p>` },
    'Re-Engagement': { subject:'Still thinking about moving abroad?',
      body:`<p>Hi {{name}},</p><p>It's been a little while since we last connected. Immigration programs and points thresholds change regularly — if you're still considering a move, now is a great time to revisit your options with a free reassessment.</p><p><a href="https://www.imigratesolution.com/assessment">Reassess my eligibility</a></p><p>Warm regards,<br>iMigrate Migration Solutions</p>` },
  };
  function fillTemplate(str,c){ return (str||'').replace(/{{name}}/g,c.name&&c.name!=='(no name)'?c.name:'there').replace(/{{occupation}}/g,c.occupation||'your occupation').replace(/{{points}}/g,c.points||'—').replace(/{{visas}}/g,c.visas||'your eligible pathways'); }

  const esc = (v) => (v==null?'':String(v)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const fmtDT = (s) => (s||'').slice(0,16).replace('T',' ');

  /* ---------- auth ---------- */
  async function unlock(){
    const pw = $('pw').value.trim(); const m=$('gateMsg');
    if(!pw){m.textContent='Enter the password.';return;}
    m.textContent='Checking…';
    try{
      const r = await fetch('/admin-verify.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
      const j = await r.json().catch(()=>({}));
      if(!r.ok||!j.ok){m.textContent=j.error||'Incorrect password.';return;}
    }catch(e){m.textContent='Could not reach the server.';return;}
    sessionStorage.setItem('imig_crm_pw',pw);
    $('gate').classList.add('hidden'); $('app').classList.remove('hidden');
    if(localStorage.getItem('imig_crm_theme')==='dark') setTheme('dark');
    await loadAll();
  }
  function logout(){ sessionStorage.removeItem('imig_crm_pw'); location.reload(); }

  /* ---------- data ---------- */
  // Real-time auto-backup: after any data-changing CRM action, debounce a full
  // dual backup (server + OneDrive) so nothing is ever lost. Read-only actions skip.
  const BK_READONLY=new Set(['list','get','status','meta','read','load','audit','diag','messages','count','search','templates-list','onedrive-list','onedrive-status','reports','report-get','meta-get','overview']);
  let _bkTimer=null;
  function scheduleBackup(reason){ try{ clearTimeout(_bkTimer); _bkTimer=setTimeout(()=>{ fetch('/system-backup.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW(),action:'change',reason:String(reason||'')})}).catch(()=>{}); },4000); }catch(e){} }
  async function api(url, body){
    const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW(),author:CRM_USER(),...body})});
    const j = await r.json().catch(()=>({ok:false}));
    try{ const a=body&&body.action; const mutating=a?!BK_READONLY.has(a):false; if(mutating&&j&&j.ok!==false) scheduleBackup((url||'').replace(/^.*\//,'')+':'+a); }catch(e){}
    return j;
  }
  async function loadAll(){
    const m=$('loadMsg'); m.textContent='Loading…';
    try{
      const [lr, mr, tr, rr] = await Promise.all([
        api('/leads-read.php',{action:'list'}),
        api('/crm-meta.php',{action:'list'}),
        api('/crm-tasks.php',{action:'list'}),
        api('/crm-reports.php',{action:'list'}),
      ]);
      LEADS = lr.leads||[]; META = mr.meta||{}; TASKS = tr.tasks||[]; REPORTS = rr.reports||[];
      buildContacts();
      m.textContent = CONTACTS.length+' contacts · '+REPORTS.length+' reports';
      render();
      // Zero-config automatic daily backup (no-op if a snapshot was taken in the last 24h).
      try{ api('/crm-backup.php',{action:'auto'}); }catch(_){}
    }catch(e){ m.textContent='✗ Load failed (PHP enabled?)'; }
  }

  /* A submission is an AI assessment if it came from the AI eligibility flow. */
  function isAISubmission(s){
    const f=s.fields||{}; const name=(s.formName||'').toLowerCase();
    return /ai|eligibility|assessment/.test(name) || !!f.aiRecommendations || (!!f.pointsScore && !!f.anzscoCode);
  }

  function buildContacts(){
    const byEmail = {};
    LEADS.forEach(l=>{
      const f=l.fields||{}; const email=(f.email||'').toLowerCase().trim();
      const key = email || ('id:'+l.id);
      if(!byEmail[key]) byEmail[key]={ckey:key,email,submissions:[]};
      byEmail[key].submissions.push(l);
    });
    CONTACTS = Object.values(byEmail).map(c=>{
      c.submissions.sort((a,b)=>(a.timestamp||'').localeCompare(b.timestamp||''));
      const first=c.submissions[0], last=c.submissions[c.submissions.length-1];
      const fld=(k)=>{for(let i=c.submissions.length-1;i>=0;i--){const v=(c.submissions[i].fields||{})[k];if(v)return v;}return '';};
      const meta = META[c.ckey] || META[c.email] || {};
      const ov = meta.overrides || {};
      const g = (k,alt)=> (ov[k]!=null && ov[k]!=='') ? ov[k] : (fld(k)|| (alt?fld(alt):'') );
      const points=parseInt(g('pointsScore','points')||'0',10)||0;
      const visas=g('eligibleVisaSubclasses')||'';
      const visasCount=visas?visas.split(',').filter(Boolean).length:0;
      const hasCV=c.submissions.some(s=>(s.fields||{}).cvFile);
      const reports=c.submissions.filter(s=>((s.fields||{}).pointsScore)||((s.fields||{}).occupation));
      const isAI = c.submissions.some(isAISubmission);
      let score=0;
      if(reports.length) score+=10;
      if(points>=65) score+=20;
      if(visasCount>2) score+=15;
      if(/189/.test(visas)) score+=10;
      if(hasCV) score+=20;
      if(c.submissions.length>1) score+=10;
      let cat='Cold'; if(score>=60)cat='Sales Ready'; else if(score>=40)cat='Hot'; else if(score>=20)cat='Warm';
      const hot = score>=40 || (points>=65 && visasCount>2);
      const storedReports = REPORTS.filter(r=>r.ckey===c.ckey || (c.email && (r.leadEmail||'').toLowerCase()===c.email));
      // Every submitted field (latest non-empty value wins) — for "all submitted fields".
      const rawFields={}; c.submissions.forEach(s=>{ const f=s.fields||{}; Object.keys(f).forEach(k=>{ if(f[k]!=null&&f[k]!=='') rawFields[k]=f[k]; }); });
      // Current CV: a CRM replacement (override) wins; else the website-uploaded CV unless hidden.
      const cvHidden = ov.cvHidden==='1'||ov.cvHidden===1;
      let currentCv=null;
      if(ov.cvDocId){ currentCv={type:'doc',id:ov.cvDocId,name:ov.cvFileName||'CV'}; }
      else if(ov.cvWebFile && !cvHidden){ currentCv={type:'web',file:ov.cvWebFile,name:ov.cvWebName||ov.cvWebFile}; }
      else { const webcv=c.submissions.filter(s=>(s.fields||{}).cvFile).map(s=>({file:(s.fields||{}).cvFile,name:(s.fields||{}).cvOriginalName||(s.fields||{}).cvFile})).pop(); if(webcv&&!cvHidden) currentCv={type:'web',file:webcv.file,name:webcv.name}; }
      return {
        rawFields, currentCv, destination:g('destination'),
        ckey:c.ckey, email:c.email, name:g('fullName','name')||'(no name)', phone:g('phone'),
        whatsapp:g('whatsapp')||g('phone'), country:g('nationality')||g('citizenship')||g('residence')||g('country')||'',
        occupation:g('occupation'), anzsco:g('anzscoCode'), points, visas, visasCount,

  /* ---------- parsing helpers ---------- */
  function parseUserInputs(str){
    if(!str) return [];
    return str.split(/;\s*/).map(part=>{
      const m=part.match(/^(.*?):\s*(.*?)(?:\s*\(([^)]*)\))?\s*$/);
      if(!m) return null;
      return {label:(m[1]||'').trim(), choice:(m[2]||'').trim(), points:(m[3]||'').trim()};
    }).filter(x=>x&&x.label);
  }
  function parseRecs(str){ return str ? str.split(/\s*\|\s*/).map(s=>s.trim()).filter(Boolean) : []; }
  function bucketRecs(recs){
    const b={strengths:[],risks:[],improve:[],next:[]};
    recs.forEach(r=>{
      const t=r.toLowerCase();
      if(/you meet|widest range|access to|strong|eligible for the/.test(t)) b.strengths.push(r);
      else if(/below|not available|competitive|risk|gap/.test(t)) b.risks.push(r);
      else if(/obtain|book|consultation|before lodging|skills assessment/.test(t)) b.next.push(r);
      else b.improve.push(r);
    });
    return b;
  }

  /* ---------- unified lead field model + editable User Inputs ---------- */
  const FIELD_LABELS={fullName:'Full Name',name:'Full Name',email:'Email',phone:'Mobile',whatsapp:'WhatsApp',nationality:'Nationality',citizenship:'Citizenship',residence:'Country of Residence',country:'Country',destination:'Destination',occupation:'Occupation',anzscoCode:'ANZSCO Code',pointsScore:'Points Score',eligibleVisaSubclasses:'Visa Subclasses',education:'Education',experience:'Work Experience',maritalStatus:'Marital Status',english:'English Score',age:'Age',program:'Program of Interest',investment:'Investment Budget',linkedinUrl:'LinkedIn URL',message:'Message',leadSource:'Lead Source',eligibilityStatus:'Eligibility Status',assessmentDate:'Lead Date'};
  const HIDDEN_KEYS=new Set(['cvFile','cvOriginalName','cvFilename','tags','aiRecommendations','userInputs','sourcePage','website','hutk','cvDocId','cvFileName','cvHidden','source']);
  function prettyKey(k){ return FIELD_LABELS[k]||k.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase()); }
  let INPUT_MODEL=[];
  function leadFieldModel(c){
    const ov=c.overrides||{}, raw=c.rawFields||{};
    const val=(k)=> (ov[k]!=null&&ov[k]!=='')?ov[k]:(raw[k]!=null?raw[k]:'');
    const model=[], seen=new Set();
    const order=['fullName','email','phone','whatsapp','nationality','citizenship','residence','country','destination','occupation','anzscoCode','pointsScore','eligibleVisaSubclasses','education','experience','maritalStatus','english','age','program','investment','linkedinUrl','message','leadSource'];
    order.forEach(k=>{ if(HIDDEN_KEYS.has(k))return; const v=val(k); if(v!==''||['fullName','email','phone','occupation'].includes(k)){ model.push({key:k,label:FIELD_LABELS[k]||prettyKey(k),value:v}); seen.add(k);} });
    parseUserInputs(c.userInputs).forEach(a=>{ const key='ans:'+a.label; if(seen.has(key))return; const v=(ov[key]!=null&&ov[key]!=='')?ov[key]:a.choice; model.push({key,label:a.label,value:v,pts:a.points}); seen.add(key); });
    Object.keys(raw).forEach(k=>{ if(seen.has(k)||HIDDEN_KEYS.has(k))return; model.push({key:k,label:prettyKey(k),value:val(k)}); seen.add(k); });
    return model;
  }

  async function reportHtmlFor(c, id){
    if(id){ const r=await api('/crm-reports.php',{action:'get',id}); if(r.ok && r.report && r.report.html) return r.report.html; }
    return buildReportHtml(c);
  }
  async function viewReport(ckey,id){ const c=findByKey(ckey); openHtmlWindow(await reportHtmlFor(c,id)); }
  async function downloadPdf(ckey,id){ const c=findByKey(ckey); openHtmlWindow(await reportHtmlFor(c,id)); } /* opens print-ready; user saves as PDF */
  async function emailReport(ckey,id){
    const c=findByKey(ckey);
    if(!c.email){ alert('This lead has no email address on file.'); return; }
    if(!confirm('Email the assessment report to '+c.email+'?'))return;
    const html=await reportHtmlFor(c,id);
    const r=await fetch('/send-report.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      name:c.name,email:c.email,mobile:c.phone,subject:'Your Australia Immigration Assessment Report',
      html,points:c.points,occupation:c.occupation,visas:c.visas,website:''
    })});
    const j=await r.json().catch(()=>({}));
    await api('/crm-meta.php',{action:'log',key:ckey,email:c.email,event:'Report emailed',detail:c.email});
    alert(j.ok?'Report emailed to '+c.email:'Email could not be sent (mail() may be limited on this host).');
    loadAll();
  }
  async function regenerateReport(ckey){
    const c=findByKey(ckey);
    const html=buildReportHtml(c);
    const r=await api('/crm-reports.php',{action:'save',key:ckey,email:c.email,name:c.name,occupation:c.occupation,anzsco:c.anzsco,points:String(c.points||''),visas:c.visas,eligibilityStatus:c.eligibilityStatus,html,source:'CRM regenerate'});
    if(r.ok){ await api('/crm-meta.php',{action:'log',key:ckey,email:c.email,event:'Report regenerated',detail:'v'+r.version}); alert('Report regenerated (version '+r.version+').'); loadAll(); }
    else alert('Could not save report.');
  }
  async function addReportNote(id,ckey){
    const note=prompt('Add a note to this report:'); if(!note)return;
    const r=await api('/crm-reports.php',{action:'add-note',id,note});
    if(r.ok){ alert('Note added to report.'); } else alert('Could not add note.');
  }

  /* ---------- pipeline (kanban) ---------- */
  let dragKey=null;
  let pipeFilter={q:'',type:'',cat:'',hideEmpty:false};
  let pipeScroll=0;
  const CAT_COLORS={'Sales Ready':{bg:'#dcfce7',color:'#166534'},'Hot':{bg:'#fee2e2',color:'#b91c1c'},'Warm':{bg:'#fef3c7',color:'#92400e'},'Cold':{bg:'#f1f5f9',color:'#475569'}};
  /* Earliest open task for a contact — surfaces the follow-up date + assigned consultant on the card. */
  function nextTaskFor(c){
    const open=(TASKS||[]).filter(t=>(((t.ckey&&t.ckey===c.ckey)||(c.email&&(t.leadEmail||'').toLowerCase()===c.email)) && !['Done','Completed','Cancelled'].includes(t.status||'')));
    open.sort((a,b)=>((a.due||'9999-99-99').localeCompare(b.due||'9999-99-99')));
    return open[0]||null;
  }
  function renderPipeline(){
    const kmPrev=document.querySelector('.kanban'); if(kmPrev)pipeScroll=kmPrev.scrollLeft;
    const q=pipeFilter.q.toLowerCase();
    const match=(c)=>{
      if(pipeFilter.type && c.sourceType!==pipeFilter.type)return false;
      if(pipeFilter.cat && c.cat!==pipeFilter.cat)return false;
      if(q && !(((c.name||'')+' '+(c.email||'')+' '+(c.occupation||'')+' '+(c.phone||'')).toLowerCase().includes(q)))return false;
      return true;
    };
    let shown=0;
    const cols=STAGES.map(stage=>{
      const cards=CONTACTS.filter(c=>c.stage===stage && match(c)); shown+=cards.length;
      if(pipeFilter.hideEmpty && !cards.length)return '';
      const sc=STAGE_COLORS[stage]||{bg:'#e2e8f0',color:'#475569'};
      return `<div class="kcol" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="dropCard(event,'${esc(stage)}')">
        <h4 style="border-left:3px solid ${sc.color};padding-left:9px"><span style="color:${sc.color};font-weight:700">${esc(stageLabel(stage))}</span><span class="pill" style="background:${sc.bg};color:${sc.color}">${cards.length}</span></h4>
        <div class="kbody">${cards.map(c=>{const nt=nextTaskFor(c);const cc=CAT_COLORS[c.cat]||CAT_COLORS.Cold;return `<div class="kcard" draggable="true" ondragstart="dragKey='${esc(c.ckey)}';this.classList.add('drag')" ondragend="this.classList.remove('drag')" onclick="openProfile('${esc(c.ckey)}')">
          <div class="nm">${esc(c.name)} <span class="badge ${c.isAI?'ai':'std'}" style="font-size:9px">${c.sourceType}</span></div>
          <div class="meta">${esc(c.occupation||'')} ${c.points?'· '+c.points+'pts':''}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:5px;gap:6px"><span class="pill" style="font-size:9px;background:${cc.bg};color:${cc.color}">${esc(c.cat)}</span>${nt?`<span class="muted" style="font-size:10px;white-space:nowrap" title="Next task: ${esc(nt.title||'')}">📅 ${esc(nt.due||'no date')}${nt.assignedTo?' · '+esc(nt.assignedTo):''}</span>`:''}</div>
        </div>`;}).join('')||'<p class="muted" style="font-size:11px;padding:8px 10px">No leads</p>'}</div>
      </div>`;
    }).join('');
    const typeOpts=[['','All sources'],['AI','AI leads'],['Standard','Standard']].map(([v,l])=>`<option value="${v}" ${v===pipeFilter.type?'selected':''}>${l}</option>`).join('');
    const catOpts=['','Sales Ready','Hot','Warm','Cold'].map(s=>`<option value="${s}" ${s===pipeFilter.cat?'selected':''}>${s||'All scores'}</option>`).join('');
    $('content').innerHTML=`<div class="toolbar" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px">
      <input type="search" id="pq" placeholder="Search name, email, phone, occupation…" value="${esc(pipeFilter.q)}" oninput="pipeFilter.q=this.value;renderPipeline();var e=document.getElementById('pq');if(e){e.focus();e.setSelectionRange(e.value.length,e.value.length);}" style="max-width:280px">
      <select onchange="pipeFilter.type=this.value;renderPipeline()">${typeOpts}</select>
      <select onchange="pipeFilter.cat=this.value;renderPipeline()">${catOpts}</select>
      <label style="display:flex;gap:5px;align-items:center;font-size:12px;white-space:nowrap"><input type="checkbox" ${pipeFilter.hideEmpty?'checked':''} onchange="pipeFilter.hideEmpty=this.checked;renderPipeline()" style="width:auto"> Hide empty stages</label>
      <span class="muted" style="font-size:12px;margin-left:auto">${shown} of ${CONTACTS.length} shown · drag cards between stages</span>
    </div><div class="kanban">${cols}</div>`;
    const km=document.querySelector('.kanban'); if(km)km.scrollLeft=pipeScroll;
  }
  function dropCard(e,stage){ e.preventDefault(); document.querySelectorAll('.kcol').forEach(k=>k.classList.remove('over')); if(dragKey){const k=dragKey;dragKey=null;setStage(k,stage);} }

  /* ---------- tasks (global) ---------- */
  function renderTasks(){
    const open=TASKS.filter(t=>t.status!=='Done'), done=TASKS.filter(t=>t.status==='Done');
    const row=(t)=>`<tr><td><input type="checkbox" ${t.status==='Done'?'checked':''} style="width:auto" onchange="toggleTask('${t.id}',this.checked)"></td>
      <td>${esc(t.title)}<div class="muted">${esc(t.type)}${t.leadEmail?' · '+esc(t.leadEmail):''}</div></td>
      <td>${esc(t.due||'—')}</td><td><span class="pill">${esc(t.priority)}</span></td>
      <td class="right"><button class="btn btn-sm" onclick="delTask('${t.id}')">Delete</button></td></tr>`;
    $('content').innerHTML=`
      <div class="card" style="margin-bottom:14px">
        <h3 style="margin:0 0 10px">New task</h3>
        <div class="toolbar">
          <input id="tTitle" placeholder="Task title…" style="flex:1;min-width:200px">
          <select id="tType"><option>Call</option><option>Follow-up</option><option>Email Follow-Up</option><option>Consultation</option><option>Document Collection</option></select>

  }
  async function addTask(){
    const body={action:'add',title:$('tTitle').value,type:$('tType').value,due:$('tDue').value,priority:$('tPriority').value,leadEmail:$('tEmail').value};
    if(!body.title.trim())return; const r=await api('/crm-tasks.php',body); if(r.ok){TASKS=r.tasks;renderTasks();}
  }
  async function toggleTask(id,done){ const r=await api('/crm-tasks.php',{action:'update',id,status:done?'Done':'Open'}); if(r.ok){TASKS=r.tasks; if(VIEW==='profile')renderProfile();} }
  async function delTask(id){ const r=await api('/crm-tasks.php',{action:'delete',id}); if(r.ok){TASKS=r.tasks;renderTasks();} }

  /* ---------- settings ---------- */
  /* ---------- Invoices & Payments ---------- */
  let INVOICES=[], INV_EDIT=null;
  const INV_COLORS={'Draft':{bg:'#f1f5f9',color:'#475569'},'Sent':{bg:'#dbeafe',color:'#1d4ed8'},'Partially Paid':{bg:'#fef3c7',color:'#92400e'},'Paid':{bg:'#dcfce7',color:'#166534'},'Overdue':{bg:'#fecaca',color:'#991b1b'},'Cancelled':{bg:'#e2e8f0',color:'#64748b'}};
  function money(cur,n){ return (cur||'RM')+' '+(Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})); }
  async function renderInvoices(){
    $('content').innerHTML='<div class="card"><h3>💳 Invoices &amp; Payments</h3><p class="muted">Loading…</p></div>';
    const [r,cr]=await Promise.all([api('/crm-invoices.php',{action:'list'}),api('/crm-cases.php',{action:'list'})]);
    INVOICES=(r&&r.invoices)||[]; CASES=(cr&&cr.cases)||CASES;
    const inv=INVOICES.reduce((a,x)=>a+(x.total||0),0), paid=INVOICES.reduce((a,x)=>a+(x.amountPaid||0),0);
    const overdue=INVOICES.filter(x=>x.derivedStatus==='Overdue').length;
    const cur=(INVOICES[0]&&INVOICES[0].currency)||'RM';
    const stat=(n,l)=>`<div class="card" style="display:inline-block;min-width:150px;margin-right:12px"><div style="font-size:20px;font-weight:800;color:var(--navy)">${esc(n)}</div><div class="muted" style="font-size:12px">${l}</div></div>`;
    const rows=INVOICES.map(x=>{const sc=INV_COLORS[x.derivedStatus]||INV_COLORS.Draft;return `<tr><td><strong>${esc(x.number||'')}</strong></td><td>${esc(x.clientName||'')}<div class="muted" style="font-size:11px">${esc(x.email||'')}</div></td><td>${esc(money(x.currency,x.total))}</td><td class="muted">${esc(money(x.currency,x.amountPaid))}</td><td><span class="pill" style="background:${sc.bg};color:${sc.color}">${esc(x.derivedStatus)}</span></td><td class="muted">${esc(x.dueDate||'')}</td><td class="right"><button class="btn btn-sm" onclick="invEdit('${esc(x.id)}')">Open</button> <button class="btn btn-sm" onclick="invDel('${esc(x.id)}')">Delete</button></td></tr>`;}).join('');
    $('content').innerHTML=`<div style="display:flex;flex-wrap:wrap;margin-bottom:6px">${stat(money(cur,inv),'Total invoiced')}${stat(money(cur,paid),'Total received')}${stat(money(cur,inv-paid),'Outstanding')}${stat(overdue,'Overdue')}</div>
      <div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">Invoices</h3><button class="btn btn-primary btn-sm" onclick="invNew()">+ New invoice</button></div>
        <div style="overflow:auto"><table><thead><tr><th>#</th><th>Client</th><th>Total</th><th>Paid</th><th>Status</th><th>Due</th><th class="right"></th></tr></thead><tbody>${rows||'<tr><td colspan="7" class="muted" style="padding:14px">No invoices yet. Click “New invoice” to bill a client.</td></tr>'}</tbody></table></div></div>
      <div id="invEditor"></div>`;
    if(INV_EDIT)renderInvEditor();
  }
  function renderInvEditor(){
    const v=INV_EDIT; if(!v){const e=$('invEditor');if(e)e.innerHTML='';return;}
    const clientOpts=['<option value="">— Select client —</option>',...CONTACTS.map(x=>`<option value="${esc(x.ckey)}" ${x.ckey===v.ckey?'selected':''}>${esc(x.name)}${x.email?' ('+esc(x.email)+')':''}</option>`)].join('');
    const caseOpts=['<option value="">— None —</option>',...(CASES||[]).filter(c=>!v.ckey||c.ckey===v.ckey).map(c=>`<option value="${esc(c.id)}" ${c.id===v.caseId?'selected':''}>${esc(c.visaType||c.id)}</option>`)].join('');
    const statusOpts=['Draft','Sent','Cancelled'].map(s=>`<option ${s===v.status?'selected':''}>${s}</option>`).join('');
    const itemRows=(v.items||[]).map((it,i)=>`<div style="display:flex;gap:6px;margin-bottom:5px"><input placeholder="Description" value="${esc(it.desc||'')}" oninput="INV_EDIT.items[${i}].desc=this.value" style="flex:1"><input type="number" step="0.01" placeholder="Amount" value="${it.amount!=null&&it.amount!==''?it.amount:''}" oninput="INV_EDIT.items[${i}].amount=this.value;invRecalc()" style="width:120px"><button class="btn btn-sm" onclick="invRemoveItem(${i})">✕</button></div>`).join('');
    const total=(v.items||[]).reduce((a,it)=>a+(parseFloat(it.amount)||0),0);
    const payList=(v.payments||[]).map(pm=>`<div class="note" style="display:flex;justify-content:space-between;align-items:center"><span><strong>${esc(money(v.currency,pm.amount))}</strong> <span class="muted">· ${esc(pm.date||'')} · ${esc(pm.method||'')}${pm.ref?' · '+esc(pm.ref):''}</span></span><button class="btn btn-sm" onclick="payDel('${esc(v.id)}','${esc(pm.id)}')">✕</button></div>`).join('');
    $('invEditor').innerHTML=`<div class="card"><h3>${v.id?('Invoice '+esc(v.number||'')):'New invoice'}</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label class="muted" style="font-size:12px">Client</label><select id="iv_client" onchange="invClientPick(this.value)">${clientOpts}</select></div>
        <div><label class="muted" style="font-size:12px">Linked case (optional)</label><select id="iv_case">${caseOpts}</select></div>
        <div><label class="muted" style="font-size:12px">Currency</label><input id="iv_cur" value="${esc(v.currency||'RM')}" style="width:90px" oninput="invRecalc()"></div>
        <div><label class="muted" style="font-size:12px">Status</label><select id="iv_status">${statusOpts}</select></div>
        <div><label class="muted" style="font-size:12px">Issue date</label><input id="iv_issue" type="date" value="${esc(v.issueDate||'')}"></div>
        <div><label class="muted" style="font-size:12px">Due date</label><input id="iv_due" type="date" value="${esc(v.dueDate||'')}"></div>
      </div>
      <h4 style="margin:12px 0 6px">Line items</h4><div id="iv_items">${itemRows||''}</div>
      <button class="btn btn-sm" onclick="invAddItem()">+ Add line</button>
      <div style="text-align:right;font-weight:700;margin-top:8px">Total: <span id="iv_total">${esc(money(v.currency,total))}</span></div>
      <label class="muted" style="font-size:12px;margin-top:6px;display:block">Notes</label><textarea id="iv_notes" rows="2">${esc(v.notes||'')}</textarea>
      <div style="margin-top:12px;display:flex;gap:8px"><button class="btn btn-primary btn-sm" onclick="invSave()">Save invoice</button><button class="btn btn-sm" onclick="INV_EDIT=null;renderInvoices()">Cancel</button><span id="iv_msg" class="muted" style="font-size:12px"></span></div>
      ${v.id?`<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:10px"><h4 style="margin:0 0 6px">Payments — ${esc(money(v.currency,(v.amountPaid||0)))} of ${esc(money(v.currency,total))}</h4>${payList||'<p class="muted" style="font-size:12px">No payments recorded.</p>'}
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center"><input id="pay_amt" type="number" step="0.01" placeholder="Amount" style="width:110px"><input id="pay_date" type="date" value="${esc(new Date().toISOString().slice(0,10))}" style="width:auto"><input id="pay_method" placeholder="Method" value="Bank Transfer" style="width:130px"><input id="pay_ref" placeholder="Ref (optional)" style="width:130px"><button class="btn btn-sm btn-primary" onclick="payAdd('${esc(v.id)}')">Record payment</button></div></div>`:'<p class="muted" style="font-size:11px;margin-top:8px">Save the invoice first to record payments.</p>'}
    </div>`;
    $('invEditor').scrollIntoView({behavior:'smooth'});
  }
  window.invRecalc=()=>{ if(!INV_EDIT)return; const t=(INV_EDIT.items||[]).reduce((a,it)=>a+(parseFloat(it.amount)||0),0); const el=$('iv_total'); if(el)el.textContent=money($('iv_cur')?$('iv_cur').value:INV_EDIT.currency,t); };
  window.invClientPick=(ckey)=>{const x=CONTACTS.find(c=>c.ckey===ckey);if(x){INV_EDIT.ckey=x.ckey;INV_EDIT.clientName=x.name;INV_EDIT.email=x.email;}};
  window.invAddItem=()=>{ INV_EDIT.items=INV_EDIT.items||[]; INV_EDIT.items.push({desc:'',amount:''}); renderInvEditor(); };
  window.invRemoveItem=(i)=>{ INV_EDIT.items.splice(i,1); renderInvEditor(); };
  window.invNew=()=>{INV_EDIT={id:'',ckey:'',clientName:'',email:'',caseId:'',currency:'RM',items:[{desc:'',amount:''}],status:'Draft',issueDate:new Date().toISOString().slice(0,10),dueDate:'',notes:'',payments:[],amountPaid:0};renderInvEditor();};
  window.invEdit=(id)=>{const x=INVOICES.find(v=>v.id===id);if(!x)return;INV_EDIT=JSON.parse(JSON.stringify(x));renderInvEditor();};

  let AUTO_RULES=[], AUTO_LOG=[], AUTO_EDIT=null;
  async function renderAutomations(){
    $('content').innerHTML='<div class="card"><h3>⚡ Automation Center</h3><p class="muted">Loading…</p></div>';
    const [rr,lr]=await Promise.all([api('/crm-automation.php',{action:'rules-list'}),api('/crm-automation.php',{action:'log'})]);
    AUTO_RULES=(rr&&rr.rules)||[]; AUTO_LOG=(lr&&lr.log)||[];
    const rows=AUTO_RULES.map(r=>{
      const cond=[r.stage?('Stage = '+r.stage):'',r.condCat?('Score = '+r.condCat):'',r.condSource?('Source = '+r.condSource):''].filter(Boolean).join(' · ')||'Any';
      const acts=(r.actions||[]).map(a=>a.type).join(', ')||'—';
      return `<tr><td><strong>${esc(r.name)}</strong></td><td>${esc(r.trigger)}</td><td class="muted">${esc(cond)}</td><td class="muted">${esc(acts)}</td><td><input type="checkbox" ${r.enabled?'checked':''} onchange="autoToggle('${esc(r.id)}',this.checked)" style="width:auto"></td><td class="right"><button class="btn btn-sm" onclick="autoEdit('${esc(r.id)}')">Edit</button> <button class="btn btn-sm" onclick="autoDel('${esc(r.id)}')">Delete</button></td></tr>`;
    }).join('');
    $('content').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">⚡ Automation Center</h3><button class="btn btn-primary btn-sm" onclick="autoNew()">+ New rule</button></div>
      <p class="muted" style="font-size:13px;line-height:1.6">Build <strong>Trigger → Condition → Action</strong> workflows. The built-in per-status tasks always run; these rules add your own actions on top. (Email / WhatsApp / AI actions activate once those integrations are connected.)</p>
      <div style="overflow:auto"><table><thead><tr><th>Rule</th><th>Trigger</th><th>Conditions</th><th>Actions</th><th>On</th><th class="right"></th></tr></thead><tbody>${rows||'<tr><td colspan="6" class="muted" style="padding:14px">No custom rules yet — the built-in per-status automations are active. Add a rule to fire notifications, webhooks or extra tasks.</td></tr>'}</tbody></table></div></div>
      <div id="autoEditor"></div>
      <div class="card"><h3>Automation activity log</h3><div style="overflow:auto"><table><thead><tr><th>When</th><th>Rule</th><th>Trigger</th><th>Lead</th><th>Action</th></tr></thead><tbody>${AUTO_LOG.map(e=>`<tr><td class="muted">${esc((e.at||'').slice(0,16).replace('T',' '))}</td><td>${esc(e.rule||'')}</td><td class="muted">${esc(e.trigger||'')}</td><td>${esc(e.lead||'')}</td><td class="muted">${esc(e.action||'')}</td></tr>`).join('')||'<tr><td colspan="5" class="muted" style="padding:12px">No automation activity yet.</td></tr>'}</tbody></table></div></div>`;

  function syncAuto(){ if(!AUTO_EDIT)return; const g=id=>{const e=$(id);return e?e.value:undefined;}; let v; if((v=g('ar_name'))!==undefined)AUTO_EDIT.name=v; if((v=g('ar_stage'))!==undefined)AUTO_EDIT.stage=v; if((v=g('ar_cat'))!==undefined)AUTO_EDIT.condCat=v; if((v=g('ar_src'))!==undefined)AUTO_EDIT.condSource=v; }
  function autoActionRow(a,i){
    const types=[['task','Create task'],['notification','Notification'],['webhook','Webhook']];
    const typeSel=`<select onchange="AUTO_EDIT.actions[${i}].type=this.value;renderAutoEditor()" style="width:auto">${types.map(([v,l])=>`<option value="${v}" ${v===a.type?'selected':''}>${l}</option>`).join('')}</select>`;
    let fields='';
    if(a.type==='task'){ fields=`<input placeholder="Task title (e.g. Call {{name}})" value="${esc(a.title||'')}" oninput="AUTO_EDIT.actions[${i}].title=this.value">
      <div style="display:flex;gap:6px;flex-wrap:wrap"><input placeholder="Task type" value="${esc(a.taskType||'Follow-up')}" oninput="AUTO_EDIT.actions[${i}].taskType=this.value" style="width:130px"><select onchange="AUTO_EDIT.actions[${i}].priority=this.value" style="width:auto">${['High','Normal','Low'].map(pr=>`<option ${pr===(a.priority||'Normal')?'selected':''}>${pr}</option>`).join('')}</select><input type="number" min="0" value="${a.dueDays!=null?a.dueDays:1}" oninput="AUTO_EDIT.actions[${i}].dueDays=this.value" style="width:90px" title="Due in N days"></div>`; }
    else if(a.type==='notification'){ fields=`<input placeholder="Message (e.g. New hot lead: {{name}})" value="${esc(a.message||'')}" oninput="AUTO_EDIT.actions[${i}].message=this.value">`; }
    else if(a.type==='webhook'){ fields=`<input placeholder="https://hooks.zapier.com/… (POST lead JSON)" value="${esc(a.url||'')}" oninput="AUTO_EDIT.actions[${i}].url=this.value">`; }
    return `<div class="note" style="margin-bottom:6px"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div style="flex:1">${typeSel}</div><button class="btn btn-sm" onclick="autoRemoveAction(${i})">✕</button></div><div style="margin-top:6px;display:flex;flex-direction:column;gap:6px">${fields}</div></div>`;
  }
  function renderAutoEditor(){
    const r=AUTO_EDIT; if(!r){const e=$('autoEditor');if(e)e.innerHTML='';return;}
    const TRIGGERS=['Status Changed','Lead Created','Document Uploaded'];
    const stageOpts=['',...STAGES].map(s=>`<option value="${esc(s)}" ${s===r.stage?'selected':''}>${s?esc(s):'Any stage'}</option>`).join('');
    const catOpts=['','Sales Ready','Hot','Warm','Cold'].map(s=>`<option value="${s}" ${s===r.condCat?'selected':''}>${s||'Any score'}</option>`).join('');
    const srcOpts=['','AI','Standard'].map(s=>`<option value="${s}" ${s===r.condSource?'selected':''}>${s||'Any source'}</option>`).join('');
    const actHtml=(r.actions||[]).map((a,i)=>autoActionRow(a,i)).join('');
    $('autoEditor').innerHTML=`<div class="card"><h3>${r._new?'New rule':'Edit rule'}</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label class="muted" style="font-size:12px">Rule name</label><input id="ar_name" value="${esc(r.name||'')}"></div>

      <h4 style="margin:14px 0 6px">Actions</h4><div id="ar_actions">${actHtml||'<p class="muted" style="font-size:12px">No actions yet — add one below.</p>'}</div>

    $('autoEditor').scrollIntoView({behavior:'smooth'});
  }

  async function importLeadsFile(file){
    const m=$('sysMsg'); if(m){m.textContent='Reading '+file.name+'…';m.className='muted';}
    let text=''; try{ text=await file.text(); }catch(e){ if(m){m.textContent='Could not read file';m.className='err';} return; }
    const t=text.trim(); let leads=[];
    try{ if(t[0]==='['){ leads=JSON.parse(t); } else { leads=t.split(/\r?\n/).filter(Boolean).map(l=>{ try{return JSON.parse(l);}catch(e){return null;} }).filter(Boolean); } }catch(e){ if(m){m.textContent='Invalid file format';m.className='err';} return; }
    if(!leads.length){ if(m){m.textContent='No leads found in file';m.className='err';} return; }
    if(!confirm('Import '+leads.length+' lead(s) into the CRM?\n\nExisting leads are kept; duplicates (same email or HubSpot ID) are skipped. A safety snapshot is taken first.'))return;
    const p=progressBar($('sysProgress'),'Importing '+leads.length+' leads…');
    // chunk to keep each POST well under limits
    let added=0,skipped=0,ok=true;
    for(let i=0;i<leads.length;i+=300){
      const chunk=leads.slice(i,i+300);
      const r=await api('/system-backup.php',{action:'import-leads',leads:chunk,reason:'file:'+file.name});
      if(r&&r.ok){ added+=r.added||0; skipped+=r.skipped||0; } else { ok=false; break; }
    }
    p.done(ok, ok?('Imported '+added+' leads ✓ ('+skipped+' duplicates skipped)'):'Import failed');

  }

  /* Human-friendly "time ago" + absolute date for a backup timestamp. */
  function backupAgo(iso){
    if(!iso) return '';
    const t=new Date(iso).getTime(); if(isNaN(t)) return '';
    const mins=Math.max(0,Math.round((Date.now()-t)/60000));
    let ago; if(mins<1)ago='just now'; else if(mins<60)ago=mins+' min ago'; else if(mins<1440)ago=Math.round(mins/60)+' hr ago'; else ago=Math.round(mins/1440)+' day(s) ago';
    return new Date(iso).toLocaleString([],{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})+' ('+ago+')';
  }

    p.done(!!(r&&r.ok), r&&r.ok?('Restored '+r.restored+' files from OneDrive ✓'):('Restore failed — '+((r&&r.error)||'unknown error')));
    if(r&&r.ok){ if(m){m.textContent='Restored '+r.restored+' files ✓ — reloading leads.';m.className='ok';} setTimeout(()=>loadAll(),600); setTimeout(()=>{ if(VIEW==='settings')loadBackups(); },1000); }
    else if(m){m.textContent=(r&&r.error)||'Restore failed';m.className='err';}
  }
  async function downloadBackup(ts){
    const m=$('bkMsg'); if(m){m.textContent='Preparing download…';m.className='muted';}
    try{ const r=await fetch('/crm-backup.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW(),action:'download',ts})});
      if(!r.ok){ if(m){m.textContent='Download failed';m.className='err';} return; }
      const b=await r.blob(); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='imigrate-crm-backup-'+ts+'.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1500);
      if(m){m.textContent='Downloaded ✓';m.className='ok';}
    }catch(e){ if(m){m.textContent='Download failed';m.className='err';} }
  }
  async function diagOne(url,body){
    try{ const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW(),author:CRM_USER(),...body})}); const txt=await r.text(); let p=null,cnt='—',ok='?'; try{ p=JSON.parse(txt); ok=String(!!p.ok); const a=p.leads||p.reports||p.tasks||(p.meta?Object.keys(p.meta):null); cnt=Array.isArray(a)?a.length:(a&&typeof a==='object'?Object.keys(a).length:'(none)'); }catch(e){ ok='UNPARSEABLE'; } return {status:r.status,ok,cnt,sample:txt.slice(0,160)}; }catch(e){ return {status:'ERR',ok:e.message,cnt:'—',sample:''}; }
  }
  async function diagLoading(){
    const box=$('bkDiag'); if(box)box.innerHTML='<p class="muted" style="font-size:13px">Running diagnostic…</p>';
    const tests=[['leads-read.php','/leads-read.php',{action:'list'}],['crm-reports.php','/crm-reports.php',{action:'list'}],['crm-meta.php','/crm-meta.php',{action:'list'}],['crm-tasks.php','/crm-tasks.php',{action:'list'}]];
    const rows=[];
    for(const [name,url,body] of tests){ const d=await diagOne(url,body); rows.push(`<tr><td><code>${name}</code></td><td>${d.status}</td><td>${esc(String(d.ok))}</td><td><strong>${esc(String(d.cnt))}</strong></td><td class="muted" style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.sample)}</td></tr>`); }
    if(box)box.innerHTML=`<div class="card" style="background:#fbfcfe;margin-top:10px"><strong style="font-size:13px">Data-loading diagnostic</strong><div style="overflow:auto"><table style="font-size:12px"><thead><tr><th>Endpoint</th><th>HTTP</th><th>ok</th><th>records</th><th>response starts with</th></tr></thead><tbody>${rows.join('')}</tbody></table></div><p class="muted" style="font-size:11px;margin-top:6px">Share these rows with support if leads still don't appear. HTTP 200 + ok=true + records&gt;0 means data is loading; records=0 with a count above in “Current live store” means a format issue (now auto-healed on next load).</p></div>`;
  }

  /* ---------- HubSpot integration (moved from the legacy admin) ---------- */
  let HS={enabled:false,portalId:'',formGuid:'',notifyEmail:'',includeMessageSummary:true,fieldMap:{}};
  async function hubspotLoad(){
    const box=$('hubspotPanel'); if(!box) return;
    try{ const r=await fetch('/hubspot.json?_='+Date.now(),{cache:'no-store'}); if(r.ok){const j=await r.json(); if(j&&typeof j==='object') HS={enabled:!!j.enabled,portalId:j.portalId||'',formGuid:j.formGuid||'',notifyEmail:j.notifyEmail||'',includeMessageSummary:j.includeMessageSummary!==false,fieldMap:j.fieldMap||{}}; } }catch(e){}
    hubspotRender();
  }
  function hubspotRender(){
    const box=$('hubspotPanel'); if(!box) return;
    const rows=Object.entries(HS.fieldMap||{}).map(([k,v],i)=>`<div class="toolbar" style="margin-bottom:6px"><input value="${esc(k)}" placeholder="website field (e.g. occupation)" data-hsk="${i}" style="min-width:180px"><span class="muted">→</span><input value="${esc(v)}" placeholder="HubSpot property (e.g. jobtitle)" data-hsv="${i}" style="min-width:180px"><button class="btn btn-sm" onclick="hubspotDelRow(${i})">✕</button></div>`).join('');
    box.innerHTML=`
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:10px"><input type="checkbox" id="hsEnabled" style="width:auto" ${HS.enabled?'checked':''}> <strong>Enable HubSpot sync</strong> <span class="badge ${HS.enabled?'ready':'cold'}">${HS.enabled?'on':'off'}</span></label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label class="muted" style="font-size:12px">Portal ID</label><input id="hsPortal" value="${esc(HS.portalId)}" placeholder="e.g. 12345678"></div>
        <div><label class="muted" style="font-size:12px">Form GUID</label><input id="hsForm" value="${esc(HS.formGuid)}" placeholder="e.g. 9f1c…-…"></div>
        <div><label class="muted" style="font-size:12px">Notify email (optional)</label><input id="hsNotify" value="${esc(HS.notifyEmail)}"></div>
        <div style="display:flex;align-items:flex-end"><label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="hsIncMsg" style="width:auto" ${HS.includeMessageSummary?'checked':''}> Include a message summary</label></div>
      </div>
      <div style="margin-top:12px"><strong style="font-size:13px">Field mapping</strong><p class="muted" style="font-size:12px;margin:2px 0 8px">Map website form fields to HubSpot contact properties. Unmapped fields are still saved in the Message property.</p>${rows}<button class="btn btn-sm" onclick="hubspotAddRow()">+ Add mapping</button></div>
      <div style="display:flex;gap:8px;margin-top:14px;align-items:center"><button class="btn btn-primary btn-sm" onclick="hubspotSave()">💾 Save HubSpot settings</button><button class="btn btn-sm" onclick="hubspotRetry()">↻ Retry syncing unsynced leads</button><span id="hsMsg" class="muted" style="font-size:12px"></span></div>
      <p class="muted" style="font-size:12px;margin-top:8px">Portal ID and Form GUID are not secrets. Settings are stored in <code>hubspot.json</code> on the server and used by the lead-capture pipeline.</p>`;
  }
  function hubspotCollect(){
    const box=$('hubspotPanel'); const map={};
    box.querySelectorAll('[data-hsk]').forEach(el=>{const i=el.getAttribute('data-hsk');const k=el.value.trim();const v=(box.querySelector(`[data-hsv="${i}"]`)||{}).value||'';if(k)map[k]=v.trim();});
    HS={enabled:$('hsEnabled').checked,portalId:$('hsPortal').value.trim(),formGuid:$('hsForm').value.trim(),notifyEmail:$('hsNotify').value.trim(),includeMessageSummary:$('hsIncMsg').checked,fieldMap:map};
  }
  window.hubspotAddRow=()=>{hubspotCollect();HS.fieldMap['']='';hubspotRender();};
  window.hubspotDelRow=(i)=>{hubspotCollect();const keys=Object.keys(HS.fieldMap);delete HS.fieldMap[keys[i]];hubspotRender();};
  async function hubspotSave(){
    hubspotCollect();const msg=$('hsMsg');if(msg)msg.textContent='Saving…';
    const r=await fetch('/save-content.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW(),file:'hubspot.json',content:HS})});
    const j=await r.json().catch(()=>({ok:false}));
    if(msg)msg.textContent=j.ok?'Saved ✓':(j.error||'Save failed');
    hubspotRender();
  }
  async function hubspotRetry(){
    const msg=$('hsMsg');if(msg)msg.textContent='Retrying…';
    const r=await api('/leads-read.php',{action:'retry'});
    if(msg)msg.textContent=r.ok?`Retried ${r.retried||0}, synced ${r.synced||0}`:'Retry failed';
  }

  async function m365LoadStatus(){
    const box=$('m365Status'); if(!box) return;
    let r; try{ r=await api('/m365.php',{action:'status'}); }catch(e){ r={ok:false}; }
    const s=(r&&r.status)||{};
    if(!s.configured){
      box.innerHTML=`<span class="badge std">Not configured</span><p class="muted" style="font-size:13px;margin-top:6px">Add Azure app credentials in <code>m365-config.php</code> to enable. The module is fully built and waiting on credentials.</p>`;
      return;
    }
    if(s.connected){
      box.innerHTML=`<span class="badge ready">Connected</span> <strong>${esc(s.displayName||'')}</strong> <span class="muted">${esc(s.account||'')}</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
          <button class="btn btn-sm" onclick="m365Inbox()">📥 Sync inbox</button>
          <button class="btn btn-sm btn-primary" onclick="m365FullBackup()">☁️ Back up ALL CRM data to OneDrive</button>
          <button class="btn btn-sm" onclick="m365Backup()">Leads CSV → OneDrive</button>
          <button class="btn btn-sm" onclick="m365Disconnect()">Disconnect</button>
        </div>
        <p class="muted" style="font-size:12px;margin-top:6px">Full backup includes leads, cases, invoices, tasks, notes, automations &amp; reports → OneDrive ▸ <strong>iMigrate CRM Backups</strong>. It also runs <strong>automatically with the daily backup</strong>.</p>
        <div id="m365OnedriveLast" class="muted" style="font-size:13px;margin-top:4px">☁️ Last OneDrive backup: <strong>checking…</strong></div>
        <div id="m365Progress"></div>`;
      refreshOnedriveLast();
    } else {
      box.innerHTML=`<span class="badge warm">Configured · not connected</span>
        <div style="margin-top:10px"><a class="btn btn-sm btn-primary" href="/m365.php?action=connect" target="_blank" onclick="setTimeout(m365LoadStatus,6000)">🔗 Connect Microsoft 365</a></div>`;
    }
  }
  async function m365Inbox(){
    const box=$('m365Inbox'); if(box)box.innerHTML='<p class="muted">Loading inbox…</p>';
    const r=await api('/m365.php',{action:'messages',top:10});
    const msgs=(r&&r.messages)||[];
    if(box) box.innerHTML = msgs.length ? `<div class="card" style="background:var(--bg)"><h3 style="margin:0 0 8px;font-size:12px">Recent inbox</h3>${msgs.map(m=>`<div class="note"><strong>${esc((m.from&&m.from.emailAddress&&m.from.emailAddress.name)||'')}</strong> — ${esc(m.subject||'(no subject)')}<div class="t">${esc(fmtDT(m.receivedDateTime))}</div><div class="muted" style="font-size:12px">${esc((m.bodyPreview||'').slice(0,120))}</div></div>`).join('')}</div>` : '<p class="muted">No messages or not connected.</p>';
  }
  async function m365Backup(){
    const cols=['name','sourceType','email','phone','occupation','points','visas','stage','source','latestDate'];
    const rows=[cols.join(',')]; CONTACTS.forEach(c=>rows.push(cols.map(k=>'"'+String(c[k]==null?'':c[k]).replace(/"/g,'""')+'"').join(',')));
    const content=btoa(unescape(encodeURIComponent('﻿'+rows.join('\r\n'))));
    const name='imigrate-crm-leads-'+new Date().toISOString().slice(0,10)+'.csv';
    const r=await api('/m365.php',{action:'onedrive',name,content,folder:'iMigrate CRM'});
    alert(r&&r.ok?('Backed up '+CONTACTS.length+' leads to OneDrive › iMigrate CRM › '+name):'Backup failed (check Microsoft 365 connection).');
  }
  async function m365FullBackup(){
    if(!confirm('Back up ALL CRM data (leads, cases, invoices, tasks, notes, automations, reports) to OneDrive now?'))return;
    const p=progressBar($('m365Progress'),'Backing up all CRM data to OneDrive…');
    const r=await api('/crm-backup.php',{action:'onedrive-backup'});
    p.done(!!(r&&r.ok), r&&r.ok?('✅ Backed up '+(r.count||'all')+' files → OneDrive ▸ iMigrate CRM Backups ▸ '+(r.file||'')):('Backup failed — '+((r&&r.error)||'check the Microsoft 365 connection')));
    if(r&&r.ok)refreshOnedriveLast();
  }
  async function m365Disconnect(){ if(!confirm('Disconnect Microsoft 365?'))return; await api('/m365.php',{action:'disconnect'}); m365LoadStatus(); $('m365Inbox').innerHTML=''; }

  /* ---------- orphaned-CV reconciliation ---------- */
  async function cvReconcileScan(){
    const msg=$('cvReconMsg'), box=$('cvReconResult'); if(msg)msg.textContent='Scanning…'; if(box)box.innerHTML='';
    const r=await api('/crm-reconcile-cv.php',{action:'scan'});
    if(!r||!r.ok){ if(msg)msg.textContent='Scan failed.'; return; }
    if(msg)msg.textContent=`${r.orphans} orphan file(s), ${r.confident} confident match(es).`;
    const rows=(r.matches||[]).map(m=>`<tr><td class="muted">${esc(m.file)}</td><td>${esc((m.uploadTime||'').slice(0,16).replace('T',' '))}</td><td>${m.match?esc(m.match.name||m.match.email||m.match.ckey):'<span class="muted">no match</span>'}</td><td>${m.match?esc(m.match.deltaSeconds)+'s':'—'}</td><td>${m.confident?'<span class="badge ready">confident</span>':(m.match?'<span class="badge warm">ambiguous ('+m.candidates+')</span>':'<span class="badge cold">none</span>')}</td></tr>`).join('');
    if(box) box.innerHTML = (r.matches&&r.matches.length)
      ? `<div class="card" style="background:var(--bg);padding:0;overflow:auto"><table><thead><tr><th>File</th><th>Uploaded</th><th>Best match</th><th>Δt</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>
         ${r.confident>0?`<button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="cvReconcileApply()">✔ Attach ${r.confident} confident match(es)</button>`:''}`
      : '<p class="muted">No orphaned CVs found — nothing to recover.</p>';
  }
  async function cvReconcileApply(){
    if(!confirm('Attach the confident CV matches to their leads? Originals are not modified; a backup of crm-meta is taken first.'))return;
    const r=await api('/crm-reconcile-cv.php',{action:'apply'});
    if(r&&r.ok){ alert('Attached '+r.applied+' CV(s) to leads.'); await loadAll(); go('settings'); cvReconcileScan(); }
    else alert('Apply failed.');
  }

  /* ---------- pipeline stage migration ---------- */
  async function previewMigration(){
    const msg=$('migMsg'),box=$('migResult');
    if(msg)msg.textContent='Scanning…'; if(box)box.innerHTML='';
    const r=await api('/crm-meta.php',{action:'migrate-stages',dryRun:true});
    if(!r||!r.ok){if(msg)msg.textContent=r&&r.error?r.error:'Scan failed.';return;}
    if(msg)msg.textContent=r.total+' leads scanned · '+r.changes.length+' to update.';
    if(!r.changes.length){if(box)box.innerHTML='<p class="muted" style="font-size:13px">All leads already use the new status system — no changes needed.</p>';return;}
    const rows=r.changes.map(c=>`<tr><td>${esc(c.name||c.key)}</td><td>${stageBadge(c.from)}</td><td style="color:var(--muted)">→</td><td>${stageBadge(c.to)}</td></tr>`).join('');
    if(box)box.innerHTML=`<div style="overflow:auto;margin-top:8px"><table><thead><tr><th>Lead</th><th>Current (legacy)</th><th></th><th>New status</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }
  async function runMigration(){
    const legacyCount=Object.keys(STAGE_MIGRATION_MAP).length;
    if(!confirm('Migrate '+legacyCount+' legacy stage types to the new 15-status system?\n\nA full backup is created first. Signed Up and Lost Lead records are protected.\n\nContinue?'))return;
    const msg=$('migMsg'),box=$('migResult');
    if(msg){msg.textContent='Backing up and migrating…';msg.className='muted';}
    const r=await api('/crm-meta.php',{action:'migrate-stages',dryRun:false});
    if(!r||!r.ok){if(msg){msg.textContent=(r&&r.error)||'Migration failed.';msg.className='err';}return;}
    if(msg){msg.textContent='✓ Migrated '+r.migrated+' lead(s). Backup: '+esc(r.backupTs);msg.className='ok';}
    if(box)box.innerHTML=`<p class="ok" style="font-size:13px">Migration complete. ${r.migrated} stage(s) updated. Safety backup: <code>${esc(r.backupTs)}</code>.</p>`;
    await loadAll();
  }

  /* ---------- export / theme ---------- */
  function exportCsv(){
    const cols=['name','sourceType','email','phone','whatsapp','country','occupation','anzsco','points','visas','score','cat','stage','source','firstDate','latestDate'];
    const rows=[cols.join(',')];
    CONTACTS.forEach(c=>rows.push(cols.map(k=>{let v=c[k];v=(v==null?'':String(v)).replace(/"/g,'""');return '"'+v+'"';}).join(',')));
    const blob=new Blob(['﻿'+rows.join('\r\n')],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='imigrate-crm-leads.csv';a.click();
  }
  function setTheme(t){document.body.dataset.theme=t;localStorage.setItem('imig_crm_theme',t);$('themeBtn').textContent=t==='dark'?'☀️ Light':'🌙 Dark';}
  function toggleTheme(){setTheme(document.body.dataset.theme==='dark'?'light':'dark');}

  /* Single sign-on when launched from the Admin Portal: auto-unlock from the shared
     same-origin session key and deep-link to a section (#m=). */
  (async function portalAutoInit(){
    const pw=sessionStorage.getItem('imig_crm_pw'); if(!pw)return;
    try{ const r=await fetch('/admin-verify.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})}); const j=await r.json().catch(()=>({})); if(!r.ok||!j.ok)return; }catch(e){return;}
    document.getElementById('gate').classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
    if(localStorage.getItem('imig_crm_theme')==='dark') setTheme('dark');
    await loadAll();
    const m=(location.hash.match(/m=([a-zA-Z]+)/)||[])[1]; if(m){ try{ go(m); }catch(e){} }
  })();
</script>
