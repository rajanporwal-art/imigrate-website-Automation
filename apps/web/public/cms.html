<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>iMigrate CMS</title>
<style>
  :root{--bg:#f4f6fb;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--navy:#0b1f44;--accent:#c8a24a;--cta:#e11d2a;--ok:#1a7f37;--warn:#b45309;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}
  .hidden{display:none!important}
  button{font-family:inherit;cursor:pointer}
  .btn{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600}
  .btn:hover{border-color:var(--accent)}
  .btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
  .btn-cta{background:var(--cta);color:#fff;border-color:var(--cta)}
  .btn-sm{padding:4px 9px;font-size:12px}
  input,select,textarea{font-family:inherit;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;width:100%}
  label.fl{font-size:12px;color:var(--muted);display:block;margin:8px 0 3px;text-transform:capitalize}
  #gate{max-width:380px;margin:12vh auto;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:var(--shadow);text-align:center}
  #gate h1{font-size:20px;margin:0 0 4px}#gate p{color:var(--muted);font-size:13px;margin:0 0 18px}
  #app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
  .sidebar{background:var(--navy);color:#cdd7ea;padding:16px 12px;position:sticky;top:0;height:100vh;overflow:auto}
  .sidebar .brand{display:flex;align-items:center;gap:8px;color:#fff;font-weight:800;font-size:18px;padding:6px 8px 14px}
  .sidebar .brand span{color:var(--accent)}
  .navitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;color:#cdd7ea;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:2px}
  .navitem.active,.navitem:hover{background:rgba(255,255,255,.1);color:#fff}
  .navitem .ic{width:18px;text-align:center}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:5}
  .topbar h2{margin:0;font-size:18px}
  .content{padding:22px;max-width:1000px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
  .card h3{margin:0 0 6px;font-size:15px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .muted{color:var(--muted)}.ok{color:var(--ok)}.err{color:var(--cta)}.right{text-align:right}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(11,31,68,.08);color:var(--navy)}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
  .badge.draft{background:#fef3c7;color:#92400e}.badge.live{background:#dcfce7;color:#166534}
  .item{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;background:var(--bg)}
  .item .hd{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .toolbar input,.toolbar select{width:auto}
  .savebar{position:sticky;bottom:0;background:var(--panel);border-top:1px solid var(--border);padding:12px 0;display:flex;gap:8px;align-items:center;margin-top:8px}
  table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:var(--muted);font-weight:600;padding:8px;border-bottom:2px solid var(--border)}td{padding:8px;border-bottom:1px solid var(--border)}
  .mediagrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  .mediacard{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg)}
  .mediacard .thumb{height:110px;background:#0b1f4408 center/cover no-repeat;display:flex;align-items:center;justify-content:center;font-size:34px}
  .mediacard .meta{padding:8px;font-size:11px}
  .grow{flex:1}
  @media(max-width:820px){#app{grid-template-columns:1fr}.sidebar{position:static;height:auto;display:flex;flex-wrap:wrap;gap:6px}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="gate">
  <h1>iMigrate <span style="color:var(--accent)">CMS</span></h1>
  <p>Sign in to manage website content</p>
  <input id="pw" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()" />
  <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="unlock()">Sign in</button>
  <p id="gateMsg" class="err" style="margin-top:12px;font-size:13px"></p>
</div>

<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="brand">iMigrate <span>CMS</span></div>
    <div id="nav"></div>
    <div style="margin-top:14px;border-top:1px solid rgba(255,255,255,.12);padding-top:10px">
      <a class="navitem" href="/crm.html" target="_blank"><span class="ic">📇</span> Open CRM</a>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <h2 id="viewTitle">Dashboard</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="loadMsg" class="muted" style="font-size:12px"></span>
        <a class="btn btn-sm" href="https://www.imigratesolution.com" target="_blank">🌐 View site</a>
        <button class="btn btn-sm" onclick="loadAll()">↻ Reload</button>
        <button class="btn btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
    <div class="content" id="view"></div>
  </div>
</div>

<script>
const $=(id)=>document.getElementById(id);
const PW=()=>sessionStorage.getItem('imig_cms_pw')||'';
const USER=()=>localStorage.getItem('imig_cms_user')||'Admin';
const ROLE=()=>localStorage.getItem('imig_cms_role')||'Admin';
const esc=(v)=>(v==null?'':String(v)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDT=(s)=>(s||'').slice(0,16).replace('T',' ');
let CONTENT={},FAQS={},FORMS={},MEDIA=[],BLOG={posts:[]},SEO={pages:{}},PAGES={pages:[]},VIEW='dashboard',DIRTY=false;

/* Sections + which roles may see them */
const SECTIONS=[
  ['dashboard','📊 Dashboard',['Admin','Content Editor','SEO Manager','Marketing']],
  ['pagelist','📑 Pages',['Admin','Content Editor','Marketing']],
  ['pages','📄 Page Content',['Admin','Content Editor','Marketing']],
  ['blog','✍️ Blogs',['Admin','Marketing']],
  ['seo','🔍 SEO',['Admin','SEO Manager']],
  ['settings','🏢 Site Settings',['Admin','Content Editor']],
  ['headfoot','🧭 Header & Footer',['Admin','Content Editor']],
  ['menus','🗂️ Menus',['Admin','Content Editor']],
  ['faqs','❓ FAQs',['Admin','Content Editor']],
  ['forms','📝 Forms',['Admin','Content Editor']],
  ['media','🖼️ Media Library',['Admin','Content Editor','Marketing']],
  ['search','🔎 Search',['Admin','Content Editor','SEO Manager','Marketing']],
  ['versions','🕓 Version History',['Admin']],
  ['rolesettings','⚙️ Settings & Roles',['Admin']],
];
/* Known website routes (for SEO + Pages registry) */
const SITE_ROUTES=[['/','Home'],['/about','About Us'],['/services','Services'],['/australia-migration','Australia PR'],['/canada-immigration','Canada PR'],['/australia-visas','Australia Visas'],['/canada-visas','Canada Visas'],['/c11-entrepreneur-work-permit','C11 Work Permit'],['/assessment','Assessment'],['/contact','Contact'],['/blog','Blog'],['/faq','FAQ'],['/success-stories','Success Stories'],['/privacy','Privacy Policy'],['/terms','Terms & Conditions']];

/* ---------- auth ---------- */
async function unlock(){
  const pw=$('pw').value.trim(),m=$('gateMsg'); if(!pw){m.textContent='Enter the password.';return;}
  m.textContent='Checking…';
  try{const r=await fetch('/admin-verify.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});const j=await r.json().catch(()=>({}));if(!r.ok||!j.ok){m.textContent=j.error||'Incorrect password.';return;}}catch(e){m.textContent='Could not reach server.';return;}
  sessionStorage.setItem('imig_cms_pw',pw);$('gate').classList.add('hidden');$('app').classList.remove('hidden');
  buildNav();await loadAll();
}
function logout(){sessionStorage.removeItem('imig_cms_pw');location.reload();}

async function api(url,body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW(),editor:USER(),...body})});return r.json().catch(()=>({ok:false}));}
async function loadDomain(d){const r=await api('/cms-content.php',{action:'load',domain:d});return r.ok?r.data:null;}

async function loadAll(){
  const m=$('loadMsg');m.textContent='Loading…';
  try{
    CONTENT=(await loadDomain('content'))||{};
    FAQS=(await loadDomain('faqs'))||{categories:[]};
    FORMS=(await loadDomain('forms'))||{forms:[]};
    BLOG=(await loadDomain('blog'))||{posts:[]}; if(!Array.isArray(BLOG.posts))BLOG.posts=[];
    SEO=(await loadDomain('seo'))||{pages:{}}; if(!SEO.pages)SEO.pages={};
    PAGES=(await loadDomain('pages'))||{pages:[]}; if(!Array.isArray(PAGES.pages))PAGES.pages=[];
    const mr=await api('/cms-media.php',{action:'list'});MEDIA=mr.media||[];
    m.textContent='Loaded';DIRTY=false;render();
  }catch(e){m.textContent='✗ Load failed (PHP enabled?)';}
}

/* ---------- nav / render ---------- */
function buildNav(){
  const role=ROLE();
  $('nav').innerHTML=SECTIONS.filter(([id,lab,roles])=>roles.includes(role)).map(([id,lab])=>`<div class="navitem ${VIEW===id?'active':''}" onclick="go('${id}')"><span>${lab}</span></div>`).join('');
}
function go(v){ if(DIRTY && !confirm('You have unsaved changes. Leave without publishing?'))return; VIEW=v;DIRTY=false;buildNav();render();window.scrollTo(0,0);}
function render(){
  const titles=Object.fromEntries(SECTIONS.map(([id,lab])=>[id,lab.replace(/^\S+\s/,'')]));
  $('viewTitle').textContent=titles[VIEW]||'';
  ({dashboard:rDashboard,pagelist:rPageList,pages:rPages,blog:rBlog,seo:rSeo,settings:rSettings,headfoot:rHeadFoot,menus:rMenus,faqs:rFaqs,forms:rForms,media:rMedia,search:rSearch,versions:rVersions,rolesettings:rRoleSettings}[VIEW]||rDashboard)();
}

/* ---------- path helpers for generic content editing ---------- */
function getPath(o,path){return path.split('.').reduce((a,k)=>a==null?a:a[k],o);}
function setPath(o,path,val){const ks=path.split('.');let a=o;for(let i=0;i<ks.length-1;i++){if(a[ks[i]]==null||typeof a[ks[i]]!=='object')a[ks[i]]={};a=a[ks[i]];}a[ks[ks.length-1]]=val;DIRTY=true;markDirty();}
function markDirty(){const b=$('dirtyFlag');if(b)b.textContent='● Unsaved changes';}
window.cmsSet=(path,val)=>setPath(CONTENT,path,val);

/* Generic editor: renders inputs for all string fields under an object (one level of nesting + arrays of objects). */
function fieldsEditor(obj,base){
  let h='';
  for(const k of Object.keys(obj||{})){
    if(k.startsWith('_'))continue;
    const v=obj[k],path=base?base+'.'+k:k,label=k.replace(/([A-Z])/g,' $1');
    if(typeof v==='string'){
      const long=v.length>60||/text|subtitle|intro|description|tagline|message|address/i.test(k);
      h+=`<label class="fl">${esc(label)}</label>`+(long?`<textarea rows="2" oninput="cmsSet('${path}',this.value)">${esc(v)}</textarea>`:`<input value="${esc(v)}" oninput="cmsSet('${path}',this.value)">`);
    }else if(typeof v==='number'){
      h+=`<label class="fl">${esc(label)}</label><input value="${esc(v)}" oninput="cmsSet('${path}',this.value)">`;
    }else if(Array.isArray(v)&&v.length&&typeof v[0]==='object'){
      h+=`<div class="card" style="background:var(--bg)"><h3 style="text-transform:capitalize">${esc(label)}</h3>${v.map((it,i)=>`<div class="item"><div class="hd"><strong>#${i+1}</strong><button class="btn btn-sm" onclick="arrRemove('${path}',${i})">Remove</button></div>${fieldsEditor(it,path+'.'+i)}</div>`).join('')}<button class="btn btn-sm" onclick="arrAdd('${path}')">+ Add item</button></div>`;
    }else if(Array.isArray(v)){
      /* array of plain strings (bullet lists, occupation lists, etc.) */
      h+=`<div class="card" style="background:var(--bg)"><h3 style="text-transform:capitalize">${esc(label)}</h3>${v.map((it,i)=>`<div style="display:flex;gap:6px;margin-bottom:6px"><input value="${esc(it)}" oninput="setStrArr('${path}',${i},this.value)"><button class="btn btn-sm" onclick="arrRemove('${path}',${i})">✕</button></div>`).join('')}<button class="btn btn-sm" onclick="strArrAdd('${path}')">+ Add</button></div>`;
    }else if(v&&typeof v==='object'){
      h+=`<div class="card" style="background:var(--bg)"><h3 style="text-transform:capitalize">${esc(label)}</h3>${fieldsEditor(v,path)}</div>`;
    }
  }
  return h;
}
window.arrRemove=(path,i)=>{const a=getPath(CONTENT,path);if(Array.isArray(a)){a.splice(i,1);DIRTY=true;render();}};
window.arrAdd=(path)=>{const a=getPath(CONTENT,path);if(Array.isArray(a)){const tpl=a.length?JSON.parse(JSON.stringify(a[0])):{};Object.keys(tpl).forEach(k=>tpl[k]='');a.push(tpl);DIRTY=true;render();}};
window.setStrArr=(path,i,v)=>{const a=getPath(CONTENT,path);if(Array.isArray(a)){a[i]=v;DIRTY=true;markDirty();}};
window.strArrAdd=(path)=>{const a=getPath(CONTENT,path);if(Array.isArray(a)){a.push('');DIRTY=true;render();}};

function saveBar(domain,label){
  return `<div class="savebar"><span id="dirtyFlag" class="muted" style="font-size:12px">${DIRTY?'● Unsaved changes':'Saved'}</span>
    <span class="grow"></span>
    <button class="btn" onclick="loadAll()">↩ Revert</button>
    <button class="btn btn-primary" onclick="publish('${domain}')">💾 Save &amp; Publish</button></div>
    <p class="muted" style="font-size:12px">Publishing updates the live website immediately. A version backup is saved automatically — you can roll back anytime from Version History.</p>`;
}
async function publish(domain){
  const data=domain==='content'?CONTENT:domain==='faqs'?FAQS:domain==='forms'?FORMS:domain==='blog'?BLOG:domain==='seo'?SEO:domain==='pages'?PAGES:null;
  if(!data)return;
  const r=await api('/cms-content.php',{action:'save',domain,data});
  if(r.ok){DIRTY=false;$('loadMsg').textContent='Published ✓';markSaved();alert('Saved & published. The live site is updated.');}
  else alert('Save failed: '+(r.error||'unknown'));
}
function markSaved(){const b=$('dirtyFlag');if(b)b.textContent='Saved';}

/* ---------- Dashboard ---------- */
function rDashboard(){
  const pages=['home','australia','canada','about','assessment','contactPage'].filter(k=>CONTENT[k]);
  const stat=(n,l,v)=>`<div class="card" style="display:inline-block;min-width:150px;margin-right:12px"><div style="font-size:26px;font-weight:800;color:var(--navy)">${n}</div><div class="muted" style="font-size:12px">${l}</div></div>`;
  const faqCount=(FAQS.categories||[]).reduce((a,c)=>a+(c.questions||[]).length,0);
  $('view').innerHTML=`
    <div style="display:flex;flex-wrap:wrap">${stat(pages.length,'Editable pages')}${stat(faqCount,'FAQs')}${stat((FORMS.forms||[]).length,'Forms')}${stat(MEDIA.length,'Media items')}</div>
    <div class="card"><h3>Welcome to the Website CMS</h3>
      <p class="muted" style="font-size:13.5px;line-height:1.6">Edit website content and click <strong>Save &amp; Publish</strong> — changes go live immediately, no redeploy. Every publish keeps a version backup you can roll back. This CMS manages the <strong>website only</strong>; the CRM and its lead data are completely separate and never touched.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
        <button class="btn" onclick="go('pages')">Edit page content</button>
        <button class="btn" onclick="go('settings')">Site settings</button>
        <button class="btn" onclick="go('media')">Media library</button>
        <button class="btn" onclick="go('versions')">Version history</button>
      </div></div>`;
}

/* ---------- Page Content ---------- */
let pageKey='home';
const PAGE_LABELS={home:'Home',about:'About Us',servicesPage:'Services',australia:'Australia PR',canada:'Canada PR',assessment:'Assessment',contactPage:'Contact',stats:'Stats bar',highlights:'Feature cards'};
function rPages(){
  const keys=Object.keys(PAGE_LABELS).filter(k=>CONTENT[k]!==undefined);
  if(!keys.includes(pageKey))pageKey=keys[0]||'home';
  const sel=`<select style="width:auto" onchange="pageKey=this.value;rPages()">${keys.map(k=>`<option value="${k}" ${k===pageKey?'selected':''}>${esc(PAGE_LABELS[k]||k)}</option>`).join('')}</select>`;
  const obj=CONTENT[pageKey];
  const body=Array.isArray(obj)?fieldsEditor({[pageKey]:obj},''):fieldsEditor(obj,pageKey);
  $('view').innerHTML=`<div class="toolbar"><span class="muted">Page:</span> ${sel} <a class="btn btn-sm" href="https://www.imigratesolution.com" target="_blank">Preview live</a></div>
    <div class="card">${body||'<p class="muted">No editable fields.</p>'}</div>${saveBar('content')}`;
}

/* ---------- Site Settings ---------- */
function rSettings(){
  if(!CONTENT.contact)CONTENT.contact={};
  const c=CONTENT.contact;
  const f=(lab,path,val)=>`<label class="fl">${lab}</label><input value="${esc(val||'')}" oninput="cmsSet('${path}',this.value)">`;
  $('view').innerHTML=`<div class="card"><h3>Company & contact</h3>
    ${f('Company Name','companyName',CONTENT.companyName||'iMigrate Migration Solutions')}
    <div class="row">${f('Phone','contact.phone',c.phone)}${f('WhatsApp (digits)','contact.whatsapp',c.whatsapp)}</div>
    <div class="row">${f('Email','contact.email',c.email)}${f('Business Hours','contact.businessHours',c.businessHours)}</div>
    ${f('Address','contact.address',c.address)}
    </div>
    <div class="card"><h3>Social profiles</h3><div class="row">
      ${f('LinkedIn','social.linkedin',(CONTENT.social||{}).linkedin)}${f('Facebook','social.facebook',(CONTENT.social||{}).facebook)}
      ${f('Instagram','social.instagram',(CONTENT.social||{}).instagram)}
    </div></div>${saveBar('content')}`;
}

/* ---------- Header & Footer ---------- */
function rHeadFoot(){
  if(!CONTENT.footer)CONTENT.footer={};
  const fdr=CONTENT.footer;
  const f=(lab,path,val,long)=>`<label class="fl">${lab}</label>`+(long?`<textarea rows="2" oninput="cmsSet('${path}',this.value)">${esc(val||'')}</textarea>`:`<input value="${esc(val||'')}" oninput="cmsSet('${path}',this.value)">`);
  const linkList=(title,path)=>{const arr=Array.isArray(fdr[path])?fdr[path]:[];return `<div class="card" style="background:var(--bg)"><h3>${title}</h3>${arr.map((l,i)=>`<div class="item"><div class="hd"><strong>#${i+1}</strong><span><button class="btn btn-sm" onclick="moveLink('${path}',${i},-1)">↑</button> <button class="btn btn-sm" onclick="moveLink('${path}',${i},1)">↓</button> <button class="btn btn-sm" onclick="arrRemove('footer.${path}',${i})">✕</button></span></div><div class="row"><input placeholder="Label" value="${esc(l.label||'')}" oninput="cmsSet('footer.${path}.${i}.label',this.value)"><input placeholder="/path" value="${esc(l.to||'')}" oninput="cmsSet('footer.${path}.${i}.to',this.value)"></div></div>`).join('')||'<p class="muted" style="font-size:12px">Using site defaults. Add an item to override.</p>'}<button class="btn btn-sm" onclick="addLink('${path}')">+ Add link</button></div>`;};
  $('view').innerHTML=`<div class="card"><h3>Logo</h3><p class="muted" style="font-size:13px">Current: <code>/images/imigrate-logo.jpg</code>. Upload a replacement in the Media Library, then update the path here if needed.</p>${f('Logo path','logo',CONTENT.logo||'/images/imigrate-logo.jpg')}</div>
    <div class="card"><h3>Footer text</h3>${f('Tagline','footer.tagline',fdr.tagline,true)}${f('Copyright (blank = auto © year + company)','footer.copyright',fdr.copyright)}</div>
    ${linkList('Quick Links','quickLinks')}
    ${linkList('Services links','serviceLinks')}
    ${saveBar('content')}`;
}
window.addLink=(path)=>{if(!Array.isArray(CONTENT.footer[path]))CONTENT.footer[path]=[];CONTENT.footer[path].push({label:'',to:'/'});DIRTY=true;render();};
window.moveLink=(path,i,d)=>{const a=CONTENT.footer[path];if(!a)return;const j=i+d;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];DIRTY=true;render();};

/* ---------- Menus (header nav) ---------- */
function rMenus(){
  if(!Array.isArray(CONTENT.nav))CONTENT.nav=[];
  const nav=CONTENT.nav;
  const def=[{name:'Home',path:'/'},{name:'About',path:'/about'},{name:'Services',path:'/services'},{name:'Australia PR',path:'/australia-migration'},{name:'Canada PR',path:'/canada-immigration'},{name:'C11 Permit',path:'/c11-entrepreneur-work-permit'},{name:'Other Visas',children:[{name:'Australia Visas',path:'/australia-visas'},{name:'Canada Visas',path:'/canada-visas'}]},{name:'Blog',path:'/blog'},{name:'Contact',path:'/contact'}];
  $('view').innerHTML=`<div class="card"><h3>Header navigation</h3>
    <p class="muted" style="font-size:13px">Edit the top menu. Items with children become a dropdown. Leave empty to use the site default.</p>
    ${nav.length?nav.map((it,i)=>`<div class="item"><div class="hd"><strong>${esc(it.name||'(item)')}</strong><span><button class="btn btn-sm" onclick="navMove(${i},-1)">↑</button> <button class="btn btn-sm" onclick="navMove(${i},1)">↓</button> <button class="btn btn-sm" onclick="arrRemove('nav',${i})">✕</button></span></div>
      <div class="row"><input placeholder="Label" value="${esc(it.name||'')}" oninput="cmsSet('nav.${i}.name',this.value)"><input placeholder="/path (leave blank if dropdown)" value="${esc(it.path||'')}" oninput="cmsSet('nav.${i}.path',this.value)"></div>

async function mediaUpload(){
  const inp=$('mFile'),msg=$('mMsg');if(!inp||!inp.files.length){if(msg)msg.textContent='Choose a file.';return;}

/* ---------- Search ---------- */
let searchQ='';
function rSearch(){
  const q=searchQ.toLowerCase().trim();const results=[];
  if(q){
    const walk=(o,path)=>{if(o==null)return;if(typeof o==='string'){if(o.toLowerCase().includes(q))results.push({where:'Content: '+path,text:o.slice(0,120),go:"go('pages')"});}else if(typeof o==='object'){for(const k in o){if(k.startsWith('_'))continue;walk(o[k],path?path+'.'+k:k);}}};
    walk(CONTENT,'');
    (FAQS.categories||[]).forEach(c=>(c.questions||[]).forEach(qq=>{if(((qq.q||'')+' '+(qq.a||'')).toLowerCase().includes(q))results.push({where:'FAQ',text:qq.q,go:"go('faqs')"});}));
    (FORMS.forms||[]).forEach(f=>{if(((f.title||'')+' '+(f.intro||'')).toLowerCase().includes(q))results.push({where:'Form',text:f.title,go:"go('forms')"});});
    MEDIA.forEach(m=>{if(((m.name||'')+' '+(m.alt||'')).toLowerCase().includes(q))results.push({where:'Media',text:m.name,go:"go('media')"});});
  }
  $('view').innerHTML=`<div class="card"><h3>Search content</h3><input type="search" placeholder="Search pages, FAQs, forms, media…" value="${esc(searchQ)}" oninput="searchQ=this.value;rSearch();this.focus()" autofocus>
    <div style="margin-top:12px">${q?(results.length?results.map(r=>`<div class="item"><div class="hd"><span class="pill">${esc(r.where)}</span><button class="btn btn-sm" onclick="${r.go}">Go</button></div><div>${esc(r.text)}</div></div>`).join(''):'<p class="muted">No matches.</p>'):'<p class="muted">Type to search across all website content.</p>'}</div></div>`;
}

function mdToolbar(id){
  const btn=(lab,b,a)=>`<button class="btn btn-sm" onclick="insertMd('${id}',${JSON.stringify(b)},${JSON.stringify(a||'')})">${lab}</button>`;
  return `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">${btn('Bold','**','**')}${btn('Italic','_','_')}${btn('H2','## ','')}${btn('H3','### ','')}${btn('• List','\n- ','')}${btn('1. List','\n1. ','')}${btn('Link','[','](https://)')}${btn('Image','![alt](','https://)')}${btn('Table','\n| A | B |\n| --- | --- |\n| 1 | 2 |\n','')}</div>`;
}
window.insertMd=(id,before,after)=>{const t=document.getElementById(id);if(!t)return;const s=t.selectionStart,e=t.selectionEnd,v=t.value;t.value=v.slice(0,s)+before+v.slice(s,e)+after+v.slice(e);t.dispatchEvent(new Event('input'));t.focus();t.selectionStart=t.selectionEnd=s+before.length;};
function mdRender(md){return esc(md).replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2 style="color:#0b1f44">$1</h2>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/_(.+?)_/g,'<em>$1</em>').replace(/!\[(.*?)\]\((.+?)\)/g,'<img alt="$1" src="$2" style="max-width:100%">').replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2">$1</a>').replace(/^- (.*)$/gm,'<li>$1</li>').replace(/\n\n/g,'<br><br>');}

/* ===================== SEO Manager ===================== */
let seoPath='/';
function seoScore(s){let score=0,recs=[];const t=(s.metaTitle||'').length,d=(s.metaDescription||'').length;
  if(t>=40&&t<=65)score+=30;else recs.push(`Meta title should be ~50–60 characters (currently ${t}).`);
  if(d>=120&&d<=165)score+=30;else recs.push(`Meta description should be ~120–160 characters (currently ${d}).`);
  if(s.keywords)score+=10;else recs.push('Add focus keywords.');
  if(s.canonical)score+=15;else recs.push('Set a canonical URL.');
  if(s.ogTitle||s.metaTitle)score+=8;else recs.push('Add an Open Graph title.');
  if(s.schema)score+=7;else recs.push('Add structured data (JSON-LD schema).');
  return{score:Math.min(100,score),recs};}
function recsHtml(recs){return recs.length?`<div class="card" style="background:var(--bg)"><strong>Recommendations</strong><ul style="margin:6px 0 0;font-size:13px">${recs.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></div>`:'<p class="ok" style="font-size:13px">✓ All key SEO fields look good.</p>';}
window.rSeoScore=()=>{const s=SEO.pages[seoPath]||{};const{score,recs}=seoScore(s);const b=$('seoScore');if(b){b.textContent='Score '+score+'/100';b.className='badge '+(score>=70?'live':'draft');}const rc=$('seoRecs');if(rc)rc.innerHTML=recsHtml(recs);};
function rSeo(){
  const routes=[...SITE_ROUTES.map(r=>r[0]),...Object.keys(SEO.pages||{})].filter((v,i,a)=>a.indexOf(v)===i);
  if(!routes.includes(seoPath))seoPath=routes[0]||'/';
  if(!SEO.pages[seoPath])SEO.pages[seoPath]={};
  const s=SEO.pages[seoPath];const lab=(SITE_ROUTES.find(r=>r[0]===seoPath)||[])[1]||seoPath;
  const{score}=seoScore(s);
  const set=(k)=>`oninput="SEO.pages['${seoPath}'].${k}=this.value;DIRTY=true;markDirty();rSeoScore()"`;
  $('view').innerHTML=`<div class="toolbar"><span class="muted">Page:</span><select onchange="seoPath=this.value;rSeo()">${routes.map(r=>`<option value="${esc(r)}" ${r===seoPath?'selected':''}>${esc((SITE_ROUTES.find(x=>x[0]===r)||[])[1]||r)} (${esc(r)})</option>`).join('')}</select><a class="btn btn-sm" href="https://www.imigratesolution.com${esc(seoPath)}" target="_blank">Preview</a></div>
   <div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h3>SEO — ${esc(lab)}</h3><span id="seoScore" class="badge ${score>=70?'live':'draft'}">Score ${score}/100</span></div>
    <label class="fl">Meta title</label><input value="${esc(s.metaTitle||'')}" ${set('metaTitle')}>
    <label class="fl">Meta description</label><textarea rows="2" ${set('metaDescription')}>${esc(s.metaDescription||'')}</textarea>
    <div class="row"><div><label class="fl">URL slug / path</label><input value="${esc(s.slug||seoPath)}" oninput="SEO.pages['${seoPath}'].slug=this.value;DIRTY=true;markDirty()"></div><div><label class="fl">Canonical URL</label><input value="${esc(s.canonical||'')}" ${set('canonical')}></div></div>
    <label class="fl">Keywords (comma-separated)</label><input value="${esc(s.keywords||'')}" ${set('keywords')}>
    <div class="row"><div><label class="fl">Open Graph title</label><input value="${esc(s.ogTitle||'')}" ${set('ogTitle')}></div><div><label class="fl">Open Graph description</label><input value="${esc(s.ogDescription||'')}" ${set('ogDescription')}></div></div>
    <label class="fl">Structured data / schema (JSON-LD)</label><textarea rows="5" style="font-family:ui-monospace,monospace" oninput="SEO.pages['${seoPath}'].schema=this.value;DIRTY=true;markDirty()">${esc(typeof s.schema==='object'?JSON.stringify(s.schema,null,2):(s.schema||''))}</textarea>
    <div id="seoRecs" style="margin-top:10px">${recsHtml(seoScore(s).recs)}</div>
   </div>${saveBar('seo')}`;
}

/* ===================== Pages registry ===================== */
function rPageList(){
  if(builderPath)return rBuilder();
  const reg=PAGES.pages||[];
  const rows=SITE_ROUTES.map(([path,title])=>{const e=reg.find(p=>p.path===path)||{};return{path,title:e.title||title,status:e.status||'published',type:e.type||'system'};});
  reg.filter(p=>!SITE_ROUTES.find(r=>r[0]===p.path)).forEach(p=>rows.push({path:p.path,title:p.title||p.path,status:p.status||'draft',type:p.type||'custom'}));
  $('view').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h3>Pages</h3><button class="btn btn-primary btn-sm" onclick="newCmsPage()">+ New page (visual builder)</button></div>
   <p class="muted" style="font-size:13px">Edit content/SEO, preview, duplicate or toggle status. <strong>Custom pages</strong> open the visual block builder; built-in pages link to their content &amp; SEO editors. Unpublish is enforced live for every page.</p>
   <div style="padding:0;overflow:auto"><table><thead><tr><th>Page</th><th>Path</th><th>Type</th><th>Status</th><th class="right">Actions</th></tr></thead><tbody>
   ${rows.map(r=>`<tr><td><strong>${esc(r.title)}</strong></td><td class="muted">${esc(r.path)}</td><td><span class="pill">${esc(r.type)}</span></td><td><span class="badge ${r.status==='published'?'live':'draft'}">${esc(r.status)}</span></td>
     <td class="right"><button class="btn btn-sm" onclick="${r.type==='custom'?`openBuilder('${esc(r.path)}')`:`pageEditContent('${esc(r.path)}')`}">Edit</button> <button class="btn btn-sm" onclick="pageSeo('${esc(r.path)}')">SEO</button> <a class="btn btn-sm" href="https://www.imigratesolution.com${esc(r.path)}" target="_blank">Preview</a> <button class="btn btn-sm" onclick="pageToggle('${esc(r.path)}',${JSON.stringify(esc(r.title))},'${esc(r.type)}','${r.status}')">${r.status==='published'?'Unpublish':'Publish'}</button> <button class="btn btn-sm" onclick="pageDup('${esc(r.path)}',${JSON.stringify(esc(r.title))})">Duplicate</button></td></tr>`).join('')}
   </tbody></table></div></div>`;
}
window.pageEditContent=(path)=>{const map={'/':'home','/about':'about','/australia-migration':'australia','/canada-immigration':'canada','/assessment':'assessment','/contact':'contactPage'};if(map[path]){pageKey=map[path];go('pages');}else{alert("This page's text lives in its component — edit its SEO here, or use the page builder (next phase) for full visual control.");pageSeo(path);}};
window.pageSeo=(path)=>{seoPath=path;go('seo');};
window.pageToggle=(path,title,type,status)=>{let e=PAGES.pages.find(p=>p.path===path);if(!e){e={path,title,type};PAGES.pages.push(e);}e.status=status==='published'?'unpublished':'published';publish('pages').then(()=>render());};
window.pageDup=(path,title)=>{const np=prompt('New path for the duplicated page:',path+'-copy');if(!np)return;const src=(PAGES.pages||[]).find(p=>p.path===path);const blocks=src&&src.blocks?JSON.parse(JSON.stringify(src.blocks)):[];PAGES.pages.push({path:np,title:title+' (copy)',type:'custom',status:'draft',blocks,metaTitle:title,duplicatedFrom:path});publish('pages').then(()=>{builderPath=np;render();});};

/* ===================== Visual block page builder ===================== */
let builderPath=null;
const BLOCK_TYPES=['hero','heading','richtext','image','button','cards','testimonials','faq','list','table','banner','cta','spacer'];
window.curPage=()=>(PAGES.pages||[]).find(p=>p.path===builderPath);
window.openBuilder=(path)=>{builderPath=path;VIEW='pagelist';buildNav();render();window.scrollTo(0,0);};
window.builderBack=()=>{builderPath=null;render();};
window.newCmsPage=()=>{let path=prompt('New page URL path (e.g. /landing-australia):','/new-page');if(!path)return;if(!path.startsWith('/'))path='/'+path;const title=prompt('Page title:','New Page')||'New Page';PAGES.pages.push({path,title,type:'custom',status:'draft',blocks:[],metaTitle:title,metaDescription:''});DIRTY=true;openBuilder(path);};
window.renamePath=(v)=>{const p=curPage();if(p){p.path=v;builderPath=v;DIRTY=true;}};
function blockTemplate(t){const d={hero:{type:'hero',heading:'Heading',subheading:'',bgImage:'',ctaText:'',ctaUrl:''},heading:{type:'heading',text:'Heading',level:2},richtext:{type:'richtext',markdown:''},image:{type:'image',url:'',alt:'',caption:''},button:{type:'button',text:'Button',url:'/',style:'solid',newTab:false},cards:{type:'cards',heading:'',items:[{icon:'⭐',title:'Title',text:'Text'}]},testimonials:{type:'testimonials',heading:'',items:[{quote:'',name:'',role:''}]},faq:{type:'faq',heading:'FAQs',items:[{q:'',a:''}]},list:{type:'list',heading:'',items:[]},table:{type:'table',headers:['Column A','Column B'],rows:[['1','2']]},banner:{type:'banner',text:'',bgColor:'#0b1f44'},cta:{type:'cta',heading:'',text:'',buttonText:'',buttonUrl:'/'},spacer:{type:'spacer',size:40}};return JSON.parse(JSON.stringify(d[t]||{type:t}));}
window.addBlock=()=>{const t=$('newBlockType').value;const p=curPage();p.blocks=p.blocks||[];p.blocks.push(blockTemplate(t));DIRTY=true;rBuilder();};
window.moveBlock=(bi,d)=>{const a=curPage().blocks,j=bi+d;if(j<0||j>=a.length)return;[a[bi],a[j]]=[a[j],a[bi]];DIRTY=true;rBuilder();};
window.delBlock=(bi)=>{if(!confirm('Delete this block?'))return;curPage().blocks.splice(bi,1);DIRTY=true;rBuilder();};
window.setBlock=(bi,f,v)=>{curPage().blocks[bi][f]=v;DIRTY=true;markDirty();};
window.setBlockItem=(bi,f,ii,fk,v)=>{curPage().blocks[bi][f][ii][fk]=v;DIRTY=true;markDirty();};
window.blockItemAdd=(bi,f,keys)=>{const o={};(keys||[]).forEach(k=>o[k]='');const b=curPage().blocks[bi];b[f]=b[f]||[];b[f].push(o);DIRTY=true;rBuilder();};
window.blockItemDel=(bi,f,ii)=>{curPage().blocks[bi][f].splice(ii,1);DIRTY=true;rBuilder();};
function blockFields(b,bi){
  const s=(f,lab,long)=>{const v=b[f]==null?'':b[f];return `<label class="fl">${lab}</label>`+(long?`<textarea rows="2" oninput="setBlock(${bi},'${f}',this.value)">${esc(v)}</textarea>`:`<input value="${esc(v)}" oninput="setBlock(${bi},'${f}',this.value)">`);};
  const items=(f,fields)=>{const arr=Array.isArray(b[f])?b[f]:[];return `<div class="card" style="background:#fff"><strong>Items</strong>${arr.map((it,ii)=>`<div class="item"><div class="hd"><span>#${ii+1}</span><button class="btn btn-sm" onclick="blockItemDel(${bi},'${f}',${ii})">✕</button></div>${fields.map(([fk,flab])=>`<label class="fl">${flab}</label><input value="${esc(it[fk]||'')}" oninput="setBlockItem(${bi},'${f}',${ii},'${fk}',this.value)">`).join('')}</div>`).join('')}<button class="btn btn-sm" onclick='blockItemAdd(${bi},${JSON.stringify(f)},${JSON.stringify(fields.map(x=>x[0]))})'>+ Add item</button></div>`;};
  switch(b.type){
    case 'hero': return s('heading','Heading')+s('subheading','Subheading',1)+s('bgImage','Background image URL')+s('ctaText','Button text')+s('ctaUrl','Button URL');
    case 'heading': return s('text','Text')+`<label class="fl">Level</label><select onchange="setBlock(${bi},'level',this.value)">${[1,2,3,4].map(l=>`<option ${String(b.level)===String(l)?'selected':''}>${l}</option>`).join('')}</select>`;
    case 'richtext': return mdToolbar('blk'+bi)+`<textarea id="blk${bi}" rows="8" style="font-family:ui-monospace,monospace" oninput="setBlock(${bi},'markdown',this.value)">${esc(b.markdown||'')}</textarea>`;
    case 'image': return s('url','Image URL')+`<button class="btn btn-sm" onclick="pickBlockImage(${bi})">Pick from media</button>`+s('alt','Alt text (accessibility)')+s('caption','Caption');
    case 'button': return s('text','Text')+s('url','URL')+`<label class="fl">Style</label><select onchange="setBlock(${bi},'style',this.value)"><option value="solid" ${b.style!=='outline'?'selected':''}>Solid</option><option value="outline" ${b.style==='outline'?'selected':''}>Outline</option></select><label style="display:flex;gap:6px;font-size:13px;margin-top:6px"><input type="checkbox" style="width:auto" ${b.newTab?'checked':''} onchange="setBlock(${bi},'newTab',this.checked)"> Open in new tab</label>`;
    case 'cards': return s('heading','Section heading')+items('items',[['icon','Icon (emoji)'],['title','Title'],['text','Text']]);
    case 'testimonials': return s('heading','Section heading')+items('items',[['quote','Quote'],['name','Name'],['role','Role']]);
    case 'faq': return s('heading','Section heading')+items('items',[['q','Question'],['a','Answer']]);
    case 'list': return s('heading','Heading')+`<label class="fl">Items (one per line)</label><textarea rows="5" oninput="setBlock(${bi},'items',this.value.split('\\n').map(x=>x.trim()).filter(Boolean))">${esc((b.items||[]).join('\n'))}</textarea>`;
    case 'table': return `<label class="fl">Headers (comma-separated)</label><input value="${esc((b.headers||[]).join(', '))}" oninput="setBlock(${bi},'headers',this.value.split(',').map(x=>x.trim()))"><label class="fl">Rows (one per line, cells comma-separated)</label><textarea rows="5" oninput="setBlock(${bi},'rows',this.value.split('\\n').filter(Boolean).map(r=>r.split(',').map(c=>c.trim())))">${esc((b.rows||[]).map(r=>(r||[]).join(', ')).join('\n'))}</textarea>`;
    case 'banner': return s('text','Text')+s('bgColor','Background color (e.g. #0b1f44)');
    case 'cta': return s('heading','Heading')+s('text','Text',1)+s('buttonText','Button text')+s('buttonUrl','Button URL');
    case 'spacer': return s('size','Height (px)');
    default: return '';
  }
}
window.pickBlockImage=(bi)=>{const imgs=MEDIA.filter(m=>m.type==='image');const url=prompt('Paste an image URL (or pick one):\n'+imgs.slice(0,12).map(m=>m.url).join('\n'),imgs[0]?imgs[0].url:'');if(url!=null){setBlock(bi,'url',url);rBuilder();}};
window.validatePage=()=>{const p=curPage();const issues=[];
  if(!p.metaTitle)issues.push(['SEO','Missing meta title']);
  if(!p.metaDescription)issues.push(['SEO','Missing meta description']);
  if(!/^\//.test(p.path||''))issues.push(['Path','Path should start with /']);
  if(!(p.blocks||[]).some(b=>b.type==='hero'||b.type==='heading'))issues.push(['Accessibility','Page has no heading — add a Hero or Heading block']);
  (p.blocks||[]).forEach((b,i)=>{const n='Block '+(i+1)+' ('+b.type+')';
    if(b.type==='image'&&!b.url)issues.push([n,'Image has no URL']);
    if(b.type==='image'&&b.url&&!b.alt)issues.push([n,'Image missing alt text (accessibility)']);
    if(b.type==='button'&&(!b.url||b.url==='#'))issues.push([n,'Button has no link']);
    if(b.type==='hero'&&b.ctaText&&!b.ctaUrl)issues.push([n,'Hero button text set but no URL']);
    if(b.type==='cta'&&b.buttonText&&!b.buttonUrl)issues.push([n,'CTA button text set but no URL']);
  });
  const rep=$('valReport');
  if(rep)rep.innerHTML=`<div class="card"><h3>Validation ${issues.length?'— '+issues.length+' issue(s)':'✓ passed'}</h3>${issues.length?`<ul style="font-size:13px;margin:0">${issues.map(([w,m])=>`<li><strong>${esc(w)}:</strong> ${esc(m)}</li>`).join('')}</ul>`:'<p class="ok" style="font-size:13px">No issues found — safe to publish.</p>'}</div>`;
};
function rBuilder(){
  const p=curPage(); if(!p){builderPath=null;return rPageList();}
  $('view').innerHTML=`<div class="toolbar"><button class="btn btn-sm" onclick="builderBack()">← All pages</button><a class="btn btn-sm" href="https://www.imigratesolution.com${esc(p.path)}" target="_blank">Preview live</a><button class="btn btn-sm" onclick="validatePage()">✓ Validate</button><span class="badge ${p.status==='published'?'live':'draft'}">${esc(p.status||'draft')}</span></div>
   <div class="card"><h3>Page settings</h3>
     <div class="row"><div><label class="fl">Title</label><input value="${esc(p.title||'')}" oninput="curPage().title=this.value;DIRTY=true;markDirty()"></div><div><label class="fl">Path (URL)</label><input value="${esc(p.path||'')}" oninput="renamePath(this.value)"></div></div>
     <label class="fl">Meta title</label><input value="${esc(p.metaTitle||'')}" oninput="curPage().metaTitle=this.value;DIRTY=true;markDirty()">
     <label class="fl">Meta description</label><textarea rows="2" oninput="curPage().metaDescription=this.value;DIRTY=true;markDirty()">${esc(p.metaDescription||'')}</textarea>
     <label class="fl">Status</label><select onchange="curPage().status=this.value;DIRTY=true;markDirty()"><option value="draft" ${p.status==='draft'?'selected':''}>Draft (hidden)</option><option value="published" ${p.status==='published'?'selected':''}>Published (live)</option><option value="unpublished" ${p.status==='unpublished'?'selected':''}>Unpublished (404)</option></select>
   </div>
   <div id="valReport"></div>
   ${(p.blocks||[]).map((b,bi)=>`<div class="card"><div class="hd" style="display:flex;justify-content:space-between;align-items:center"><strong style="text-transform:capitalize">${esc(b.type)} block</strong><span><button class="btn btn-sm" onclick="moveBlock(${bi},-1)">↑</button> <button class="btn btn-sm" onclick="moveBlock(${bi},1)">↓</button> <button class="btn btn-sm" onclick="delBlock(${bi})">✕</button></span></div>${blockFields(b,bi)}</div>`).join('')||'<p class="muted">No blocks yet — add your first one below.</p>'}
   <div class="card"><h3>Add a block</h3><div class="toolbar"><select id="newBlockType">${BLOCK_TYPES.map(t=>`<option>${t}</option>`).join('')}</select><button class="btn btn-primary btn-sm" onclick="addBlock()">+ Add block</button></div></div>
   ${saveBar('pages')}`;
}

/* Single sign-on when launched from the Admin Portal: auto-unlock from the shared
   same-origin session key, honor the portal-assigned role, deep-link to a section (#m=). */
(async function portalAutoInit(){
  const pw=sessionStorage.getItem('imig_cms_pw'); if(!pw)return;
  try{ const r=await fetch('/admin-verify.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})}); const j=await r.json().catch(()=>({})); if(!r.ok||!j.ok)return; }catch(e){return;}
  document.getElementById('gate').classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
  buildNav(); await loadAll();
  const m=(location.hash.match(/m=([a-zA-Z]+)/)||[])[1]; if(m){ try{ go(m); }catch(e){} }
})();
</script>
